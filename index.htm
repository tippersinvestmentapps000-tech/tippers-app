<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}

.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()">HOME</div>
<div onclick="deposit()">DEPOSIT</div>
<div onclick="earn()">EARN</div>
<div onclick="withdraw()">WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

/* SAFE STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;

let amount = 0;
let selectedPeriod = 1;

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* REF LINK */
function getLink(){
if(!currentUser) return "";
return window.location.origin + "?ref=" + currentUser.refCode;
}

/* START */
function start(){
document.getElementById("nav").style.display="none";

document.getElementById("screen").innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT</h2>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){

let ref = new URLSearchParams(window.location.search).get("ref");

screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="email">
<input id="pass">
<input id="cpass">

<button onclick="doRegister('${ref||""}')">REGISTER</button>
`;
}

/* REGISTER SAFE */
function doRegister(ref){

if(pass.value!==cpass.value){
toast("Password error"); return;
}

let user={
email:email.value,
pass:pass.value,
refCode:"REF"+Math.floor(Math.random()*999999),
balance:0,
invitedBy:ref || null,
referrals:[],
bonusGiven:false
};

if(ref){
let inviter = users.find(u=>u.refCode===ref);
if(inviter){
inviter.referrals.push(email.value);
}
}

users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN SAFE */
function login(){
screen.innerHTML=`
<h3>LOGIN</h3>
<input id="le">
<input id="lp">
<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

let user = users.find(u=>u.email===le.value);

if(!user || user.pass!==lp.value){
toast("Wrong login"); return;
}

currentUser=user;
localStorage.setItem("currentUser",JSON.stringify(user));

document.getElementById("nav").style.display="flex";
deposit();
}

/* SHARE */
function share(){
let link=getLink();

if(navigator.share){
navigator.share({url:link,title:"Join"});
}else{
navigator.clipboard.writeText(link);
toast("Copied ✔");
}
}

/* DEPOSIT */
function deposit(){

if(!currentUser) return start();

screen.innerHTML=`
<h3>DEPOSIT</h3>

<input id="amt">
<button onclick="go()">CONTINUE</button>

<div class="card">
${getLink()}
</div>

<button onclick="share()">SHARE LINK</button>
`;
}

function go(){
amount=parseInt(amt.value||0);
payment();
}

/* PAYMENT */
function payment(){
screen.innerHTML=`
<h3>PAY</h3>
<div class="card">0795410739</div>
<button onclick="proof()">NEXT</button>
`;
}

/* PROOF */
function proof(){
screen.innerHTML=`
<input type="file" id="file">
<button onclick="submit()">SUBMIT</button>
`;
}

/* BONUS FIX SAFE */
function submit(){

if(!file.value){
toast("Upload proof"); return;
}

if(amount>=1000000){
bonus();
}

withdrawPeriod();
}

/* BONUS */
function bonus(){

let inviter = users.find(u=>u.refCode===currentUser.invitedBy);

if(!inviter) return;
if(inviter.bonusGiven) return;

inviter.balance = (inviter.balance||0)+60000;
inviter.bonusGiven=true;

localStorage.setItem("users",JSON.stringify(users));

toast("Bonus +60000 ✔");
}

/* PERIOD SAFE FIX (THIS WAS BREAKING YOUR CODE) */
function withdrawPeriod(){

screen.innerHTML=`
<select id="period">
<option value="1">1day</option>
<option value="7">7days</option>
<option value="14">14days</option>
</select>

<button onclick="finish()">CONFIRM</button>
`;
}

/* FIXED HERE */
function finish(){

let p=document.getElementById("period").value;
selectedPeriod=parseInt(p);

screen.innerHTML=`
<div class="card">
<h2>DONE</h2>
<h1>CALCULATED</h1>
</div>
`;
}

/* HOME SAFE */
function home(){

if(!currentUser) return start();

let u=users.find(x=>x.email===currentUser.email);

screen.innerHTML=`
<div class="card">
<h3>BALANCE</h3>
<h1>${u.balance||0}</h1>
<p>Referrals: ${u.referrals.length}</p>
</div>
`;
}

/* EARN */
function earn(){
screen.innerHTML=`<h3>LIVE</h3>`;
}

/* WITHDRAW */
function withdraw(){
screen.innerHTML=`<h3>LOCKED</h3>`;
}

start();

</script>

</body>
</html>
