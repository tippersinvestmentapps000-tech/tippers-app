<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:400px;
background:#111827;
border-radius:20px;
overflow:hidden;
color:white;
}

.header{
background:black;
padding:15px;
text-align:center;
font-weight:bold;
}

.content{
padding:15px;
height:520px;
overflow-y:auto;
}

.yellow{color:#facc15}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:#facc15;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1f2937;
padding:15px;
margin-bottom:10px;
border-radius:12px;
}

.box{
background:#1f2937;
padding:12px;
border-radius:10px;
margin-top:10px;
}

/* FLEX ROW */
.row{
display:flex;
gap:10px;
margin-top:6px;
}

.row select, .row input{
flex:1;
margin-top:0;
}

.inputBox{
display:flex;
background:#facc15;
border-radius:10px;
overflow:hidden;
}

.inputBox span{
padding:10px;
background:#f59e0b;
font-weight:bold;
}

.inputBox input{
flex:1;
border:none;
padding:10px;
color:white;
background:#111827;
}

.hidden{display:none}

#toastBox{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">
<div class="header">Tippers Investment</div>
<div class="content" id="screen"></div>
</div>

<div id="toastBox"></div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||[];
let currentUser=null;
let amount=0;
let depositDone=false;

/* TOAST */
function toast(msg){
let t=document.getElementById("toastBox");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* REGISTER */
function register(){

get("screen").innerHTML=`

<h3>REGISTER</h3>

FIRST NAME: <input placeholder="John"><br>
LAST NAME: <input placeholder="Doe"><br>

GENDER (required):
<select required id="gender">
<option value="">Select gender</option>
<option>Male</option>
<option>Female</option>
</select>

EMAIL: <input placeholder="example@gmail.com"><br>

PASSWORD: <input type="password"><br>
CONFIRM PASSWORD: <input type="password"><br>

PHONE:
<div class="row">
<select>
<option>RWA +250</option>
<option>KEN +254</option>
<option>UGA +256</option>
<option>TZA +255</option>
<option>USA +1</option>
<option>UK +44</option>
</select>
<input placeholder="078xxxxxxx">
</div>

<button onclick="login()">Register</button>
`;

}

/* LOGIN */
function login(){
get("screen").innerHTML=`
<h3>LOGIN</h3>

<input placeholder="Email">
<input type="password" placeholder="Password">

<button onclick="deposit()">Login</button>
`;
}

/* HOME */
function home(){
get("screen").innerHTML=`
<div class="card">💰 Tips: Save daily</div>
<div class="card">📊 Invest wisely</div>
<div class="card">📈 Market growing</div>
<div class="card">🔥 Passive income ideas</div>
`;
}

/* DEPOSIT */
function deposit(){
get("screen").innerHTML=`

<h3 class="yellow">DEPOSIT BALANCE</h3>

AMOUNT TO DEPOSIT (RWF)
<div class="inputBox">
<span>RWF</span>
<input placeholder="100,000">
</div>

<p>Minimum: 5,000 RWF</p>

SENDER NAME:
<input placeholder="MUGABO">

<button onclick="payment()">Continue</button>
`;
}

/* PAYMENT */
function payment(){
get("screen").innerHTML=`

<h3 class="yellow">PAYMENT INFORMATION</h3>

Sender Name: MUGABO

<br><br>

Send money to:

<div class="box">
0795410739

<br><br>

BARAKA Bolingo
</div>

<button onclick="dial()">Continue</button>
`;
}

/* DIAL */
function dial(){
get("screen").innerHTML=`

USSD:
<div class="box">*182*1*1*0795410739#</div>

<input type="file" onchange="enable()">

<button id="btn" disabled onclick="withdrawPeriod()">Submit</button>
`;
}

function enable(){
document.getElementById("btn").disabled=false;
}

/* WITHDRAW PERIOD */
function withdrawPeriod(){
get("screen").innerHTML=`

<h3>WITHDRAW PERIOD</h3>

<select>
<option>1 Day</option>
<option>1 Week</option>
<option>1 Month</option>
<option>2 Month</option>
<option>3 Month</option>
<option>4 Month</option>
<option>5 Month</option>
<option>6 Month</option>
<option>7 Month</option>
<option>8 Month</option>
<option>9 Month</option>
<option>10 Month</option>
<option>11 Month</option>
<option>12 Month</option>
</select>

<button onclick="home()">Finish</button>
`;
}

/* WITHDRAW */
function withdraw(){
get("screen").innerHTML=`

<h3>WITHDRAW</h3>

AMOUNT TO WITHDRAW:
<input id="wamount" placeholder="0 RWF">

<p>Minimum: 7500 RWF</p>

<div class="row">
<select>
<option>RWA +250</option>
<option>KEN +254</option>
<option>UGA +256</option>
<option>TZA +255</option>
</select>

<input placeholder="078xxxxxxx">
</div>

<button onclick="checkWithdraw()">Withdraw</button>
`;
}

/* VALIDATION */
function checkWithdraw(){
let val=parseInt(document.getElementById("wamount").value)||0;

if(val<7500){
toast("INVALID INPUT ❌");
return;
}

toast("Withdraw request sent ✔");
}

/* HELPER */
function get(id){return document.getElementById(id);}

/* START */
register();

</script>

</body>
</html>
