<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:400px;
background:#111827;
border-radius:20px;
overflow:hidden;
color:white;
}

.header{
background:black;
padding:15px;
text-align:center;
font-weight:bold;
}

.content{
padding:15px;
height:520px;
overflow-y:auto;
}

.yellow{color:#facc15}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
outline:none;
background:#1f2937;
color:white;
}

input::placeholder{color:#9ca3af}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:#facc15;
font-weight:bold;
cursor:pointer;
color:black;
}

/* CARDS */
.card{
background:#1f2937;
padding:15px;
margin-bottom:10px;
border-radius:12px;
cursor:pointer;
}

/* BOX */
.box{
background:#1f2937;
padding:12px;
border-radius:10px;
margin-top:10px;
}

/* INPUT ROW */
.row{
display:flex;
gap:8px;
margin-top:6px;
}

.row select,.row input{
flex:1;
margin-top:0;
}

/* NAV */
.nav{
display:flex;
justify-content:space-around;
background:black;
padding:10px;
}

.nav div{
text-align:center;
font-size:12px;
cursor:pointer;
}

.nav i{
font-size:22px;
display:block;
}

.hidden{display:none}

/* TOAST */
#toastBox{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">

<div class="header">Tippers Investment</div>

<div class="content" id="screen"></div>

<!-- DASHBOARD ICONS (RESTORED) -->
<div class="nav hidden" id="bottomNav">
<div onclick="home()"><i>🏠</i>HOME</div>
<div onclick="deposit()"><i>💰</i>DEPOSIT</div>
<div onclick="withdrawUI()"><i>📤</i>WITHDRAW</div>
</div>

</div>

<div id="toastBox"></div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||[];
let currentUser=null;
let amount=0;
let depositDone=false;

/* TOAST */
function toast(msg){
let t=document.getElementById("toastBox");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* REGISTER */
function register(){

get("screen").innerHTML=`

<h3 class="yellow">REGISTER</h3>

FIRST NAME:
<input placeholder="John">

LAST NAME:
<input placeholder="Doe">

GENDER (required):
<select id="gender">
<option value="">Select gender</option>
<option>Male</option>
<option>Female</option>
</select>

EMAIL:
<input id="email" placeholder="example@gmail.com">

PASSWORD:
<input id="pass" type="password">

CONFIRM PASSWORD:
<input id="cpass" type="password">

PHONE:
<div class="row">
<select>
<option>RWA +250</option>
<option>KEN +254</option>
<option>UGA +256</option>
<option>TZA +255</option>
<option>USA +1</option>
<option>UK +44</option>
<option>IND +91</option>
<option>SA +27</option>
<option>NIG +234</option>
<option>FR +33</option>
</select>

<input placeholder="078xxxxxxx">
</div>

<button onclick="doRegister()">REGISTER</button>

<p onclick="login()" style="color:#facc15;cursor:pointer">Already have account?</p>
`;
}

/* LOGIN */
function login(){
get("screen").innerHTML=`

<h3 class="yellow">LOGIN</h3>

<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>

<p onclick="register()" style="color:#facc15;cursor:pointer">Create account</p>
`;
}

/* REGISTER VALIDATION (STRICT) */
function doRegister(){

let email=get("email").value;
let pass=get("pass").value;
let cpass=get("cpass").value;
let gender=get("gender").value;

if(!email || !pass || !cpass || !gender){
toast("Fill all fields ❌");
return;
}

if(pass!==cpass){
toast("Passwords not match ❌");
return;
}

users.push({email,pass,balance:0});
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN VALIDATION (STRICT) */
function doLogin(){

let e=get("logEmail").value;
let p=get("logPass").value;

if(!e || !p){
toast("Fill all fields ❌");
return;
}

let u=users.find(x=>x.email===e && x.pass===p);

if(!u){
toast("Invalid account ❌");
return;
}

currentUser=u;
get("bottomNav").classList.remove("hidden");

deposit(); // FORCE FLOW
}

/* HOME */
function home(){

if(!depositDone){
toast("Complete deposit first ❌");
deposit();
return;
}

get("screen").innerHTML=`

<div class="card">💰 Balance: ${currentUser.balance} RWF</div>
<div class="card">📊 Investment Tips</div>
<div class="card">📈 Market News</div>
<div class="card">🔥 Passive income guide</div>
<div class="card">💡 Financial education</div>
`;
}

/* DEPOSIT */
function deposit(){
get("screen").innerHTML=`

<h3 class="yellow">DEPOSIT BALANCE</h3>

AMOUNT TO DEPOSIT (RWF):
<input placeholder="100,000">

MINIMUM: 5,000 RWF

SENDER NAME:
<input placeholder="MUGABO">

<button onclick="payment()">CONTINUE</button>
`;
}

/* PAYMENT */
function payment(){
get("screen").innerHTML=`

<h3 class="yellow">PAYMENT INFORMATION</h3>

Send money to:

<div class="box">
0795410739

<br><br>

BARAKA BOLINGO
</div>

<button onclick="dial()">CONTINUE</button>
`;
}

/* DIAL */
function dial(){
get("screen").innerHTML=`

<div class="box">*182*1*1*0795410739#</div>

<input type="file" onchange="enable()">

<button id="btn" disabled onclick="proof()">SUBMIT</button>
`;
}

function enable(){
document.getElementById("btn").disabled=false;
}

/* PROOF */
function proof(){
currentUser.balance+=10000;
depositDone=true;
withdrawStep();
}

/* WITHDRAW STEP */
function withdrawStep(){
get("screen").innerHTML=`

<h3 class="yellow">WITHDRAW PERIOD</h3>

<select>
<option>1 Day</option>
<option>1 Week</option>
<option>1 Month</option>
<option>2 Months</option>
<option>3 Months</option>
<option>4 Months</option>
<option>5 Months</option>
<option>6 Months</option>
<option>7 Months</option>
<option>8 Months</option>
<option>9 Months</option>
<option>10 Months</option>
<option>11 Months</option>
<option>12 Months</option>
</select>

<button onclick="home()">FINISH</button>
`;
}

/* WITHDRAW */
function withdrawUI(){

let amountInput=prompt("Enter amount to withdraw:");

if(!amountInput || amountInput<7500){
toast("INVALID INPUT ❌");
return;
}

get("screen").innerHTML=`

<h3 class="yellow">WITHDRAW</h3>

<div class="box">Amount: ${amountInput} RWF</div>

<div class="row">
<select>
<option>RWA +250</option>
<option>KEN +254</option>
<option>UGA +256</option>
<option>TZA +255</option>
<option>USA +1</option>
<option>UK +44</option>
</select>

<input placeholder="078xxxxxxx">
</div>

<button onclick="toast('Withdraw request sent ✔')">WITHDRAW</button>
`;
}

/* HELP */
function get(id){return document.getElementById(id);}

/* START */
register();

</script>

</body>
</html>
