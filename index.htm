<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.app{
width:390px;
height:95vh;
background:#000;
border-radius:18px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.content{
flex:1;
padding:15px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;color:#aaa;font-size:13px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#111;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.table{
overflow-x:auto;
margin-top:10px;
}

.table div{
display:grid;
grid-template-columns:160px repeat(7,140px);
gap:8px;
}

.cell{
background:#0f172a;
padding:8px;
border-radius:6px;
font-size:12px;
text-align:center;
}

.nav{
display:none;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{
font-size:12px;
text-align:center;
cursor:pointer;
}

.locked{
opacity:0.3;
pointer-events:none;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
padding:8px 12px;
border-radius:6px;
display:none;
font-size:13px;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav">
<div onclick="home()">HOME</div>
<div onclick="deposit()">DEPOSIT</div>
<div onclick="earn()">EARN</div>
<div onclick="withdraw()">WITHDRAW</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>

let users=[];
let currentUser=null;
let depositDone=false;
let amount=0;
let period=1;
let refId=null;

/* GET REF */
const params=new URLSearchParams(location.search);
if(params.get("ref")) refId=params.get("ref");

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* WELCOME */
const screen = document.getElementById("screen");
  function start(){
  document.getElementById("nav").style.display = "none";

  screen.innerHTML = `
    <h2 class="title">WELCOME TO TIPPERS INVESTMENT</h2>

    <p class="desc">
      Grow your income by using tippers investment system
    </p>

    <div class="card">
      ✔ Secure System Demo<br>
      ✔ Referral Enabled<br>
      ✔ Investment Plans Ready
    </div>

    <button onclick="register()">NEXT</button>
  `;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="fn" placeholder="First name">
<input id="ln" placeholder="Last name">

<input id="phone" placeholder="Phone number">
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

/* REGISTER LOGIC */
function doRegister(){

const fn=document.getElementById("fn");
const ln=document.getElementById("ln");
const phone=document.getElementById("phone");
const email=document.getElementById("email");
const pass=document.getElementById("pass");
const cpass=document.getElementById("cpass");

if(!fn.value||!ln.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields"); return;
}

if(pass.value!==cpass.value){
toast("Password mismatch"); return;
}

let id=Date.now();

let user={
id,
fn:fn.value,
ln:ln.value,
phone:phone.value,
email:email.value,
pass:pass.value,
refCount:0,
refLink:location.origin+"?ref="+id
};

users.push(user);

if(refId){
let ref=users.find(u=>u.id==refId);
if(ref) ref.refCount++;
}

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

let le=document.getElementById("le").value;
let lp=document.getElementById("lp").value;

let u=users.find(x=>x.email==le && x.pass==lp);

if(!u){
toast("Wrong credentials"); return;
}

currentUser=u;

document.getElementById("nav").style.display="flex";

home();
}

/* TABLE */
function home(){

screen.innerHTML=`
<h3 class="title">TIPPERS INVESTMENT PLAN</h3>

<div class="table">
<div>
<div class="cell">INVEST</div>
<div class="cell">1 DAY</div>
<div class="cell">1 WEEK</div>
<div class="cell">1 MONTH</div>
<div class="cell">45 DAYS</div>
<div class="cell">3 MONTHS</div>
<div class="cell">4 MONTHS</div>
</div>

${[
["5,000","110","1,050","5,400","9,225","22,500","42,000"],
["50,000","1,100","10,500","54,000","92,250","225,000","420,000"],
["100,000","2,200","21,000","108,000","184,500","450,000","840,000"],
["150,000","3,300","31,500","162,000","276,750","675,000","1,260,000"],
["300,000","6,600","63,000","324,000","553,500","1,350,000","2,520,000"],
["500,000","11,000","105,000","540,000","922,500","2,250,000","4,200,000"],
["700,000","15,400","147,000","756,000","1,291,500","3,150,000","5,880,000"],
["1,000,000","22,000","210,000","1,080,000","1,845,000","4,500,000","8,400,000"],
["1,300,000","28,600","273,000","1,404,000","2,398,500","5,850,000","10,920,000"],
["1,500,000","33,000","315,000","1,620,000","2,767,500","6,250,000","12,600,000"]
].map(r=>`
<div>
<div class="cell">${r[0]} RWF</div>
<div class="cell">${r[1]} RWF</div>
<div class="cell">${r[2]} RWF</div>
<div class="cell">${r[3]} RWF</div>
<div class="cell">${r[4]} RWF</div>
<div class="cell">${r[5]} RWF</div>
<div class="cell">${r[6]} RWF</div>
</div>
`).join("")}

</div>
`;
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount">
<input id="sender" placeholder="Sender name">

<button onclick="pay()">CONTINUE</button>
`;
}

function pay(){
let a=document.getElementById("amt").value;
if(!a){toast("Fill amount");return;}
amount=a;
toast("Payment step...");
}

/* EARN */
function earn(){
screen.innerHTML=`
<h3 class="title">LIVE EARNING</h3>
<div class="card" id="live">0 RWF</div>
`;

let i=0;
setInterval(()=>{
i+=Math.random()*500;
document.getElementById("live").innerText=Math.floor(i)+" RWF";
},1000);
}

/* WITHDRAW */
function withdraw(){
screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>

<input placeholder="Amount">
<input placeholder="Phone number">

<button onclick="toast('Payout successful ✔')">PAYOUT</button>
`;
}

/* START */
  start();

</body>
</html>
