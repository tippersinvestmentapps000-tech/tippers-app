<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs,
doc, setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDHVg3vIPRDYCV9rjqBa7_1bDQfxeOxDiE",
authDomain: "tippers-investment.firebaseapp.com",
projectId: "tippers-investment",
storageBucket: "tippers-investment.firebasestorage.app",
messagingSenderId: "414576061794",
appId: "1:414576061794:web:cf9abdcf00a112e040903b"
};

initializeApp(firebaseConfig);
const db = getFirestore();

/* STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let amount = 0;

/* DOM */
const screen = document.getElementById("screen");
const nav = document.getElementById("nav");

/* HELPERS */
function val(id){ return document.getElementById(id)?.value; }

function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* ================= START ================= */
function start(){
nav.style.display="none";
screen.innerHTML=`
<h2 class="title">WELCOME</h2>
<button onclick="register()">REGISTER</button>
<button onclick="login()">LOGIN</button>
`;
}
start();

/* ================= REGISTER ================= */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

async function doRegister(){
if(!val("f")||!val("l")||!val("phone")||!val("email")||!val("pass")||!val("cpass")){
toast("Fill all fields"); return;
}
if(val("pass")!==val("cpass")){
toast("Passwords mismatch"); return;
}

let user={
email:val("email"),
pass:val("pass"),
balance:0,
refCode:"REF"+Date.now()
};

users.push(user);

await setDoc(doc(db,"users",user.email),user);

localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* ================= LOGIN ================= */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" type="password" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

async function doLogin(){
let email = val("le");
let pass = val("lp");

let user = users.find(u=>u.email===email && u.pass===pass);

if(!user){
toast("Invalid login");
return;
}

currentUser=user;
nav.style.display="flex";
home();
}

/* ================= HOME ================= */
function home(){
screen.innerHTML=`
<h3 class="title">DASHBOARD</h3>

<div class="card">Balance: ${currentUser.balance}</div>

<button onclick="deposit()">DEPOSIT</button>
<button onclick="withdraw()">WITHDRAW</button>
`;
}

/* ================= DEPOSIT ================= */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>
<input id="amt" placeholder="Amount">
<button onclick="pay()">CONTINUE</button>
`;
}

function pay(){
amount=parseInt(val("amt"));
if(!amount){toast("Enter amount");return;}

screen.innerHTML=`
<h3 class="title">PAYMENT</h3>
<input id="txid" placeholder="TXID">
<button onclick="finishDeposit()">FINISH</button>
`;
}

async function finishDeposit(){
await addDoc(collection(db,"pendingDeposits"),{
user:currentUser.email,
amount:amount,
txid:val("txid"),
date:new Date().toLocaleString()
});

toast("Sent ✔");
home();
}

/* ================= WITHDRAW ================= */
function withdraw(){
screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>

<input id="wamt" placeholder="Amount">
<input id="phone" placeholder="Phone">

<button onclick="doWithdraw()">SEND</button>
`;
}

async function doWithdraw(){
await addDoc(collection(db,"pendingWithdrawals"),{
user:currentUser.email,
amount:parseInt(val("wamt")),
phone:val("phone"),
date:new Date().toLocaleString()
});

toast("Sent ✔");
home();
}

/* EXPOSE FUNCTIONS (IMPORTANT FIX) */
window.register=register;
window.login=login;
window.doRegister=doRegister;
window.doLogin=doLogin;
window.home=home;
window.deposit=deposit;
window.pay=pay;
window.finishDeposit=finishDeposit;
window.withdraw=withdraw;
window.doWithdraw=doWithdraw;

</script>
