<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.app{
width:390px;
height:95vh;
background:#000;
border-radius:18px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.content{
flex:1;
padding:15px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;color:#aaa;font-size:13px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#111;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.table{
overflow-x:auto;
margin-top:10px;
}

.table div{
display:grid;
grid-template-columns:160px repeat(7,140px);
gap:8px;
}

.cell{
background:#0f172a;
padding:8px;
border-radius:6px;
font-size:12px;
text-align:center;
}

.nav{
display:none;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{
font-size:12px;
cursor:pointer;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
padding:8px 12px;
border-radius:6px;
display:none;
font-size:13px;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav">
<div onclick="home()">HOME</div>
<div onclick="deposit()">DEPOSIT</div>
<div onclick="earn()">EARN</div>
<div onclick="withdraw()">WITHDRAW</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>

let users=[];
let current=null;
let refId=null;
let amount=0;

/* REF LINK */
const urlParams=new URLSearchParams(location.search);
if(urlParams.get("ref")) refId=urlParams.get("ref");

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* START */
function start(){
document.getElementById("nav").style.display="none";

screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT</h2>
<p class="desc">Grow your income safely (Demo System)</p>

<div class="card">
✔ Investment Plans<br>
✔ Referral System<br>
✔ Dashboard Access
</div>

<button onclick="register()">NEXT</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="fn" placeholder="First name">
<input id="ln" placeholder="Last name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

/* REGISTER LOGIC */
function doRegister(){

const fn=document.getElementById("fn");
const ln=document.getElementById("ln");
const phone=document.getElementById("phone");
const email=document.getElementById("email");
const pass=document.getElementById("pass");
const cpass=document.getElementById("cpass");

if(!fn.value||!ln.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields"); return;
}

if(pass.value!==cpass.value){
toast("Password mismatch"); return;
}

let id=Date.now();

let user={
id,
fn:fn.value,
ln:ln.value,
phone:phone.value,
email:email.value,
pass:pass.value,
refLink:location.origin+"?ref="+id,
balance:0
};

users.push(user);

/* referral link logic */
if(refId){
let ref=users.find(u=>u.id==refId);
if(ref){
ref.balance += 600; // demo referral bonus
}
}

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

let le=document.getElementById("le").value;
let lp=document.getElementById("lp").value;

let u=users.find(x=>x.email==le && x.pass==lp);

if(!u){
toast("Wrong credentials"); return;
}

current=u;
document.getElementById("nav").style.display="flex";

home();
}

/* HOME TABLE */
function home(){
screen.innerHTML=`
<h3 class="title">TIPPERS INVESTMENT PLAN</h3>

<div class="table">
<div>
<div class="cell">INVEST</div>
<div class="cell">1D</div>
<div class="cell">1W</div>
<div class="cell">1M</div>
<div class="cell">45D</div>
<div class="cell">3M</div>
<div class="cell">4M</div>
</div>

<div>
<div class="cell">5,000</div>
<div class="cell">110</div>
<div class="cell">1,050</div>
<div class="cell">5,400</div>
<div class="cell">9,225</div>
<div class="cell">22,500</div>
<div class="cell">42,000</div>
</div>

<div>
<div class="cell">50,000</div>
<div class="cell">1,100</div>
<div class="cell">10,500</div>
<div class="cell">54,000</div>
<div class="cell">92,250</div>
<div class="cell">225,000</div>
<div class="cell">420,000</div>
</div>

</div>
`;
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount">
<input id="sender" placeholder="Sender">

<button onclick="pay()">CONTINUE</button>
`;
}

function pay(){
let a=document.getElementById("amt").value;
if(!a){toast("Fill amount");return;}
amount=a;
toast("Processing deposit...");
}

/* EARN */
function earn(){
screen.innerHTML=`
<h3 class="title">LIVE EARNING</h3>
<div class="card" id="live">0</div>
`;

let i=0;
setInterval(()=>{
i+=Math.random()*200;
live.innerText=Math.floor(i)+" RWF";
},1000);
}

/* WITHDRAW */
function withdraw(){
screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>

<input placeholder="Amount">
<input placeholder="Phone">

<button onclick="toast('Payout successful ✔')">PAYOUT NOW</button>
`;
}

/* INIT */
start();

</script>

</body>
</html>
