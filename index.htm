<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:390px;
height:95vh;
background:#000;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
color:white;
}

.content{
flex:1;
padding:15px;
overflow-y:auto;
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;color:#aaa;font-size:13px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{
text-align:center;
cursor:pointer;
font-size:12px;
opacity:.8;
}

.nav i{display:block;font-size:18px;margin-bottom:3px;}

.locked{opacity:.3;pointer-events:none;}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
font-size:13px;
}

.table{
overflow-x:auto;
white-space:nowrap;
margin-top:10px;
background:#111;
padding:10px;
border-radius:10px;
}

.table div{
display:grid;
grid-template-columns:160px repeat(7,140px);
gap:10px;
padding:5px 0;
}

.cell{
background:#0f172a;
padding:8px;
border-radius:6px;
text-align:center;
font-size:12px;
}

.card{
background:#111;
padding:12px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div id="homeIcon" class="locked" onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div id="depIcon" class="locked" onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div id="earnIcon" class="locked" onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div id="witIcon" class="locked" onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||[];
let current=null;
let depositDone=false;
let amount=0;
let period=1;

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* WELCOME */
function start(){
nav.style.display="none";
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT</h2>
<p class="desc">Smart earning system demo</p>
<button onclick="register()">NEXT</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER WITH GOOGLE ACCOUNT</h3>

<input id="fn" placeholder="First name">
<input id="ln" placeholder="Last name">

<div class="row">
<select id="code">
<option>+250</option>
<option>+254</option>
</select>
<input id="phone" placeholder="Phone">
</div>

<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

function doRegister(){
if(!fn.value||!ln.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields"); return;
}
if(pass.value.length<4){toast("Weak password");return;}
if(pass.value!==cpass.value){toast("Passwords mismatch");return;}

users.push({email:email.value,pass:pass.value});
localStorage.setItem("users",JSON.stringify(users));
toast("Registered");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<div style="display:flex;justify-content:space-between;font-size:12px">
<span onclick="forgot()">Forgot?</span>
<span onclick="register()">Create</span>
</div>

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){
let u=users.find(x=>x.email==le.value);
if(!u||u.pass!=lp.value){toast("Invalid login");return;}

current=u;
nav.style.display="flex";

showTable();
}

/* TABLE */
function showTable(){
screen.innerHTML=`
<h3 class="title">TIPPERS INVESTMENT PLAN</h3>

<div class="table">
<div>
<div class="cell">INVEST</div>
<div class="cell">1DAY</div>
<div class="cell">1WEEK</div>
<div class="cell">1MONTH</div>
<div class="cell">45D</div>
<div class="cell">2M</div>
<div class="cell">3M</div>
<div class="cell">4M</div>
</div>

${[
["5,000",110,1050,5400,9225,22500,42000],
["50,000",1100,10500,54000,92250,225000,420000],
["100,000",2200,21000,108000,184500,450000,840000],
["150,000",3300,31500,162000,276750,675000,1260000],
["300,000",6600,63000,324000,553500,1350000,2520000],
["500,000",11000,105000,540000,922500,2250000,4200000],
["700,000",15400,147000,756000,1291500,3150000,5880000],
["1,000,000",22000,210000,1080000,1845000,4500000,8400000],
["1,300,000",28600,273000,1404000,2398500,5850000,10920000],
["1,500,000",33000,315000,1620000,2767500,6250000,12600000]
].map(r=>`
<div>
<div class="cell">${r[0]} RWF</div>
<div class="cell">${r[1]} RWF</div>
<div class="cell">${r[2]} RWF</div>
<div class="cell">${r[3]} RWF</div>
<div class="cell">${r[4]} RWF</div>
<div class="cell">${r[5]} RWF</div>
<div class="cell">${r[6]} RWF</div>
</div>
`).join("")}
</div>

<button onclick="openDeposit()">NEXT</button>
`;
}

/* DEPOSIT */
function openDeposit(){
unlockIcons();
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>
<p class="desc">Add funds using MTN Mobile Money</p>

<input id="amt" placeholder="Enter amount">
<input id="sender" placeholder="Sender name">

<button onclick="payment()">CONTINUE</button>
`;
}

function payment(){
if(!amt.value||!sender.value){toast("Fill all");return;}
amount=parseInt(amt.value);

screen.innerHTML=`
<h3 class="title">PAYMENT INFO</h3>
<div class="card">0795410739 - BARAKA BOLINGO</div>
<div class="card">*182*1*1*0795410739#</div>
<button onclick="proof()">FINISH</button>
`;
}

function proof(){
screen.innerHTML=`
<h3 class="title">UPLOAD PROOF</h3>
<input type="file" id="file">
<button onclick="periodPage()">SEND</button>
`;
}

function periodPage(){
screen.innerHTML=`
<h3 class="title">SELECT PERIOD</h3>
<select id="p">
<option value="1">1 Day</option>
<option value="7">1 Week</option>
<option value="30">1 Month</option>
<option value="45">45 Days</option>
<option value="60">2 Months</option>
<option value="90">3 Months</option>
<option value="120">4 Months</option>
</select>

<button onclick="finish()">SUBMIT</button>
`;
}

function finish(){
period=p.value;
depositDone=true;

screen.innerHTML=`
<h3 class="title">SUCCESS</h3>
<p class="desc">Balance activated</p>
`;
}

/* UNLOCK ICONS */
function unlockIcons(){
document.querySelectorAll(".nav div").forEach(d=>{
d.classList.remove("locked");
});
}

/* NAV */
function home(){showTable();}
function deposit(){openDeposit();}

function earn(){
screen.innerHTML=`
<h3 class="title">LIVE EARNINGS</h3>
<div class="card" id="live">0 RWF</div>
`;
let i=0;
setInterval(()=>{
i+=Math.random()*2000;
live.innerText=Math.floor(i)+" RWF";
},1000);
}

function withdraw(){
screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>
<input placeholder="Amount">
<input placeholder="MTN number">
<button onclick="toast('Processing locked schedule')">PAYOUT</button>
`;
}

start();

</script>

</body>
</html>
