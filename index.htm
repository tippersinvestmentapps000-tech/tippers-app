<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tippers Investment App Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* APP */
.container{
  width:400px;
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* HEADER */
.header{
  background:#4f46e5;
  color:white;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

/* CONTENT */
.content{padding:15px}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

button:hover{background:#3730a3}

.hidden{display:none}

/* NAV ICONS */
.nav{
  display:flex;
  justify-content:space-around;
  background:#f3f4f6;
  padding:8px;
}

.nav button{
  width:23%;
  font-size:12px;
  background:white;
  color:black;
}

/* CARD */
.card{
  background:#f3f4f6;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<div class="container">

<!-- REGISTER -->
<div id="register">
  <div class="header">Create Account</div>
  <div class="content">

    <input id="fname" placeholder="First Name">
    <input id="lname" placeholder="Last Name">
    <input id="phone" placeholder="Phone">

    <select id="gender">
      <option>Male</option>
      <option>Female</option>
    </select>

    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <input id="cpass" type="password" placeholder="Confirm Password">

    <button onclick="register()">Register</button>
    <div onclick="showLogin()" style="text-align:center;color:blue;cursor:pointer;margin-top:10px">
      Already have account? Login
    </div>

  </div>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
  <div class="header">Login</div>
  <div class="content">

    <input id="logEmail" placeholder="Email">
    <input id="logPass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div onclick="showRegister()" style="text-align:center;color:blue;cursor:pointer">Register</div>
    <div onclick="showForgot()" style="text-align:center;color:blue;cursor:pointer">Forgot Password?</div>

  </div>
</div>

<!-- FORGOT -->
<div id="forgot" class="hidden">
  <div class="header">Reset Password</div>
  <div class="content">

    <input id="resetEmail" placeholder="Email">
    <input id="newPass" type="password" placeholder="New Password">

    <button onclick="resetPassword()">Reset</button>
    <div onclick="showLogin()" style="text-align:center;color:blue;cursor:pointer">Back</div>

  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="header">Tippers Dashboard</div>

  <div class="nav">
    <button onclick="showTab('home')">🏠 Home</button>
    <button onclick="showTab('deposit')">💰 Deposit</button>
    <button onclick="showTab('proof')">📤 Proof</button>
    <button onclick="showTab('withdraw')">📅 Withdraw</button>
  </div>

  <div class="content">

    <!-- HOME -->
    <div id="home">
      <div class="card">
        Welcome <b id="userName"></b> 🎉
      </div>
    </div>

    <!-- DEPOSIT -->
    <div id="deposit" class="hidden">
      <div class="card">
        <b>Send Money via MTN</b><br><br>
        Number: <b>0795410739</b><br>
        Name: Baraka Bolingo
      </div>

      <input id="amount" placeholder="Amount (RWF)">
      <input id="sender" placeholder="Sender Name">

      <button onclick="depositInfo()">Continue</button>

      <div id="depositBox" class="card hidden"></div>
    </div>

    <!-- PROOF -->
    <div id="proof" class="hidden">
      <div class="card">
        Upload payment screenshot:
        <input type="file" onchange="uploadProof()">
        <button id="confirmBtn" disabled onclick="confirmProof()">Confirm Payment</button>
      </div>
    </div>

    <!-- WITHDRAW -->
    <div id="withdraw" class="hidden">
      <div class="card">
        Select Withdraw Plan:
        <select id="plan">
          <option>Daily</option>
          <option>Weekly</option>
          <option>Monthly</option>
          <option>2 Months</option>
          <option>3 Months</option>
          <option>4 Months</option>
          <option>6 Months</option>
          <option>1 Year</option>
        </select>

        <button onclick="setWithdraw()">Confirm Plan</button>
      </div>
    </div>

  </div>
</div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser;
let proofDone = false;

/* REGISTER */
function register(){
  if(pass.value !== cpass.value){
    showToast("Passwords do not match ❌");
    return;
  }

  users.push({
    fname:fname.value,
    lname:lname.value,
    phone:phone.value,
    gender:gender.value,
    email:email.value,
    pass:pass.value
  });

  localStorage.setItem("users",JSON.stringify(users));
  showToast("Registered successfully ✅");
  showLogin();
}

/* LOGIN */
function login(){
  users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u =>
    u.email === logEmail.value &&
    u.pass === logPass.value
  );

  if(!user){
    showToast("Invalid email or password ❌");
    return;
  }

  currentUser = user;

  register.classList.add("hidden");
  login.classList.add("hidden");
  dashboard.classList.remove("hidden");

  userName.innerText = user.fname;

  showToast("Login successful 🎉");
}

/* RESET */
function resetPassword(){
  let user = users.find(u => u.email === resetEmail.value);

  if(!user){
    showToast("Email not found ❌");
    return;
  }

  user.pass = newPass.value;
  localStorage.setItem("users",JSON.stringify(users));

  showToast("Password updated ✅");
  showLogin();
}

/* NAV */
function showTab(tab){
  home.classList.add("hidden");
  deposit.classList.add("hidden");
  proof.classList.add("hidden");
  withdraw.classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");
}

/* DEPOSIT */
function depositInfo(){
  depositBox.classList.remove("hidden");

  depositBox.innerHTML =
  "Send <b>"+amount.value+" RWF</b><br>From: "+sender.value+
  "<br><br>Status: Pending Payment";
}

/* PROOF */
function uploadProof(){
  proofDone = true;
  confirmBtn.disabled = false;
}

function confirmProof(){
  showToast("Payment submitted ✅ Waiting approval");
}

/* WITHDRAW */
function setWithdraw(){
  showToast("Withdraw plan set: " + plan.value + " 🎉");
}

/* UI */
function showLogin(){
  register.classList.add("hidden");
  forgot.classList.add("hidden");
  login.classList.remove("hidden");
}

function showRegister(){
  login.classList.add("hidden");
  register.classList.remove("hidden");
}

function showForgot(){
  login.classList.add("hidden");
  forgot.classList.remove("hidden");
}

/* TOAST */
function showToast(msg){
  toast.innerText = msg;
  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
  },2500);
}

</script>

</body>
</html>
