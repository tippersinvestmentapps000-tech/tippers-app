<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
animation:fade 0.4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}

label{margin-top:10px;display:block;}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#f59e0b;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>

</div>

<div id="toast"></div>

<script>

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

let user=JSON.parse(localStorage.getItem("user")) || null;
let amount=0;
let depositDone=false;
let selectedPeriod="";

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* START */
function start(){
if(user){
nav.style.display="flex";
deposit();
return;
}

screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<label>First Name</label>
<input id="f">

<label>Last Name</label>
<input id="l">

<label>Gender</label>
<select id="g">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Phone</label>
<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>
<input id="phone">
</div>

<label>Email</label>
<input id="email">

<label>Password</label>
<input id="pass">

<label>Confirm Password</label>
<input id="cpass">

<button onclick="doRegister()">REGISTER</button>
`;
}

function doRegister(){

if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌");return;
}

if(!email.value.endsWith("@gmail.com")){
toast("Invalid email ❌");return;
}

if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌");return;
}

if(pass.value!==cpass.value){
toast("Passwords not match ❌");return;
}

user={email:email.value,pass:pass.value};
localStorage.setItem("user",JSON.stringify(user));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`

<h3 class="title">Login</h3>

<input id="le" placeholder="email">
<input id="lp" placeholder="password">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

if(le.value!==user.email || lp.value!==user.pass){
toast("Invalid login ❌");return;
}

nav.style.display="flex";
deposit();
}

/* HOME */
function home(){
if(!depositDone){
toast("Finish deposit first ❌");return;
}
screen.innerHTML=`<h3 class="title">Balance: ${amount}</h3>`;
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`

<h3 class="title">DEPOSIT BALANCE</h3>

<input id="amt" placeholder="amount">

<p>Minimum 5000 RWF</p>

<input id="sender" placeholder="sender">

<button onclick="goPayment()">CONTINUE</button>
`;
}

function goPayment(){
let a=parseInt(amt.value);

if(!a||a<5000||!sender.value){
toast("Invalid input ❌");return;
}

amount=a;
payment();
}

/* PAYMENT */
function payment(){
screen.innerHTML=`
<h3 class="title">PAYMENT</h3>
<div>0795410739<br><br>BARAKA BOLINGO</div>
<button onclick="dial()">DIAL & PAY</button>
`;
}

/* DIAL */
function dial(){
screen.innerHTML=`
<div>*182*1*1*0795410739#</div>
<input type="file" id="file">
<button onclick="submitProof()">SUBMIT</button>
`;
}

function submitProof(){
if(!file.value){
toast("Upload proof ❌");return;
}
withdrawPeriod();
}

/* PERIOD */
function withdrawPeriod(){
screen.innerHTML=`

<select id="period">
<option value="1">1day</option>
<option value="7">7days</option>
<option value="14">14days</option>
<option value="45">45days</option>
<option value="90">3month</option>
<option value="120">4month</option>
</select>

<button onclick="finish()">CONFIRM</button>
`;
}

/* PROFIT CALCULATOR */
function calculateProfit(a,p){
return Math.floor(a * (p/10)); // simple scaling
}

function finish(){
selectedPeriod=period.value;
depositDone=true;

let profit=calculateProfit(amount,selectedPeriod);

screen.innerHTML=`
<h3 class="title">Final Balance</h3>
<p>${profit} RWF</p>
`;
}

/* WITHDRAW */
function withdraw(){

if(!depositDone){
toast("Finish deposit first ❌");return;
}

toast("You're not allowed to withdraw before schedule.");
}

/* START */
start();

</script>

</body>
</html>
