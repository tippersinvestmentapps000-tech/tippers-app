<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:390px;
height:95vh;
background:#000;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
color:white;
}

.content{
flex:1;
padding:15px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;color:#aaa;font-size:13px;}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{font-size:12px;cursor:pointer;opacity:.6}
.nav i{display:block}

.locked{pointer-events:none;opacity:.3}

.table{
overflow-x:auto;
white-space:nowrap;
margin-top:10px;
background:#111;
padding:10px;
border-radius:10px;
}

.row{
display:grid;
grid-template-columns:160px repeat(7,140px);
gap:10px;
}

.cell{
background:#0f172a;
padding:8px;
border-radius:6px;
text-align:center;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
padding:10px;
border-radius:8px;
display:none;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div id="homeI" class="locked" onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div id="depI" class="locked" onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div id="earnI" class="locked" onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div id="witI" class="locked" onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>

let users = JSON.parse(localStorage.getItem("users"))||[];
let current=null;

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

function toast(m){
let t=document.getElementById("toast");
t.innerText=m;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* START */
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME</h2>
<button onclick="register()">NEXT</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3>REGISTER WITH GOOGLE ACCOUNT</h3>

<input id="fn" placeholder="First name">
<input id="ln" placeholder="Last name">

<!-- COUNTRY CODE FIX -->
<div class="row">
  <select id="code">
    <option value="+250">🇷🇼 Rwanda +250</option>
    <option value="+254">🇰🇪 Kenya +254</option>
    <option value="+255">🇹🇿 Tanzania +255</option>
    <option value="+256">🇺🇬 Uganda +256</option>
  </select>

  <input id="phone" placeholder="Phone number">
</div>

<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<input id="cpass" placeholder="Confirm password">

<!-- BUTTON FIX -->
<button onclick="doRegister()">REGISTER</button>
`;
}
/* register*/
function doRegister(){
  {
  const fn = document.getElementById("fn").value;
  const ln = document.getElementById("ln").value;
  const code = document.getElementById("code").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  const cpass = document.getElementById("cpass").value;

  if (!fn || !ln || !phone || !email || !pass || !cpass) {
    alert("Fill all fields");
    return;
  }

  if (pass !== cpass) {
    alert("Passwords do not match");
    return;
  }

  alert("Registration successful ✔");
}

if(!fn.value||!ln.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields"); return;
}

if(pass.value!==cpass.value){
toast("Passwords mismatch"); return;
}

let id = Date.now(); // unique id

let newUser = {
id:id,
email:email.value,
pass:pass.value,
refCount:0,
referredBy: refId || null
}
  ;

/* generate link here */
newUser.refLink = generateRefLink(id);

/* SAVE */
users.push(newUser);

/* UPDATE REFERRER */
if(refId){
let refUser = users.find(u=>u.id == refId);
if(refUser){
refUser.refCount = (refUser.refCount||0)+1;
}
}

localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */

function doLogin(){

let user = users.find(u=>u.email===le.value && u.pass===lp.value);

if(!user){
toast("Invalid login"); return;
}

/* FIX: ensure refLink always exists */
if(!user.refLink){
user.refLink = generateRefLink(user.id);
localStorage.setItem("users",JSON.stringify(users));
}

current = user;

nav.style.display="flex";

/* unlock home */
document.getElementById("homeI").classList.remove("locked");

home();
}
/* HOME */
function home(){
screen.innerHTML=`
<h3 class="title">TIPPERS INVESTMENT PLAN</h3>

<div class="table">

<div class="row">
<div class="cell">INVEST</div>
<div class="cell">1DAY</div>
<div class="cell">1WEEK</div>
<div class="cell">1MONTH</div>
<div class="cell">45DAYS</div>
<div class="cell">3MONTH</div>
<div class="cell">4MONTH</div>
</div>

${[
["5,000","110","1,050","5,400","9,225","22,500","42,000"],
["50,000","1,100","10,500","54,000","92,250","225,000","420,000"],
["100,000","2,200","21,000","108,000","184,500","450,000","840,000"],
["150,000","3,300","31,500","162,000","276,750","675,000","1,260,000"],
["300,000","6,600","63,000","324,000","553,500","1,350,000","2,520,000"],
["500,000","11,000","105,000","540,000","922,500","2,250,000","4,200,000"],
["700,000","15,400","147,000","756,000","1,291,500","3,150,000","5,880,000"],
["1,000,000","22,000","210,000","1,080,000","1,845,000","4,500,000","8,400,000"],
["1,300,000","28,600","273,000","1,404,000","2,398,500","5,850,000","10,920,000"],
["1,500,000","33,000","315,000","1,620,000","2,767,500","6,250,000","12,600,000"]
].map(r=>`
<div class="row">
${r.map(c=>`<div class="cell">${c} RWF</div>`).join("")}
</div>`).join("")}

</div>
function generateRefLink(id){
return window.location.origin + window.location.pathname + "?ref=" + id;
}
<div class="card">
<p>Your referral link:</p>
<input id="ref" value="${current.refLink || generateRefLink(current.id)}" readonly>
<button onclick="copyRef()">COPY LINK</button>

<a href="${current.refLink}" target="_blank" style="color:#f59e0b;font-size:12px">
Open Link
</a>

<p>Invited users: ${current.refCount || 0}</p>
</div>

<button onclick="unlockDeposit()">CONTINUE</button>
`;
}
function copyRef(){
let input = document.getElementById("ref");

if(!input.value){
toast("Link not ready ❌");
return;
}

navigator.clipboard.writeText(input.value);
toast("Link copied ✔");
}

/* UNLOCK */
function unlockDeposit(){
document.getElementById("depI").classList.remove("locked");
toast("Deposit unlocked");
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>
<input id="amt" placeholder="Amount">
<input id="name" placeholder="Sender name">
<button onclick="pay()">CONTINUE</button>
`;
}

function pay(){
if(!amt.value||!name.value){toast("Fill all");return;}

screen.innerHTML=`
<h3 class="title">PAY</h3>
<div class="cell">0792459701</div>
<div class="cell">BARAKA BOLINGO</div>
<div class="cell">*182*1*1*0792459701#</div>
<button onclick="finish()">FINISH</button>
`;
}

function finish(){
document.querySelectorAll(".nav div").forEach(i=>i.classList.remove("locked"));
toast("Deposit done ✔");
home();
}

/* EARN */
function earn(){
screen.innerHTML=`<h3>LIVE</h3><h1 id="live">0</h1>`;
let i=0;
setInterval(()=>{
i+=Math.random()*500;
live.innerText=Math.floor(i)+" RWF";
},1000);
}

/* WITHDRAW */
function withdraw(){
screen.innerHTML=`
<h3>Withdraw</h3>
<input placeholder="Amount">
<input placeholder="Phone">
<button onclick="toast('Payout successful ✔')">PAYOUT</button>
`;
}

start();

</script>

</body>
</html>
