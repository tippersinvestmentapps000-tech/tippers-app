<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:390px;
height:95vh;
background:#000;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
color:white;
}

.content{
flex:1;
padding:15px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;}
.desc{text-align:center;color:#aaa;font-size:13px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{
text-align:center;
font-size:12px;
opacity:.8;
cursor:pointer;
}

.locked{opacity:.3;pointer-events:none;}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
padding:10px;
border-radius:8px;
display:none;
}

.table{
overflow-x:auto;
white-space:nowrap;
background:#111;
padding:10px;
border-radius:10px;
}

.table div{
display:grid;
grid-template-columns:160px repeat(7,140px);
gap:10px;
}

.cell{
background:#0f172a;
padding:8px;
border-radius:6px;
text-align:center;
font-size:12px;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div id="homeIcon" class="locked" onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div id="depIcon" class="locked" onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div id="earnIcon" class="locked" onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div id="witIcon" class="locked" onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>

/* REF LINK READ */
let ref = new URLSearchParams(window.location.search).get("ref");
if(ref){
localStorage.setItem("referrer", ref);
}

/* STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let current = null;
let depositDone = false;
let amount = 0;

const screen = document.getElementById("screen");
const nav = document.getElementById("nav");

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* START */
function start(){
nav.style.display="none";
screen.innerHTML=`
<h2 class="title">WELCOME</h2>
<p class="desc">Start earning smartly</p>
<button onclick="register()">NEXT</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="fn" placeholder="First name">
<input id="ln" placeholder="Last name">

<div class="row">
<select id="code"><option>+250</option></select>
<input id="phone" placeholder="Phone">
</div>

<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<input id="cpass" placeholder="Confirm Password">

<button onclick="doRegister()">REGISTER</button>
`;
}

function doRegister(){

if(!fn.value||!ln.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields"); return;
}

if(pass.value!==cpass.value){
toast("Password mismatch"); return;
}

let refBy = localStorage.getItem("referrer") || null;

let newUser={
email:email.value,
pass:pass.value,
phone:phone.value,
balance:0,
refBy:refBy
};

users.push(newUser);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){
if(!le.value||!lp.value){toast("Fill all");return;}

let u = users.find(x=>x.email===le.value && x.pass===lp.value);

if(!u){toast("Invalid");return;}

current = u;

nav.style.display="flex";

/* LOCK */
document.querySelectorAll(".nav div").forEach(i=>i.classList.add("locked"));
document.getElementById("homeIcon").classList.remove("locked");

home();
}

/* HOME TABLE */
function home(){
screen.innerHTML=`
<h3 class="title">TIPPERS PLAN</h3>

<div class="table">
<div>
<div class="cell">INVEST</div>
<div class="cell">1 DAY</div>
<div class="cell">1 WEEK</div>
<div class="cell">1 MONTH</div>
<div class="cell">45 DAYS</div>
<div class="cell">3 MONTHS</div>
<div class="cell">4 MONTHS</div>
</div>

<div>
<div class="cell">100,000 RWF</div>
<div class="cell">2,200</div>
<div class="cell">21,000</div>
<div class="cell">108,000</div>
<div class="cell">184,500</div>
<div class="cell">450,000</div>
<div class="cell">840,000</div>
</div>
</div>

<button onclick="unlockDeposit()">CONTINUE</button>
`;
}

/* UNLOCK */
function unlockDeposit(){
document.getElementById("depIcon").classList.remove("locked");
deposit();
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DE
