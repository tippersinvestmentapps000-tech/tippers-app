<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{
text-align:center;
cursor:pointer;
opacity:0.5;
}

.nav i{
display:block;
font-size:20px;
margin-bottom:3px;
}

.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

.plan{
margin-top:10px;
}

.rowPlan{
display:grid;
grid-template-columns:repeat(7,1fr);
font-size:11px;
padding:6px;
}

.headerRow{
background:#f59e0b;
color:black;
font-weight:bold;
}

.rowPlan:nth-child(even){background:#111;}
.rowPlan:nth-child(odd){background:#0f172a;}

</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser=null;
let depositDone=false;
let amount=0;

const screen=document.getElementById("screen");

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* START */
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<select id="g">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="phone" placeholder="Phone number">

<input id="email" placeholder="Email (@gmail.com)">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

function doRegister(){
if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌"); return;
}
if(!email.value.includes("@gmail.com")){
toast("Invalid email ❌"); return;
}
if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌"); return;
}
if(pass.value!==cpass.value){
toast("Passwords not match ❌"); return;
}

users.push({email:email.value,pass:pass.value});
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">Login</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){
let u=users.find(x=>x.email===le.value);

if(!u){
toast("Account not found ❌"); return;
}
if(lp.value!==u.pass){
toast("Invalid password ❌"); return;
}

currentUser=u;
home();
}

/* HOME (PLAN) */
function home(){

screen.innerHTML=`
<h3 class="title">INVESTMENT PLAN</h3>

<div class="plan">
<div class="rowPlan headerRow">
<div>INV</div><div>2.2%</div><div>3%</div><div>3.6%</div><div>4.1%</div><div>5%</div><div>7%</div>
</div>

<div class="rowPlan"><div>5k</div><div>110</div><div>1050</div><div>5400</div><div>9225</div><div>22500</div><div>42000</div></div>
<div class="rowPlan"><div>50k</div><div>1100</div><div>10500</div><div>54000</div><div>92250</div><div>225000</div><div>420000</div></div>
<div class="rowPlan"><div>100k</div><div>2200</div><div>21000</div><div>108000</div><div>184500</div><div>450000</div><div>840000</div></div>
</div>

<button onclick="deposit()">NEXT</button>
`;
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount">
<p>Minimum 5000</p>

<input id="sender" placeholder="Sender name">

<button onclick="pay()">CONTINUE</button>
`;
}

function pay(){
if(!amt.value||!sender.value){
toast("Fill all fields ❌"); return;
}

if(amt.value<5000){
toast("Minimum 5000 ❌"); return;
}

amount=amt.value;
proof();
}

/* PROOF */
function proof(){
screen.innerHTML=`
<p>Upload proof</p>
<input type="file" id="file">
<button onclick="finish()">SUBMIT</button>
`;
}

function finish(){
if(!file.value){
toast("Upload proof ❌"); return;
}
depositDone=true;

screen.innerHTML=`
<div class="card">
<h2>Balance: ${amount} RWF</h2>
</div>
`;
}

/* WITHDRAW */
function withdraw(){
if(!depositDone){
toast("Finish deposit first ❌"); return;
}

let num=prompt("Enter MTN number");

if(!num.startsWith("078")&&!num.startsWith("079")){
toast("MTN only ❌"); return;
}

toast("Not allowed yet");
}

/* EARN */
function earn(){
toast("Complete deposit first");
}

/* START */
start();

</script>

</body>
</html>
