<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:0.4;
cursor:not-allowed;
}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
display:none;
}

.nav div{cursor:pointer;text-align:center;}

.card{
background:#111;
padding:12px;
margin-top:10px;
border-radius:10px;
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#f97316;
padding:10px;
border-radius:8px;
display:none;
color:white;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav">
<div onclick="home()">🏠 HOME</div>
<div onclick="deposit()">💰 DEPOSIT</div>
<div onclick="withdraw()">🏧 WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, setDoc, doc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyDHVg3vIPRDYCV9rjqBa7_1bDQfxeOxDiE",
authDomain: "tippers-investment.firebaseapp.com",
projectId: "tippers-investment",
storageBucket: "tippers-investment.firebasestorage.app",
messagingSenderId: "414576061794",
appId: "1:414576061794:web:cf9abdcf00a112e040903b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATE */
let screen = document.getElementById("screen");
let nav = document.getElementById("nav");

let users = JSON.parse(localStorage.getItem("users") || "[]");
let currentUser = null;
let amount = 0;

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* START */
window.onload = start;

function start(){
nav.style.display="none";

screen.innerHTML=`
<h2 class="title">WELCOME</h2>

<button onclick="register()">REGISTER</button>
<button onclick="login()">LOGIN</button>
`;
}

/* REGISTER */
window.register = function(){
let ref = new URLSearchParams(window.location.search).get("ref");

screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm password">

<button onclick="doRegister('${ref||""}')">REGISTER</button>
`;
}

/* DO REGISTER (FIXED + VALIDATION) */
window.doRegister = async function(ref){

let f = document.getElementById("f");
let l = document.getElementById("l");
let phone = document.getElementById("phone");
let email = document.getElementById("email");
let pass = document.getElementById("pass");
let cpass = document.getElementById("cpass");

if(!f.value || !l.value || !phone.value || !email.value || !pass.value || !cpass.value){
toast("Fill all fields");
return;
}

if(pass.value !== cpass.value){
toast("Passwords mismatch");
return;
}

let user = {
firstName:f.value,
lastName:l.value,
phone:phone.value,
email:email.value,
pass:pass.value,
refCode:"REF"+Date.now(),
invitedBy:ref||null,
balance:0
};

users.push(user);
localStorage.setItem("users", JSON.stringify(users));

await setDoc(doc(db,"users",user.email), user);

toast("Registered ✔");
login();
}

/* LOGIN */
window.login = function(){

screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" type="password" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

window.doLogin = function(){

let user = users.find(u=>u.email===le.value && u.pass===lp.value);

if(!user){
toast("Invalid login");
return;
}

currentUser = user;
nav.style.display="flex";
home();
}

/* HOME */
window.home = function(){

screen.innerHTML=`
<h3 class="title">DASHBOARD</h3>

<div class="card">Balance: ${currentUser.balance} RWF</div>

<button onclick="deposit()">DEPOSIT</button>
<button onclick="withdraw()">WITHDRAW</button>
`;
}

/* DEPOSIT */
window.deposit = function(){

screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount">

<button onclick="pay()">CONTINUE</button>
`;
}

window.pay = function(){

amount = Number(amt.value);

/* CONDITION BUTTON LOGIC */
if(!amount || amount < 5000){
toast("Minimum deposit is 5000 RWF");
return;
}

currentUser.balance += amount;

toast("Deposit success ✔");
home();
}

/* WITHDRAW (CONDITIONAL) */
window.withdraw = function(){

if(!currentUser || currentUser.balance <= 0){
toast("No balance available");
return;
}

currentUser.balance = 0;

toast("Withdrawal sent ✔");
home();
}

</script>

</body>
</html>
