<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4f46e5,#06b6d4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:400px;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.header{
background:#4f46e5;
color:white;
text-align:center;
padding:10px;
}

.content{padding:15px}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#4f46e5;
color:white;
cursor:pointer;
}

.hidden{display:none}

.nav{
display:flex;
justify-content:space-around;
background:#eee;
padding:8px;
}

.card{
background:#f3f4f6;
padding:10px;
margin-top:10px;
border-radius:10px;
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}
</style>
</head>

<body>

<div class="app">

<div class="header">Tippers Investment</div>

<div class="content" id="screen"></div>

</div>

<div id="toast"></div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let step = "welcome";

/* MAIN RENDER */
function render(){

if(step==="welcome"){
screen.innerHTML=`
<h3>Welcome 🚀</h3>
<p>Grow your income with Tippers Investment App</p>
<button onclick="step='register';render()">Get Started</button>
`;
}

/* REGISTER */
if(step==="register"){
screen.innerHTML=`
<h3>Register</h3>

<input id="fname" placeholder="First Name">
<input id="lname" placeholder="Last Name">

<select id="code">
<option>+250</option>
<option>+254</option>
</select>

<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm Password">

<button onclick="doRegister()">Register</button>
<p onclick="step='login';render()" style="color:blue;cursor:pointer">Login</p>
`;
}

/* LOGIN */
if(step==="login"){
screen.innerHTML=`
<h3>Login</h3>

<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">

<button onclick="doLogin()">Login</button>
<p onclick="step='register';render()" style="color:blue;cursor:pointer">Create account</p>
`;
}

/* DASHBOARD */
if(step==="dashboard"){
screen.innerHTML=`
<div class="nav">
<button onclick="tab('home')">🏠</button>
<button onclick="tab('deposit')">💰</button>
<button onclick="tab('proof')">📤</button>
<button onclick="tab('withdraw')">📅</button>
</div>

<div id="tabContent"></div>
`;

tab("home");
}

}

/* REGISTER FUNCTION */
function doRegister(){
if(pass.value!==cpass.value){
toast("Passwords not match ❌");return;
}

users.push({
fname:fname.value,
email:email.value,
pass:pass.value
});

localStorage.setItem("users",JSON.stringify(users));

toast("Registered! Login now ✅");
step="login";
render();
}

/* LOGIN */
function doLogin(){
let user = users.find(u =>
u.email===logEmail.value &&
u.pass===logPass.value
);

if(!user){
toast("Invalid login ❌");return;
}

currentUser=user;
step="dashboard";
render();
toast("Welcome "+user.fname+" 🎉");
}

/* TABS */
function tab(name){

if(name==="home"){
tabContent.innerHTML=`
<div class="card">Welcome ${currentUser.fname}</div>
`;
}

if(name==="deposit"){
tabContent.innerHTML=`
<div class="card">
Number: <b>0795410739</b><br>
Name: Baraka Bolingo
</div>

<input id="amount" placeholder="Amount">
<input id="sender" placeholder="Sender">

<button onclick="nextDeposit()">Continue</button>
`;
}

if(name==="proof"){
tabContent.innerHTML=`
<div class="card">
Upload proof:
<input type="file" onchange="enableProof()">
<button id="btn" disabled onclick="submitProof()">Submit</button>
</div>
`;
}

if(name==="withdraw"){
tabContent.innerHTML=`
<div class="card">
<select id="plan">
<option>Daily</option>
<option>Weekly</option>
<option>Monthly</option>
<option>1 Year</option>
</select>

<button onclick="finish()">Confirm</button>
</div>
`;
}

}

/* FLOW */
function nextDeposit(){
toast("Payment initiated 💰");
tab("proof");
}

function enableProof(){
btn.disabled=false;
}

function submitProof(){
toast("Proof submitted ✅");
tab("withdraw");
}

function finish(){
toast("Success! Investment activated 🎉");
tab("home");
}

/* TOAST */
function toast(msg){
toast.innerText=msg;
toast.style.display="block";
setTimeout(()=>toast.style.display="none",2500);
}

render();

</script>

</body>
</html>
