<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

/* STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let depositDone = false;
let amount = 0;
let selectedPeriod = 0;

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* REF LINK */
function getReferralLink(){
return window.location.origin + "?ref=" + currentUser.refCode;
}

/* START */
function start(){
nav.style.display="none";

screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){

let ref = new URLSearchParams(window.location.search).get("ref");

screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<input id="f" placeholder="Enter first name">
<input id="l" placeholder="Enter last name">

<select id="g">
<option value="">Select gender</option>
<option>Male</option>
<option>Female</option>
</select>

<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>
<input id="phone" placeholder="Phone number">
</div>

<input id="email" placeholder="Enter your email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister('${ref || ""}')">REGISTER</button>
`;
}

/* REGISTER SAVE */
function doRegister(ref){

if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌"); return;
}

if(!email.value.endsWith("@gmail.com")){
toast("Invalid email ❌"); return;
}

if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌"); return;
}

if(pass.value!==cpass.value){
toast("Passwords do not match ❌"); return;
}

/* USER */
let user={
email:email.value,
pass:pass.value,
refCode:"REF"+Math.floor(Math.random()*999999),
balance:0,
invitedBy:ref || null,
referrals:[],
bonusGiven:false
};

/* SAVE REFERRAL */
if(ref){
let inviter = users.find(u=>u.refCode===ref);
if(inviter){
inviter.referrals.push(email.value);
}
}

users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`

<h3 class="title">Login</h3>

<input id="le">
<input id="lp">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

let user = users.find(u=>u.email===le.value);

if(!user || user.pass!==lp.value){
toast("Wrong login ❌"); return;
}

currentUser=user;
localStorage.setItem("currentUser",JSON.stringify(user));

nav.style.display="flex";
deposit();
}

/* SHARE LINK */
function shareLink(){

let link = getReferralLink();

if(navigator.share){
navigator.share({
title:"Tippers Investment",
text:"Join using my link",
url:link
});
}else{
navigator.clipboard.writeText(link);
toast("Link copied ✔");
}
}

/* DEPOSIT */
function deposit(){

screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount">
<input id="sender" placeholder="Sender">

<button onclick="goPayment()">CONTINUE</button>

<div class="card">
Referral Link:<br>
${getReferralLink()}
</div>

<button onclick="shareLink()">SHARE LINK</button>
`;
}

function goPayment(){
amount=parseInt(amt.value);
payment();
}

/* PAYMENT */
function payment(){
screen.innerHTML=`
<h3 class="title">PAYMENT</h3>

<div class="card">
0795410739<br>
BARAKA BOLINGO
</div>

<button onclick="dial()">DIAL</button>
`;
}

/* DIAL */
function dial(){
screen.innerHTML=`
<input type="file" id="file">
<button onclick="submitProof()">SUBMIT</button>
`;
}

/* BONUS LOGIC */
function submitProof(){
if(!file.value){
toast("Upload proof ❌"); return;
}

/* BONUS CONDITION */
if(amount >= 1000000){
giveReferralBonus();
}

withdrawPeriod();
}

/* REFERRAL BONUS */
function giveReferralBonus(){

let inviterCode = currentUser.invitedBy;

if(!inviterCode) return;

let inviter = users.find(u=>u.refCode===inviterCode);

if(!inviter) return;

/* prevent double bonus */
if(inviter.bonusGiven) return;

inviter.balance = (inviter.balance || 0) + 60000;
inviter.bonusGiven = true;

localStorage.setItem("users",JSON.stringify(users));

toast("Referral bonus +60000 ✔");
}

/* PERIOD */
function withdrawPeriod(){
screen.innerHTML=`
<select id="period">
<option value="1">1day</option>
<option value="7">7days</option>
<option value="14">14days</option>
<option value="45">45days</option>
<option value="90">3months</option>
</select>

<button onclick="finish()">CONFIRM</button>
`;
}

/* PROFIT */
function calculateProfit(a,p){

let rate=0;
if(p==1) rate=0.05;
if(p==7) rate=0.2;
if(p==14) rate=0.45;
if(p==45) rate=1.2;
if(p==90) rate=3;

return Math.floor(a+(a*rate));
}

/* FINISH */
function finish(){

selectedPeriod=period.value;
depositDone=true;

let final=calculateProfit(amount,selectedPeriod);

screen.innerHTML=`
<div class="card">
<h2>Final Balance</h2>
<h1>${final} RWF</h1>
</div>
`;
}

/* HOME */
function home(){

let u = users.find(x=>x.email===currentUser.email);

screen.innerHTML=`
<div class="card">
<h2>Balance</h2>
<h1>${u.balance || 0} RWF</h1>
<p>Referrals: ${u.referrals.length}</p>
</div>
`;
}

/* START */
start();

</script>

</body>
</html>
