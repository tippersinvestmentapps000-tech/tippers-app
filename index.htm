<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;color:#ccc;margin-top:10px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{
text-align:center;
cursor:pointer;
opacity:0.3;
}

.nav i{
display:block;
font-size:20px;
margin-bottom:3px;
}

.active{opacity:1 !important}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav">
<div onclick="home()" id="homeBtn"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()" id="depBtn"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="withdraw()" id="withBtn"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

/* STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser=null;
let depositDone=false;
let amount=0;

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* LOCK ICONS */
function lockAll(){
homeBtn.classList.remove("active");
depBtn.classList.remove("active");
withBtn.classList.remove("active");
}

function enableDeposit(){
lockAll();
depBtn.classList.add("active");
}

function enableAll(){
homeBtn.classList.add("active");
withBtn.classList.add("active");
}

/* START */
function start(){
lockAll();

screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP</h2>
<p class="desc">Start now and grow your income smartly.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<select id="g">
<option value="">Select gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="phone" placeholder="Phone number">
<input id="email" placeholder="Email (@gmail.com)">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

function doRegister(){

if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌"); return;
}

if(!email.value.includes("@gmail.com")){
toast("Invalid email ❌"); return;
}

if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌"); return;
}

if(pass.value!==cpass.value){
toast("Passwords not match ❌"); return;
}

users.push({email:email.value,pass:pass.value});
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`

<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<div style="display:flex;justify-content:space-between">
<span onclick="forgot()" style="color:#f59e0b;cursor:pointer">Forgot password</span>
<span onclick="register()" style="color:#f59e0b;cursor:pointer">Create account</span>
</div>

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

let user=users.find(u=>u.email===le.value);

if(!user){
toast("Account not found ❌"); return;
}

if(lp.value!==user.pass){
toast("Invalid password ❌"); return;
}

currentUser=user;
enableDeposit();
plan();
}

/* FORGOT */
function forgot(){
screen.innerHTML=`
<h3 class="title">RESET PASSWORD</h3>
<input id="fe" placeholder="Email">
<input id="np" placeholder="New 6 digit password">
<button onclick="reset()">RESET</button>
`;
}

function reset(){
let u=users.find(x=>x.email===fe.value);

if(!u){
toast("Email not found ❌"); return;
}

if(!/^[0-9]{6}$/.test(np.value)){
toast("Password must be 6 digits ❌"); return;
}

u.pass=np.value;
localStorage.setItem("users",JSON.stringify(users));

toast("Password updated ✔");
login();
}

/* PLAN */
function plan(){
screen.innerHTML=`
<h3 class="title">INVESTMENT PLAN</h3>
<p class="desc">Review plan and continue</p>
<button onclick="deposit()">NEXT</button>
`;
}

/* DEPOSIT */
function deposit(){
if(!depBtn.classList.contains("active")){
toast("Finish previous step ❌"); return;
}

screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount">
<p>Minimum 5000 RWF</p>

<input id="sender" placeholder="Sender name">

<button onclick="goPayment()">CONTINUE</button>
`;
}

function goPayment(){
if(!amt.value||!sender.value){
toast("Fill all fields ❌"); return;
}

if(parseInt(amt.value)<5000){
toast("Minimum 5000 RWF ❌"); return;
}

amount=parseInt(amt.value);

payment();
}

/* PAYMENT FIXED */
function payment(){
screen.innerHTML=`

<h3 class="title">PAYMENT INFORMATION</h3>

<p class="desc">Send money using MTN</p>

<div style="background:#111;padding:10px;border-radius:10px;text-align:center">
<p>0795410739</p>
<br>
<p>BARAKA BOLINGO</p>
</div>

<br>

<div class="desc">Dial this code:</div>
<h2 style="text-align:center;color:#f59e0b;">*182*1*1*0795410739#</h2>

<button onclick="dial()">DIAL & PAY</button>
`;
}

/* DIAL */
function dial(){
screen.innerHTML=`

<h3 class="title">UPLOAD PROOF</h3>

<p class="desc">Upload MTN Mobile Money Screenshot</p>

<input type="file" id="file">

<button onclick="submitProof()">SUBMIT</button>
`;
}

/* PROOF VALIDATION */
function submitProof(){

if(!file.value){
toast("Upload screenshot ❌"); return;
}

/* FAKE VALIDATION */
if(!file.value.toLowerCase().includes("mtn")){
toast("Only MTN screenshot allowed ❌"); return;
}

depositDone=true;
enableAll();

screen.innerHTML=`
<h2 class="title">Balance: ${amount} RWF</h2>
`;
}

/* HOME */
function home(){
if(!depositDone){
toast("Finish deposit first ❌"); return;
}

screen.innerHTML=`<h2 class="title">Balance: ${amount} RWF</h2>`;
}

/* WITHDRAW */
function withdraw(){
if(!depositDone){
toast("Finish deposit first ❌"); return;
}

let num=prompt("Enter MTN number");

if(!num.startsWith("078")&&!num.startsWith("079")){
toast("Use MTN only ❌"); return;
}

toast("You're not allowed before schedule");
}

/* START */
start();

</script>

</body>
</html>
