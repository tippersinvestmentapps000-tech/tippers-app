<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:400px;
background:#111827;
border-radius:20px;
overflow:hidden;
color:white;
}

.header{
background:black;
padding:15px;
text-align:center;
font-weight:bold;
}

.content{
padding:15px;
height:520px;
overflow-y:auto;
}

/* COLORS */
.yellow{color:#facc15}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:#facc15;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1f2937;
padding:15px;
margin-bottom:10px;
border-radius:12px;
}

.box{
background:#1f2937;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.inputBox{
display:flex;
background:#facc15;
border-radius:10px;
overflow:hidden;
}

.inputBox span{
padding:10px;
background:#f59e0b;
font-weight:bold;
}

.inputBox input{
flex:1;
border:none;
padding:10px;
color:white;
background:#111827;
}

/* PLACEHOLDER BLACK STYLE */
input::placeholder{
color:#d1d5db;
}

.passBox{position:relative}
.eye{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
color:black;
}

/* NAV */
.nav{
display:flex;
justify-content:space-around;
background:black;
padding:10px;
}

.nav div{text-align:center;font-size:12px;cursor:pointer}
.nav i{font-size:22px;display:block}

.hidden{display:none}

#toastBox{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">
<div class="header">Tippers Investment</div>
<div class="content" id="screen"></div>

<div class="nav hidden" id="bottomNav">
<div onclick="home()"><i>🏠</i>HOME</div>
<div onclick="deposit()"><i>💰</i>DEPOSIT</div>
<div onclick="withdrawUI()"><i>📤</i>WITHDRAW</div>
</div>
</div>

<div id="toastBox"></div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||[];
let currentUser=null;
let currentAmount=0;
let senderName="";
let depositDone=false;

/* COUNTRIES (20+) */
let countries=[
"+250 Rwanda","+254 Kenya","+256 Uganda","+255 Tanzania",
"+257 Burundi","+251 Ethiopia","+234 Nigeria","+27 South Africa",
"+212 Morocco","+91 India","+1 USA","+44 UK",
"+33 France","+49 Germany","+86 China","+81 Japan",
"+61 Australia","+971 UAE","+82 Korea","+351 Portugal"
];

function get(id){return document.getElementById(id);}

function toast(msg){
let t=get("toastBox");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* WELCOME */
function welcome(){
get("screen").innerHTML=`
<h2 class="yellow">Welcome to Tippers</h2>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
`;
}

/* REGISTER */
function register(){

let countryOptions=countries.map(c=>`<option>${c}</option>`).join("");

get("screen").innerHTML=`

<p class="yellow"><b>Most welcome to Tippers investment!</b></p>

<h3>Register</h3>

<label>FIRST NAME</label>
<input id="fname" placeholder="e.g: John">

<label>LAST NAME</label>
<input id="lname" placeholder="e.g: Doe">

<label>GENDER</label>
<div>
<label><input type="checkbox"> Male</label>
<label><input type="checkbox"> Female</label>
</div>

<label>EMAIL</label>
<input id="email" placeholder="e.g: john@gmail.com">

<label>PHONE</label>
<select id="country">${countryOptions}</select>
<input id="phone" placeholder="078xxxxxxx">

<label>PASSWORD</label>
<div class="passBox">
<input id="pass" type="password" placeholder="Enter password">
</div>

<label>CONFIRM PASSWORD</label>
<div class="passBox">
<input id="cpass" type="password" placeholder="Confirm password">
</div>

<button onclick="doRegister()">Register</button>

<p onclick="login()" style="color:#facc15;cursor:pointer">Login</p>
`;
}

/* LOGIN */
function login(){
get("screen").innerHTML=`

<h3>Login</h3>

<input id="logEmail" placeholder="Enter email">
<input id="logPass" type="password" placeholder="Enter password">

<button onclick="doLogin()">Login</button>

<p onclick="register()" style="color:#facc15;cursor:pointer">Create account</p>
`;
}

/* REGISTER VALIDATION */
function doRegister(){
let f=get("fname").value;
let l=get("lname").value;
let e=get("email").value;
let p=get("pass").value;
let c=get("cpass").value;

if(!f||!l||!e||!p||!c){
toast("Fill all fields ❌");return;
}

if(p!==c){
toast("Passwords not match ❌");return;
}

users.push({email:e,pass:p,balance:0});
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN VALIDATION */
function doLogin(){
let e=get("logEmail").value;
let p=get("logPass").value;

if(!e||!p){
toast("Fill all fields ❌");return;
}

let u=users.find(x=>x.email===e && x.pass===p);
if(!u){
toast("Invalid account ❌");return;
}

currentUser=u;
get("bottomNav").classList.remove("hidden");

deposit(); // FORCE FLOW
}

/* HOME (FULL CONTENT) */
function home(){
if(!depositDone){
toast("Complete deposit first ❌");
deposit();
return;
}

get("screen").innerHTML=`
<div class="card">💰 Finance Tips: Save 20% of income daily</div>
<div class="card">📊 Investment: Diversify your portfolio</div>
<div class="card">📈 Market: Crypto is rising</div>
<div class="card">💡 Advice: Never invest all money at once</div>
<div class="card">🔥 Success story: Users earning daily profit</div>
<div class="card">📢 News: New investment plan coming soon</div>
<div class="card">💼 Business: Passive income strategies</div>
`;
}

/* DEPOSIT */
function deposit(){
get("screen").innerHTML=`

<h3 class="yellow">DEPOSIT BALANCE</h3>

<p>Add funds using MTN Mobile Money</p>

<p class="yellow">AMOUNT TO DEPOSIT (RWF)</p>

<div class="inputBox">
<span>RWF</span>
<input id="amount" placeholder="e.g: 100,000">
</div>

<p>Minimum: 5,000 RWF</p>

<p class="yellow">SENDER NAME:</p>
<input id="sender" placeholder="e.g: MUGABO">

<button onclick="payment()">Continue ➜</button>
`;
}

/* PAYMENT */
function payment(){
currentAmount=parseInt(get("amount").value)||0;
senderName=get("sender").value;

if(currentAmount<5000||!senderName){
toast("Fill correctly ❌");return;
}

get("screen").innerHTML=`

<h3 class="yellow">PAYMENT INFORMATION</h3>

<p>Follow steps below</p>

<div class="box">
Sender: ${senderName}
</div>

<div class="box">
Send ${currentAmount} RWF to:
<br><br>
0795410739
<br>
<span class="yellow">BARAKA BOLINGO</span>
</div>

<button onclick="dial()">Dial & Pay</button>
`;
}

/* DIAL + PROOF */
function dial(){
get("screen").innerHTML=`

<p class="yellow">UPLOAD PROOF OF PAYMENT SCREENSHOT</p>

<p>Make sure screenshot is clear</p>

<div class="box">
USSD:
<br><br>
*182*1*1*0795410739#
</div>

<input type="file" onchange="enableBtn()">

<button id="btn" disabled onclick="proof()">Submit</button>
`;
}

function enableBtn(){get("btn").disabled=false;}

/* PROOF */
function proof(){
currentUser.balance+=currentAmount;
localStorage.setItem("users",JSON.stringify(users));
depositDone=true;
withdrawStep();
}

/* WITHDRAW */
function withdrawStep(){
get("screen").innerHTML=`

<h3 class="yellow">WITHDRAW PERIOD</h3>

<select>
<option>1 Day</option>
<option>1 Week</option>
<option>1 Month</option>
<option>3 Months</option>
<option>6 Months</option>
<option>12 Months</option>
</select>

<button onclick="home()">Finish</button>
`;
}

/* WITHDRAW UI */
function withdrawUI(){

if(!depositDone){
toast("Complete deposit first ❌");return;
}

get("screen").innerHTML=`

<h3 class="yellow">WITHDRAW</h3>

<p>Amount to withdraw:</p>

<div class="inputBox">
<span>RWF</span>
<input placeholder="0 RWF">
</div>

<p>Minimum: 7500 RWF</p>

<p>Telephone:</p>

<select>
<option>+250 Rwanda</option>
<option>+254 Kenya</option>
<option>+256 Uganda</option>
<option>+255 Tanzania</option>
<option>+257 Burundi</option>
<option>+1 USA</option>
<option>+44 UK</option>
<option>+91 India</option>
<option>+27 South Africa</option>
<option>+33 France</option>
</select>

<input placeholder="078xxxxxxx">

<button onclick="withdrawAction()">Withdraw</button>
`;
}

function withdrawAction(){
toast("Not allowed before schedule ❌");
}

/* START */
welcome();

</script>

</body>
</html>
