<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4f46e5,#06b6d4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:420px;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
}

.header{
background:#4f46e5;
color:white;
padding:10px;
text-align:center;
font-weight:bold;
}

.content{
padding:15px;
height:500px;
overflow-y:auto;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#4f46e5;
color:white;
cursor:pointer;
}

.nav{
display:flex;
justify-content:space-around;
background:#f3f4f6;
padding:8px;
}

.card{
background:#f3f4f6;
padding:10px;
margin-top:10px;
border-radius:10px;
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

.passBox{position:relative}
.eye{position:absolute;right:10px;top:15px;cursor:pointer}

.phoneBox{display:flex;gap:5px}
.phoneBox select{width:35%}
.phoneBox input{width:65%}

.hidden{display:none}
</style>
</head>

<body>

<div class="app">
<div class="header">Tippers Investment</div>
<div class="content" id="screen"></div>

<div class="nav hidden" id="bottomNav">
<button onclick="home()">🏠</button>
<button onclick="deposit()">💰</button>
<button onclick="proof()">📤</button>
<button onclick="withdraw()">📅</button>
</div>
</div>

<div id="toast"></div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let currentAmount = 0;

/* TOAST */
function showToast(msg){
toast.innerText=msg;
toast.style.display="block";
setTimeout(()=>toast.style.display="none",2500);
}

/* WELCOME */
function welcome(){
bottomNav.classList.add("hidden");
screen.innerHTML=`
<h3>Welcome !</h3>
<p>Join Tippers Investment and grow your income smartly.</p>
<button onclick="register()">Continue ➡️</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3>Register</h3>

<input id="fname" placeholder="First Name">
<input id="lname" placeholder="Last Name">

<div class="phoneBox">
<select id="code">
<option>+250</option>
<option>+254</option>
</select>
<input id="phone" placeholder="Phone number">
</div>

<div>
<label><input type="checkbox" id="male"> Male</label>
<label><input type="checkbox" id="female"> Female</label>
</div>

<input id="email" placeholder="Email">

<div class="passBox">
<input id="pass" type="password" placeholder="Password">
<span class="eye" onclick="togglePass()">👁️</span>
</div>

<input id="cpass" type="password" placeholder="Confirm Password">

<button onclick="doRegister()">Register</button>

<p onclick="login()" style="color:blue;cursor:pointer">Login</p>
<p onclick="forgot()" style="color:blue;cursor:pointer">Forgot password?</p>
`;
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3>Login</h3>

<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">

<button onclick="doLogin()">Login</button>

<p onclick="register()" style="color:blue;cursor:pointer">Create account</p>
<p onclick="forgot()" style="color:blue;cursor:pointer">Forgot password?</p>
`;
}

/* FORGOT */
function forgot(){
screen.innerHTML=`
<h3>Reset Password</h3>

<input id="resetEmail" placeholder="Email">
<input id="newPass" placeholder="New Password">

<button onclick="resetPass()">Reset</button>
`;
}

/* HOME */
function home(){
screen.innerHTML=`

<div class="card">
<b>Balance:</b> ${currentUser.balance.toLocaleString()} RWF 💰
</div>

<div class="card">
<b>Market Updates</b><br>
1$ = 1300 RWF<br>
1€ = 1400 RWF<br>
Crypto rising
</div>

<div class="card">
<h3>About Tippers Investment</h3>
<p>
Tippers helps you invest and earn profits through smart plans.
</p>
</div>
`;
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`

<div class="card">
Number: <b>0795410739</b><br>
Name: Baraka Bolingo
</div>

<input id="amount" placeholder="Amount (RWF)">
<input id="sender" placeholder="Sender name e.g John">

<button onclick="goProof()">Continue</button>
`;
}

/* PROOF */
function proof(){
screen.innerHTML=`
<h3>Upload proof of payment screenshot</h3>
<input type="file" onchange="enableBtn()">
<button id="btn" disabled onclick="goWithdraw()">Submit</button>
`;
}

/* WITHDRAW */
function withdraw(){
screen.innerHTML=`

<div class="card">
<select id="plan">
<option>Everyday</option>
<option>Weekly</option>
<option>Monthly</option>
<option>2 months</option>
<option>3 months</option>
<option>6 months</option>
<option>12 months</option>
</select>

<button onclick="finish()">Confirm</button>
</div>
`;
}

/* FUNCTIONS */
function togglePass(){
pass.type = pass.type==="password"?"text":"password";
}

/* REGISTER */
function doRegister(){

if(!fname.value || !lname.value || !phone.value || !email.value || !pass.value || !cpass.value){
showToast("Fill all fields ❌"); return;
}

if(pass.value!==cpass.value){
showToast("Passwords not match ❌"); return;
}

users.push({
fname:fname.value,
lname:lname.value,
email:email.value,
pass:pass.value,
balance:0
});

localStorage.setItem("users",JSON.stringify(users));

showToast("Registered successfully ✅");
login();
}

/* LOGIN */
function doLogin(){

if(!logEmail.value || !logPass.value){
showToast("Fill all fields ❌"); return;
}

let user = users.find(u=>u.email===logEmail.value && u.pass===logPass.value);

if(!user){
showToast("Invalid login ❌"); return;
}

currentUser=user;

bottomNav.classList.remove("hidden");

showToast("Welcome "+user.fname+" !");
home();
}

/* RESET */
function resetPass(){
showToast("Password reset !");
login();
}

/* DEPOSIT */
function goProof(){

let amount = parseInt(document.getElementById("amount").value);

if(!amount){
showToast("Enter amount ❌"); return;
}

if(amount < 5000 || amount > 100000000){
showToast("Amount must be 5000 - 100M ❌"); return;
}

currentAmount = amount;

proof();
}

function enableBtn(){
btn.disabled=false;
}

/* AFTER PROOF */
function goWithdraw(){

currentUser.balance += currentAmount;

/* SAVE */
let index = users.findIndex(u => u.email === currentUser.email);
users[index] = currentUser;
localStorage.setItem("users", JSON.stringify(users));

showToast("Deposit added to balance 💰");
withdraw();
}

/* FINAL STEP */
function finish(){

let profit = currentUser.balance * 0.1;
currentUser.balance += profit;

/* simulate withdraw deduction */
currentUser.balance -= currentAmount;

/* SAVE */
let index = users.findIndex(u => u.email === currentUser.email);
users[index] = currentUser;
localStorage.setItem("users", JSON.stringify(users));

showToast("Profit added + withdraw processed 🎉");
home();
}

/* START */
welcome();

</script>

</body>
</html>
