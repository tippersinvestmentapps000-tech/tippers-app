<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment (Fixed)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
display:none;
}

.nav div{cursor:pointer;text-align:center;}

.card{
background:#111;
padding:12px;
margin-top:10px;
border-radius:10px;
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#f97316;
padding:10px;
border-radius:8px;
display:none;
color:white;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav">
<div onclick="home()">🏠</div>
<div onclick="deposit()">💰</div>
<div onclick="withdraw()">🏧</div>
</div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyDHVg3vIPRDYCV9rjqBa7_1bDQfxeOxDiE",
authDomain: "tippers-investment.firebaseapp.com",
projectId: "tippers-investment",
storageBucket: "tippers-investment.firebasestorage.app",
messagingSenderId: "414576061794",
appId: "1:414576061794:web:cf9abdcf00a112e040903b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATE */
let screen = document.getElementById("screen");
let nav = document.getElementById("nav");

let currentUser = null;
let users = JSON.parse(localStorage.getItem("users") || "[]");
let amount = 0;

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* START */
function start(){
nav.style.display="none";

screen.innerHTML=`
<h2 class="title">WELCOME</h2>

<button onclick="register()">REGISTER</button>
<button onclick="login()">LOGIN</button>
`;
}
window.onload = start;

/* REGISTER */
window.register = function(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="doRegister()">CREATE ACCOUNT</button>
`;
}

/* DO REGISTER */
window.doRegister = async function(){

let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

if(!email||!pass){
toast("Fill all fields");
return;
}

let user = {email, pass, balance:0};

users.push(user);
localStorage.setItem("users", JSON.stringify(users));

await setDoc(doc(db,"users",email), user);

toast("Registered ✔");
login();
}

/* LOGIN */
window.login = function(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

window.doLogin = function(){

let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

let user = users.find(u=>u.email===email && u.pass===pass);

if(!user){
toast("Invalid login");
return;
}

currentUser=user;
nav.style.display="flex";
home();
}

/* HOME */
window.home = function(){

screen.innerHTML=`
<h3 class="title">DASHBOARD</h3>

<div class="card">Balance: ${currentUser.balance} RWF</div>

<button onclick="deposit()">DEPOSIT</button>
<button onclick="withdraw()">WITHDRAW</button>
`;
}

/* DEPOSIT */
window.deposit = function(){

screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount">

<button onclick="pay()">CONTINUE</button>
`;
}

window.pay = function(){

amount = Number(document.getElementById("amt").value);

if(!amount){
toast("Invalid amount");
return;
}

currentUser.balance += amount;
toast("Deposit success ✔");
home();
}

/* WITHDRAW */
window.withdraw = function(){

if(currentUser.balance<=0){
toast("No balance");
return;
}

currentUser.balance = 0;
toast("Withdrawal sent ✔");
home();
}
</script>

</body>
</html>
