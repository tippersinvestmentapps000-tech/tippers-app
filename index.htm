<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

/* TITLES */
.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

/* NAV */
.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{
text-align:center;
cursor:pointer;
opacity:0.5;
}

.nav i{
display:block;
font-size:20px;
margin-bottom:3px;
}

/* ACTIVE NAV */
.active{
opacity:1 !important;
color:#f59e0b;
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

/* CARD */
.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
}

/* PLAN TABLE */
.plan{
margin-top:10px;
border-radius:10px;
overflow:hidden;
}

.rowPlan{
display:grid;
grid-template-columns:repeat(7,1fr);
padding:8px;
font-size:11px;
}

.headerRow{
background:#f59e0b;
color:black;
font-weight:bold;
}

.rowPlan:nth-child(even){background:#111;}
.rowPlan:nth-child(odd){background:#0f172a;}

</style>
</head>

<body>

<div class="app">

<div class="content" id="screen"></div>

<div class="nav" id="nav">
<div onclick="home()" id="navHome"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()" id="navDeposit"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()" id="navEarn"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()" id="navWithdraw"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>

</div>

<div id="toast"></div>

<script>

/* STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let depositDone = false;
let amount = 0;
let selectedPeriod = 0;

const screen=document.getElementById("screen");

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* LOCK NAV */
function lockCheck(){
if(!depositDone){
toast("Finish deposit first ❌");
return false;
}
return true;
}

/* START */
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<input id="f" placeholder="Enter first name">
<input id="l" placeholder="Enter last name">

<select id="g">
<option value="">Select gender</option>
<option>Male</option>
<option>Female</option>
</select>

<div style="display:flex;gap:5px">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>
<input id="phone" placeholder="Phone number">
</div>

<input id="email" placeholder="Enter your email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

/* REGISTER */
function doRegister(){

if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌"); return;
}

if(!email.value.endsWith("@gmail.com")){
toast("Invalid email ❌"); return;
}

if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌"); return;
}

if(pass.value!==cpass.value){
toast("Passwords do not match ❌"); return;
}

users.push({email:email.value,pass:pass.value});
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`

<h3 class="title">Login to continue</h3>

<input id="le" placeholder="Enter email">
<input id="lp" placeholder="Enter password">

<div style="display:flex;justify-content:space-between">
<span onclick="forgot()" style="color:#f59e0b;cursor:pointer">Forgot password</span>
<span onclick="register()" style="color:#f59e0b;cursor:pointer">Create account</span>
</div>

<button onclick="doLogin()">LOGIN</button>
`;
}

/* LOGIN */
function doLogin(){

if(!le.value||!lp.value){
toast("Fill all fields ❌"); return;
}

let u=users.find(x=>x.email===le.value);

if(!u){
toast("Account not found ❌"); return;
}

if(lp.value!==u.pass){
toast("Invalid password ❌"); return;
}

currentUser=u;

/* SHOW PLAN FIRST */
showPlan();
}

/* PLAN */
function showPlan(){
screen.innerHTML=`

<h3 class="title">TIPPERS INVESTMENT PLAN</h3>

<div class="plan">

<div class="rowPlan headerRow">
<div>INVEST</div>
<div>2.2%</div>
<div>3%</div>
<div>3.6%</div>
<div>4.1%</div>
<div>5%</div>
<div>7%</div>
</div>

<div class="rowPlan"><div>5k</div><div>110</div><div>1050</div><div>5400</div><div>9225</div><div>22500</div><div>42000</div></div>
<div class="rowPlan"><div>50k</div><div>1100</div><div>10500</div><div>54000</div><div>92250</div><div>225000</div><div>420000</div></div>
<div class="rowPlan"><div>100k</div><div>2200</div><div>21000</div><div>108000</div><div>184500</div><div>450000</div><div>840000</div></div>

</div>

<button onclick="deposit()">NEXT</button>
`;
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`

<h3 class="title">DEPOSIT BALANCE</h3>

<input id="amt" placeholder="Amount (RWF)">
<p>Minimum 5000 RWF</p>

<input id="sender" placeholder="Sender name">

<button onclick="goPayment()">CONTINUE</button>
`;
}

function goPayment(){

if(!amt.value||!sender.value){
toast("Fill all fields ❌"); return;
}

if(parseInt(amt.value)<5000){
toast("Minimum 5000 ❌"); return;
}

amount=parseInt(amt.value);
payment();
}

/* PAYMENT */
function payment(){
screen.innerHTML=`

<h3 class="title">PAYMENT INFORMATION</h3>

<div class="card">
0795410739<br><br>BARAKA BOLINGO
</div>

<button onclick="dial()">DIAL & PAY</button>
`;
}

/* DIAL */
function dial(){
screen.innerHTML=`

<div>*182*1*1*0795410739#</div>

<p class="desc">Upload proof of payment screenshot</p>

<input type="file" id="file">

<button onclick="submitProof()">SUBMIT</button>
`;
}

function submitProof(){
if(!file.value){
toast("Upload proof ❌"); return;
}
withdrawPeriod();
}

/* PERIOD */
function withdrawPeriod(){
screen.innerHTML=`

<h3 class="title">WITHDRAW PERIOD</h3>

<select id="period">
<option value="1">1day</option>
<option value="7">7days</option>
<option value="14">14days</option>
<option value="45">45days</option>
<option value="90">3month</option>
<option value="120">4month</option>
</select>

<button onclick="finish()">SEND & CONFIRM</button>
`;
}

/* FINISH */
function finish(){
depositDone=true;

screen.innerHTML=`
<div class="card">
<h2 class="title">Deposit Completed</h2>
<p class="desc">Now you can use dashboard</p>
</div>
`;
}

/* HOME */
function home(){
if(!lockCheck()) return;

screen.innerHTML=`<div class="card">Welcome Home</div>`;
}

/* EARN */
function earn(){
if(!lockCheck()) return;

screen.innerHTML=`<div class="card">Live Earnings Running...</div>`;
}

/* WITHDRAW */
function withdraw(){
if(!lockCheck()) return;

screen.innerHTML=`

<input id="wamt" placeholder="0 RWF">
<p>Minimum 7500</p>

<button onclick="doWithdraw()">WITHDRAW</button>
`;
}

function doWithdraw(){
if(!wamt.value||wamt.value<7500){
toast("INVALID INPUT ❌"); return;
}

toast("You're not allowed to withdraw before schedule.");
}

/* START */
start();

</script>

</body>
</html>
