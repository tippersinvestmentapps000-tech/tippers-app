<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4f46e5,#06b6d4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:400px;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.header{
background:#4f46e5;
color:white;
text-align:center;
padding:10px;
}

.content{padding:15px}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#4f46e5;
color:white;
cursor:pointer;
}

.nav{
display:flex;
justify-content:space-around;
background:#eee;
padding:8px;
}

.card{
background:#f3f4f6;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.hidden{display:none}

#toastBox{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}
</style>
</head>

<body>

<div class="app">
<div class="header">Tippers Investment</div>
<div class="content" id="screen"></div>
</div>

<div id="toastBox"></div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;

/* TOAST */
function showToast(msg){
let t = document.getElementById("toastBox");
t.innerText = msg;
t.style.display = "block";
setTimeout(()=>t.style.display="none",2500);
}

/* WELCOME */
function showWelcome(){
document.getElementById("screen").innerHTML = `
<h3>Welcome 🚀</h3>
<p>Grow your income with Tippers Investment</p>
<button onclick="showRegister()">Get Started</button>
`;
}

/* REGISTER */
function showRegister(){
document.getElementById("screen").innerHTML = `
<h3>Register</h3>

<input id="fname" placeholder="First Name">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm Password">

<button onclick="doRegister()">Register</button>
<p onclick="showLogin()" style="color:blue;cursor:pointer">Login</p>
`;
}

/* LOGIN */
function showLogin(){
document.getElementById("screen").innerHTML = `
<h3>Login</h3>

<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">

<button onclick="doLogin()">Login</button>
<p onclick="showRegister()" style="color:blue;cursor:pointer">Create account</p>
`;
}

/* DASHBOARD */
function showDashboard(){
document.getElementById("screen").innerHTML = `
<div class="nav">
<button onclick="showHome()">🏠</button>
<button onclick="showDeposit()">💰</button>
<button onclick="showProof()">📤</button>
<button onclick="showWithdraw()">📅</button>
</div>

<div id="tab"></div>
`;

showHome();
}

/* HOME */
function showHome(){
document.getElementById("tab").innerHTML = `
<div class="card">Welcome ${currentUser.fname} 🎉</div>
`;
}

/* DEPOSIT */
function showDeposit(){
document.getElementById("tab").innerHTML = `
<div class="card">
Number: <b>0795410739</b><br>
Name: Baraka Bolingo
</div>

<input id="amount" placeholder="Amount">
<input id="sender" placeholder="Sender">

<button onclick="goProof()">Continue</button>
`;
}

/* PROOF */
function showProof(){
document.getElementById("tab").innerHTML = `
<div class="card">
Upload proof:
<input type="file" onchange="enableBtn()">
<button id="confirmBtn" disabled onclick="goWithdraw()">Submit</button>
</div>
`;
}

/* WITHDRAW */
function showWithdraw(){
document.getElementById("tab").innerHTML = `
<div class="card">
<select id="plan">
<option>Daily</option>
<option>Weekly</option>
<option>Monthly</option>
<option>1 Year</option>
</select>

<button onclick="finish()">Confirm</button>
</div>
`;
}

/* FLOW FUNCTIONS */
function goProof(){
showToast("Payment step started 💰");
showProof();
}

function enableBtn(){
document.getElementById("confirmBtn").disabled = false;
}

function goWithdraw(){
showToast("Proof uploaded ✅");
showWithdraw();
}

function finish(){
showToast("Investment successful 🎉");
showHome();
}

/* REGISTER */
function doRegister(){
let pass = document.getElementById("pass").value;
let cpass = document.getElementById("cpass").value;

if(pass !== cpass){
showToast("Passwords do not match ❌");
return;
}

users.push({
fname:document.getElementById("fname").value,
email:document.getElementById("email").value,
pass:pass
});

localStorage.setItem("users", JSON.stringify(users));

showToast("Registered! Now login ✅");
showLogin();
}

/* LOGIN */
function doLogin(){
let email = document.getElementById("logEmail").value;
let pass = document.getElementById("logPass").value;

let user = users.find(u => u.email === email && u.pass === pass);

if(!user){
showToast("Invalid login ❌");
return;
}

currentUser = user;

showToast("Welcome "+user.fname+" 🎉");
showDashboard();
}

/* START */
showWelcome();

</script>

</body>
</html>
