<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}
.content{
padding:20px;
height:520px;
overflow-y:auto;
}
.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}
input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}
.row{display:flex;gap:5px;}
.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}
.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}
.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
word-break:break-all;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

/* 🔥 FIX: DECLARE DOM FIRST */
const screen = document.getElementById("screen");
const nav = document.getElementById("nav");

/* STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let depositDone = false;
let amount = 0;
let selectedPeriod = 0;

/* HELPER */
function val(id){ return document.getElementById(id)?.value; }

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* REF LINK */
function getLink(){
return window.location.origin + "?ref=" + currentUser.refCode;
}

/* START */
function start(){
nav.style.display="none";
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
let ref=new URLSearchParams(window.location.search).get("ref");

screen.innerHTML=`
<h3 class="title">REGISTER</h3>
<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">
<select id="g">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>
<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>
<input id="phone" placeholder="Phone">
</div>
<input id="email" placeholder="Email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">
<button onclick="doRegister('${ref||""}')">REGISTER</button>
`;
}

/* REGISTER SAVE */
function doRegister(ref){

if(!val("f")||!val("l")||!val("g")||!val("phone")||!val("email")||!val("pass")||!val("cpass")){
toast("Fill all fields ❌"); return;
}

if(!val("email").endsWith("@gmail.com")){
toast("Invalid email ❌"); return;
}

if(!/^[0-9]{6}$/.test(val("pass"))){
toast("Password must be 6 digits ❌"); return;
}

if(val("pass")!==val("cpass")){
toast("Passwords do not match ❌"); return;
}

let user={
email:val("email"),
pass:val("pass"),
refCode:"REF"+Math.floor(Math.random()*999999),
balance:0,
invitedBy:ref||null,
referrals:[],
bonusGiven:false
};

if(ref){
let inviter=users.find(u=>u.refCode===ref);
if(inviter){
inviter.referrals.push(user.email);
}
}

users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">Login</h3>
<input id="le">
<input id="lp">
<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){
let user=users.find(u=>u.email===val("le"));

if(!user||user.pass!==val("lp")){
toast("Wrong login ❌"); return;
}

currentUser=user;
nav.style.display="flex";
deposit();
}

/* SHARE */
function shareLink(){
let link=getLink();
navigator.clipboard.writeText(link);
toast("Link copied ✔");
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>
<input id="amt" placeholder="Amount">
<input id="sender" placeholder="Sender">
<button onclick="goPayment()">CONTINUE</button>

<div class="card">${getLink()}</div>
<button onclick="shareLink()">SHARE LINK</button>
`;
}

function goPayment(){
if(!val("amt")||!val("sender")){
toast("Fill all fields ❌"); return;
}

let a=parseInt(val("amt"));
if(a<5000){
toast("Minimum is 5000 ❌"); return;
}

amount=a;
payment();
}

/* PAYMENT */
function payment(){
screen.innerHTML=`
<h3>PAYMENT</h3>
<div class="card">0795410739</div>
<button onclick="dial()">NEXT</button>
`;
}

function dial(){
screen.innerHTML=`
<input type="file" id="file">
<button onclick="submitProof()">SUBMIT</button>
`;
}

/* BONUS */
function submitProof(){
if(!val("file")){
toast("Upload proof ❌"); return;
}

if(amount>=1000000){
let inviter=users.find(u=>u.refCode===currentUser.invitedBy);
if(inviter && !inviter.bonusGiven){
inviter.balance+=60000;
inviter.bonusGiven=true;
localStorage.setItem("users",JSON.stringify(users));
toast("Bonus +60000 ✔");
}
}

withdrawPeriod();
}

/* PERIOD */
function withdrawPeriod(){
screen.innerHTML=`
<select id="period">
<option value="1">1day</option>
<option value="7">7days</option>
<option value="14">14days</option>
</select>
<button onclick="finish()">CONFIRM</button>
`;
}

function calculateProfit(a,p){
let rate=0;
if(p==1) rate=0.05;
if(p==7) rate=0.2;
if(p==14) rate=0.45;
return Math.floor(a+(a*rate));
}

function finish(){
selectedPeriod=parseInt(val("period"));
depositDone=true;

let final=calculateProfit(amount,selectedPeriod);

screen.innerHTML=`
<div class="card">
<h2>Final Balance</h2>
<h1>${final} RWF</h1>
</div>
`;
}

/* HOME */
function home(){
if(!depositDone){
toast("Finish deposit first ❌"); return;
}

let u=users.find(x=>x.email===currentUser.email);

screen.innerHTML=`
<div class="card">
<h2>Balance</h2>
<h1>${calculateProfit(amount,selectedPeriod)} RWF</h1>
<p>Referral Bonus: ${u.balance}</p>
</div>
`;
}

function earn(){
screen.innerHTML=`<h3>LIVE EARNING...</h3>`;
}

function withdraw(){
screen.innerHTML=`<h3>LOCKED</h3>`;
}

start();

</script>

</body>
</html>
