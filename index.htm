<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

/* STATE (UNCHANGED STRUCTURE) */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let depositDone = false;
let amount = 0;
let selectedPeriod = 0;

/* FIX: restore current session */
if(localStorage.getItem("currentUser")){
currentUser = JSON.parse(localStorage.getItem("currentUser"));
}

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* REF LINK */
function getReferralLink(){
if(!currentUser) return "";
return window.location.origin + "?ref=" + currentUser.refCode;
}

/* START (UNCHANGED) */
function start(){
nav.style.display="none";

screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER (FIXED REF SUPPORT ONLY) */
function register(){

let ref = new URLSearchParams(window.location.search).get("ref");

screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<input id="f" placeholder="Enter first name">
<input id="l" placeholder="Enter last name">

<select id="g">
<option value="">Select gender</option>
<option>Male</option>
<option>Female</option>
</select>

<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>
<input id="phone" placeholder="Phone number">
</div>

<input id="email" placeholder="Enter your email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister('${ref || ""}')">REGISTER</button>
`;
}

/* REGISTER SAVE (ONLY ADD REF LOGIC) */
function doRegister(ref){

if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌"); return;
}

if(!email.value.endsWith("@gmail.com")){
toast("Invalid email ❌"); return;
}

if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌"); return;
}

if(pass.value!==cpass.value){
toast("Passwords do not match ❌"); return;
}

let user={
email:email.value,
pass:pass.value,
refCode:"REF"+Math.floor(Math.random()*999999),
balance:0,
invitedBy:ref || null,
referrals:[],
bonusGiven:false
};

if(ref){
let inviter = users.find(u=>u.refCode===ref);
if(inviter){
inviter.referrals.push(email.value);
}
}

users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered successfully ✔");
login();
}

/* LOGIN (UNCHANGED FLOW FIXED SESSION) */
function login(){
screen.innerHTML=`

<h3 class="title">Login to continue</h3>

<input id="le" placeholder="Enter email">
<input id="lp" placeholder="Enter password">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

if(!le.value||!lp.value){
toast("Fill all fields ❌"); return;
}

let user=users.find(u=>u.email===le.value);

if(!user){
toast("Account not found ❌"); return;
}

if(lp.value!==user.pass){
toast("Invalid password ❌"); return;
}

currentUser=user;
localStorage.setItem("currentUser",JSON.stringify(user));

nav.style.display="flex";

deposit();
}

/* SHARE LINK BUTTON */
function shareLink(){

let link=getReferralLink();

if(navigator.share){
navigator.share({
title:"Tippers Investment",
text:"Join using my link",
url:link
});
}else{
navigator.clipboard.writeText(link);
toast("Link copied ✔");
}
}

/* DEPOSIT (UNCHANGED + LINK ADDED) */
function deposit(){
screen.innerHTML=`

<h3 class="title">DEPOSIT BALANCE</h3>

<input id="amt" placeholder="Amount (RWF)">
<input id="sender" placeholder="Sender name">

<button onclick="goPayment()">CONTINUE</button>

<div class="card">
Referral Link:<br>
${getReferralLink()}
</div>

<button onclick="shareLink()">SHARE LINK</button>
`;
}

function goPayment(){

if(!amt.value||!sender.value){
toast("Fill all fields ❌"); return;
}

amount=parseInt(amt.value);
payment();
}

/* PAYMENT (UNCHANGED) */
function payment(){
screen.innerHTML=`

<h3 class="title">PAYMENT INFORMATION</h3>

<div class="card">
0795410739<br>
BARAKA BOLINGO
</div>

<button onclick="dial()">DIAL & PAY</button>
`;
}

/* DIAL */
function dial(){
screen.innerHTML=`

<div>*182*1*1*0795410739#</div>

<input type="file" id="file">

<button onclick="submitProof()">SUBMIT</button>
`;
}

/* BONUS LOGIC (FIXED SAFE) */
function submitProof(){
if(!file.value){
toast("Upload proof ❌"); return;
}

if(amount >= 1000000){
giveBonus();
}

withdrawPeriod();
}

/* BONUS ENGINE */
function giveBonus(){

if(!currentUser.invitedBy) return;

let inviter = users.find(u=>u.refCode===currentUser.invitedBy);

if(!inviter) return;

if(inviter.bonusGiven) return;

inviter.balance = (inviter.balance || 0) + 60000;
inviter.bonusGiven = true;

localStorage.setItem("users",JSON.stringify(users));

toast("Referral bonus +60000 ✔");
}

/* REST OF YOUR ORIGINAL FLOW (UNCHANGED) */
function withdrawPeriod(){
screen.innerHTML=`
<select id="period">
<option value="1">1day</option>
<option value="7">7days</option>
<option value="14">14days</option>
<option value="45">45days</option>
<option value="90">3month</option>
<option value="120">4month</option>
</select>

<button onclick="finish()">SEND & CONFIRM</button>
`;
}

function calculateProfit(a,p){

let rate=0;

if(p==1) rate=0.05;
if(p==7) rate=0.2;
if(p==14) rate=0.45;
if(p==45) rate=1.2;
if(p==90) rate=3;
if(p==120) rate=11;

return Math.floor(a + (a*rate));
}

function finish(){
selectedPeriod=period.value;
depositDone=true;

let finalAmount=calculateProfit(amount,selectedPeriod);

screen.innerHTML=`
<div class="card">
<h2 class="title">Final Balance</h2>
<h1>${finalAmount} RWF</h1>
</div>
`;
}

function earn(){

screen.innerHTML=`
<h3 class="title">Live Earnings</h3>
<div class="card">
<h1 id="live">0 RWF</h1>
</div>
`;

let i=0;
setInterval(()=>{
i+=Math.floor(Math.random()*2000);
document.getElementById("live").innerText=i+" RWF";
},1000);
}

function home(){

if(!currentUser) return start();

let u = users.find(x=>x.email===currentUser.email);

screen.innerHTML=`
<div class="card">
<h2 class="title">Balance</h2>
<h1>${u.balance || 0} RWF</h1>

<p>Referrals: ${u.referrals.length}</p>
</div>
`;
}

function withdraw(){

screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>
<input id="wamt">
<button onclick="toast('Locked ❌')">WITHDRAW</button>
`;
}

/* START */
start();

</script>

</body>
</html>
