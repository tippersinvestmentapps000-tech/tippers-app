<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEMO FIX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.app{
width:390px;
height:95vh;
background:#000;
border-radius:20px;
display:flex;
flex-direction:column;
}

.content{
flex:1;
padding:15px;
overflow:auto;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#f59e0b;
border:none;
border-radius:10px;
font-weight:bold;
}

.title{text-align:center;color:#f59e0b}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen">LOADING...</div>
</div>

<script>

/* SAFE ELEMENT GET */
function el(id){
return document.getElementById(id);
}

/* SAFE SCREEN */
function show(html){
let s = el("screen");
if(!s){
alert("SCREEN NOT FOUND");
return;
}
s.innerHTML = html;
}

/* START SAFE */
function start(){
show(`
<h2 class="title">WELCOME TO DEMO</h2>
<p style="text-align:center">System is running properly</p>
<button onclick="next()">NEXT</button>
`);
}

/* NEXT PAGE */
function next(){
show(`
<h3 class="title">REGISTER PAGE</h3>

<input placeholder="First name">
<input placeholder="Last name">
<input placeholder="Phone">
<input placeholder="Email">

<button onclick="login()">REGISTER</button>
`);
}

/* LOGIN */
function login(){
show(`
<h3 class="title">LOGIN</h3>

<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">

<button onclick="dashboard()">LOGIN</button>
`);
}

/* DASHBOARD */
function dashboard(){
show(`
<h3 class="title">DASHBOARD</h3>

<p style="text-align:center">✔ System Working</p>

<button onclick="start()">BACK TO START</button>
`);
}

/* AUTO START */
window.onload = function(){
start();
};

</script>

</body>
</html>
