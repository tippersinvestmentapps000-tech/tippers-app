<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
}

/* PLAN TABLE */
.planPage{
background:linear-gradient(to right,#93c5fd 50%, #ffffff 50%);
padding:10px;
border-radius:10px;
color:black;
}

.planTitle{
text-align:center;
font-weight:bold;
background:linear-gradient(135deg,#ff0000,#f59e0b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.planRow{
display:grid;
grid-template-columns:repeat(7,1fr);
font-size:11px;
padding:6px;
text-align:center;
}

.planHeader{
background:black;
color:white;
font-weight:bold;
}

.planRow:nth-child(even){background:#eee;}
.planRow:nth-child(odd){background:#ddd;}

</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

/* STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let depositDone = false;
let amount = 0;
let selectedPeriod = 0;

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* START */
function start(){
nav.style.display="none";

screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<input id="f" placeholder="Enter first name">
<input id="l" placeholder="Enter last name">

<select id="g">
<option value="">Select gender</option>
<option>Male</option>
<option>Female</option>
</select>

<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>
<input id="phone" placeholder="Phone number">
</div>

<input id="email" placeholder="Enter your email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

/* REGISTER VALIDATION */
function doRegister(){

if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌"); return;
}

if(!email.value.endsWith("@gmail.com")){
toast("Invalid email ❌"); return;
}

if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌"); return;
}

if(pass.value!==cpass.value){
toast("Passwords do not match ❌"); return;
}

let user={email:email.value,pass:pass.value};
users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered successfully ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`

<h3 class="title">Login to continue</h3>

<input id="le" placeholder="Enter email">
<input id="lp" placeholder="Enter password">

<div style="display:flex;justify-content:space-between">
<span onclick="forgot()" style="color:#f59e0b;cursor:pointer">Forgot password</span>
<span onclick="register()" style="color:#f59e0b;cursor:pointer">Create account</span>
</div>

<button onclick="doLogin()">LOGIN</button>
`;
}

/* LOGIN */
function doLogin(){

if(!le.value||!lp.value){
toast("Fill all fields ❌"); return;
}

let user=users.find(u=>u.email===le.value);

if(!user){
toast("Account not found ❌"); return;
}

if(lp.value!==user.pass){
toast("Invalid password ❌"); return;
}

currentUser=user;
nav.style.display="flex";

/* IMPORTANT CHANGE */
home();
}

/* HOME (TABLE) */
function home(){

if(!depositDone){

screen.innerHTML=`

<div class="planPage">

<h3 class="planTitle">TIPPERS INVESTMENT PLAN</h3>

<div class="planRow planHeader">
<div>INVESTMENT</div><div>2.2%</div><div>3%</div><div>3.6%</div><div>4.1%</div><div>5%</div><div>7%</div>
</div>

<div class="planRow"><div>5,000</div><div>110</div><div>1,050</div><div>5,400</div><div>9,225</div><div>22,500</div><div>42,000</div></div>
<div class="planRow"><div>50,000</div><div>1,100</div><div>10,500</div><div>54,000</div><div>92,250</div><div>225,000</div><div>420,000</div></div>
<div class="planRow"><div>100,000</div><div>2,200</div><div>21,000</div><div>108,000</div><div>184,500</div><div>450,000</div><div>840,000</div></div>
<div class="planRow"><div>150,000</div><div>3,300</div><div>31,500</div><div>162,000</div><div>276,750</div><div>675,000</div><div>1,260,000</div></div>
<div class="planRow"><div>300,000</div><div>6,600</div><div>63,000</div><div>324,000</div><div>553,500</div><div>1,350,000</div><div>2,520,000</div></div>
<div class="planRow"><div>500,000</div><div>11,000</div><div>105,000</div><div>540,000</div><div>922,500</div><div>2,250,000</div><div>4,200,000</div></div>
<div class="planRow"><div>700,000</div><div>15,400</div><div>147,000</div><div>756,000</div><div>1,291,500</div><div>3,150,000</div><div>5,880,000</div></div>
<div class="planRow"><div>1,000,000</div><div>22,000</div><div>210,000</div><div>1,080,000</div><div>1,845,000</div><div>4,500,000</div><div>8,400,000</div></div>
<div class="planRow"><div>1,300,000</div><div>28,600</div><div>273,000</div><div>1,404,000</div><div>2,398,500</div><div>5,850,000</div><div>10,920,000</div></div>
<div class="planRow"><div>1,500,000</div><div>33,000</div><div>315,000</div><div>1,620,000</div><div>2,767,500</div><div>6,250,000</div><div>12,600,000</div></div>

<button onclick="deposit()">NEXT</button>

</div>
`;
return;
}

/* AFTER DEPOSIT */
let finalAmount=calculateProfit(amount,selectedPeriod);

screen.innerHTML=`
<div class="card">
<h2 class="title">Balance</h2>
<h1>${finalAmount} RWF</h1>
</div>
`;
}

/* REST OF YOUR CODE (UNCHANGED) */

function deposit(){ /* same as yours */ }
function earn(){ /* same */ }
function withdraw(){ /* same */ }

start();

</script>

</body>
</html>
