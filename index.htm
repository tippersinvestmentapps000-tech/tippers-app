<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

/* disabled icons overlay */
.disabled-icons{
display:flex;
justify-content:space-around;
padding:10px;
background:#020617;
opacity:0.6;
}

.disabled-icons i{
font-size:18px;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">

<!-- ALWAYS VISIBLE ICONS (DISABLED VISUAL ONLY) -->
<div class="disabled-icons">
<i class="fa fa-home"></i>
<i class="fa fa-wallet"></i>
<i class="fa fa-chart-line"></i>
<i class="fa fa-money-bill"></i>
</div>

<div class="content" id="screen"></div>

</div>

<div id="toast"></div>

<script>

let step="welcome";
let depositDone=false;
let amount=0;

const screen=document.getElementById("screen");

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* START */
start();
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER (WITH COUNTRY CODE RESTORED) */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input placeholder="First Name">
<input placeholder="Last Name">

<select>
<option>Select gender</option>
<option>Male</option>
<option>Female</option>
</select>

<div class="row">
<select>
<option>RWA +250</option>

<option>KEN +254</option>
<option>TZA +255</option>
<option>ETH +251</option>
<option>USA +1</option>
<option>UK +44</option>
<option>UGA +256</option>
<option>DRC +243</option>
<option>SA +27</option>
<option>BUR +257</option>
<option>RWA +250</option>
<option>GHA +233</option>
<option>NGA +234</option>
<option>CAN +1</option>
<option>GER +49</option>
<option>FRA +33</option>
<option>IND +91</option>
<option>UAE +971</option>
<option>EGY +20</option>
</select>

<input placeholder="Phone number">
</div>

<input placeholder="Email">
<input placeholder="6 digit password">

<button onclick="login()">REGISTER</button>
`;
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input placeholder="Email">
<input placeholder="Password">

<button onclick="showHome()">LOGIN</button>
`;
}

/* HOME TABLE + NEXT */
function showHome(){
depositDone=true;

screen.innerHTML=`
<h3 class="title">TIPPERS INVESTMENT PLAN</h3>

<div style="font-size:12px;line-height:1.6;white-space:pre-line">
5,000 RWF  | 110 RWF | 1,050 RWF | 5,400 RWF | 9,225 RWF | 22,500 RWF | 42,000 RWF
50,000 RWF | 1,100 RWF | 10,500 RWF | 54,000 RWF | 92,250 RWF | 225,000 RWF | 420,000 RWF
100,000 RWF | 2,200 RWF | 21,000 RWF | 108,000 RWF | 184,500 RWF | 450,000 RWF | 840,000 RWF
150,000 RWF | 3,300 RWF | 31,500 RWF | 162,000 RWF | 276,750 RWF | 675,000 RWF | 1,260,000 RWF
300,000 RWF | 6,600 RWF | 63,000 RWF | 324,000 RWF | 553,500 RWF | 1,350,000 RWF | 2,520,000 RWF
500,000 RWF | 11,000 RWF | 105,000 RWF | 540,000 RWF | 922,500 RWF | 2,250,000 RWF | 4,200,000 RWF
700,000 RWF | 15,400 RWF | 147,000 RWF | 756,000 RWF | 1,291,500 RWF | 3,150,000 RWF | 5,880,000 RWF
1,000,000 RWF | 22,000 RWF | 210,000 RWF | 1,080,000 RWF | 1,845,000 RWF | 4,500,000 RWF | 8,400,000 RWF
1,300,000 RWF | 28,600 RWF | 273,000 RWF | 1,404,000 RWF | 2,398,500 RWF | 5,850,000 RWF | 10,920,000 RWF
1,500,000 RWF | 33,000 RWF | 315,000 RWF | 1,620,000 RWF | 2,767,500 RWF | 6,250,000 RWF | 12,600,000 RWF
</div>

<button onclick="next()">NEXT</button>
`;
}

/* NEXT → DEPOSIT */
function next(){
deposit();
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input placeholder="Amount (RWF)">
<input placeholder="Sender Name">

<button onclick="toast('Continue deposit process')">CONTINUE</button>
`;
}

</script>

</body>
</html>
