<script>

/* STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;

let depositDone = false;
let amount = 0;
let selectedPeriod = 0;

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* GENERATE REF CODE */
function genCode(){
return "REF"+Math.floor(Math.random()*1000000);
}

/* START */
function start(){
nav.style.display="none";

screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){

let urlRef = new URLSearchParams(window.location.search).get("ref");

screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<input id="email" placeholder="Email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister('${urlRef || ""}')">REGISTER</button>
`;
}

/* SAVE USER */
function doRegister(ref){

if(pass.value!==cpass.value){
toast("Passwords do not match"); return;
}

let myCode = genCode();

let user={
email:email.value,
pass:pass.value,
refCode: myCode,
balance:0,
referrals:[],
invitedBy: ref || null
};

users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");

login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le">
<input id="lp">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){

let user = users.find(u=>u.email===le.value);

if(!user || user.pass!==lp.value){
toast("Wrong login"); return;
}

currentUser=user;
localStorage.setItem("currentUser",JSON.stringify(user));

nav.style.display="flex";
deposit();
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt">
<input id="sender">

<button onclick="goPayment()">CONTINUE</button>

<p>Your referral link:</p>
<div class="card">
${window.location.origin+"?ref="+currentUser.refCode}
</div>
`;
}

/* PAYMENT FLOW */
function goPayment(){

amount=parseInt(amt.value);

payment();
}

function submitProof(){
if(amount>=1000000){
applyReferralBonus();
}
withdrawPeriod();
}

/* BONUS SYSTEM */
function applyReferralBonus(){

if(!currentUser.invitedBy) return;

let inviter = users.find(u=>u.refCode===currentUser.invitedBy);

if(inviter){

inviter.balance = (inviter.balance || 0) + 60000;
inviter.referrals.push(currentUser.email);

localStorage.setItem("users",JSON.stringify(users));

toast("Referral bonus given ✔");
}
}

/* HOME BALANCE */
function home(){

let u = users.find(x=>x.email===currentUser.email);

screen.innerHTML=`
<div class="card">
<h2>Balance</h2>
<h1>${u.balance || 0} RWF</h1>
</div>
`;
}

start();

</script>
