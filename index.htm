<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

/* STORAGE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;

/* STATE */
let amount = 0;
let selectedPeriod = 0;
let depositDone = false;

/* DOM */
const screen = document.getElementById("screen");
const nav = document.getElementById("nav");

const ADMIN_EMAIL = "admin@app.com";
const ADMIN_PASS = "1234";

let isAdmin = false;

/* HELPERS */
function val(id){ return document.getElementById(id)?.value; }

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* REF LINK */
function getLink(){
return window.location.origin + window.location.pathname + "?ref=" + currentUser.refCode;
}

/* START */
function start(){
nav.style.display="none";
window.onload = function(){
start();
};
screen.innerHTML=`
<h2 class="title">WELCOME</h2>
<p class="desc">Start your journey</p>

<button onclick="register()">REGISTER</button>

<button onclick="login()">LOGIN</button>
`;
}

/* REGISTER */
function register(){
let ref = new URLSearchParams(window.location.search).get("ref");

screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
</select>
<input id="phone" placeholder="Phone">
</div>

<input id="email" placeholder="Email">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister('${ref||""}')">REGISTER</button>
`;
}

/* DO REGISTER */
function doRegister(ref){

if(!val("f")||!val("l")||!val("phone")||!val("email")||!val("pass")||!val("cpass")){
toast("Fill all fields"); return;
}

if(val("pass")!==val("cpass")){
toast("Passwords mismatch"); return;
}

let user={
email:val("email"),
pass:val("pass"),
refCode:"REF"+Date.now(),
balance:0,
invitedBy:ref||null,
referrals:[]
};

/* SAVE */
users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}



/* LOGIN */
function login(){

screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Enter Your Email">

<input id="lp" type="password" placeholder="Enter Your Password">

<button onclick="doLogin()">LOGIN</button>
`;
}
function doLogin(){

let email = val("le").trim();
let pass = val("lp").trim();

/* =======================
   👨‍💼 ADMIN LOGIN
======================= */
if(email === ADMIN_EMAIL && pass === ADMIN_PASS){

isAdmin = true;
currentUser = {email:"ADMIN"};

nav.style.display = "flex";

adminPanel();

toast("Admin logged in ");

return;
}

/* =======================
   👤 USER LOGIN
======================= */
let user = users.find(u => 
u.email === email && u.pass === pass
);

if(!user){
toast("Invalid login");
return;
}

isAdmin = false;
currentUser = user;

nav.style.display = "flex";

home();
}

/*ADMIN PANEL*/
  
function adminPanel(){

let deposits = JSON.parse(localStorage.getItem("pendingDeposits")) || [];
let withdrawals = JSON.parse(localStorage.getItem("pendingWithdrawals")) || [];

let html = `<h3 class="title">ADMIN DASHBOARD</h3>`;

/* ===== DEPOSITS ===== */
html += `<h4>DEPOSITS</h4>`;

if(deposits.length === 0){
html += `<div class="card">No pending deposits</div>`;
}else{
deposits.forEach((p,i)=>{
html += `
<div class="card">
<b>User:</b> ${p.user}<br>
<b>Amount:</b> ${p.amount} RWF<br>
<b>TXID:</b> ${p.txid}<br>
<b>Date:</b> ${p.date}<br>

<button onclick="approveDeposit(${i})">APPROVE</button>
<button onclick="rejectDeposit(${i})" style="background:red;">REJECT</button>
</div>
`;
});
}

/* ===== WITHDRAWALS ===== */
html += `<h4 style="margin-top:20px;">WITHDRAWALS</h4>`;

if(withdrawals.length === 0){
html += `<div class="card">No pending withdrawals</div>`;
}else{
withdrawals.forEach((w,i)=>{
html += `
<div class="card">
<b>User:</b> ${w.user}<br>
<b>Amount:</b> ${w.amount} RWF<br>
<b>Phone:</b> ${w.phone}<br>
<b>Date:</b> ${w.date}<br>

<button onclick="approveWithdraw(${i})">APPROVE</button>
<button onclick="rejectWithdraw(${i})" style="background:red;">REJECT</button>
</div>
`;
});
}

screen.innerHTML = html;
}

function approveDeposit(index){

let pending = JSON.parse(localStorage.getItem("pendingDeposits")) || [];

let dep = pending[index];

let user = users.find(u => u.email === dep.user);

if(user){

user.balance += dep.amount;

/* REF BONUS */
if(user.invitedBy){

let inviter = users.find(u => u.refCode === user.invitedBy);

if(inviter){
inviter.balance += Math.floor(dep.amount * 0.06);
}
}

}

/* REMOVE */
pending.splice(index,1);

localStorage.setItem("pendingDeposits", JSON.stringify(pending));
localStorage.setItem("users", JSON.stringify(users));

toast("Approved");

adminPanel();
}

function approveWithdraw(index){

let withdrawals = JSON.parse(localStorage.getItem("pendingWithdrawals")) || [];

let req = withdrawals[index];

/* FIND USER */
let user = users.find(u => u.email === req.user);

if(user){
user.balance -= req.amount;
}

withdrawals.splice(index,1);

localStorage.setItem("pendingWithdrawals", JSON.stringify(withdrawals));
localStorage.setItem("users", JSON.stringify(users));

toast("Withdrawal approved ✔");

adminPanel();
}

</table>
</div>
`;
}

/* COPY */
function copy(){
navigator.clipboard.writeText(getLink());
toast("Link Copied ");
}

/* DEPOSIT */
function deposit(){

screen.innerHTML=`
<h3 class="title">DEPOSIT NOW</h3>
<p class="desc">Read the tippers investment plan and deposit now! </p>
<input id="amt" placeholder="Enter Amount you want to deposit ">
<input id="sender" placeholder="Sender name">

<button onclick="pay()">CONTINUE</button>
`;
}

function pay(){

if(!val("amt") || !val("sender")){
toast("Fill all");
return;
}

amount = parseInt(val("amt"));

/* 🔴 MINIMUM DEPOSIT CONDITION */
if(amount < 5000){
toast("Minimum deposit is 5,000 RWF");
return;
}

screen.innerHTML=`
<h3 class="title">PAYMENT</h3>

<div class="card">
SEND MONEY TO:<br>
0792459701
</div>

<input id="txid" placeholder="Enter Transaction ID">

<button onclick="finishDeposit()">FINISH</button>
`;
}

function finishDeposit(){
depositDone = true;

let txid = val("txid");

if(!txid){
toast("Enter Transaction ID");
return;
}

let pendingDeposits =
JSON.parse(localStorage.getItem("pendingDeposits")) || [];

pendingDeposits.push({
user: currentUser.email,
amount: amount,
txid: txid,
status: "pending",
date: new Date().toLocaleString()
});

localStorage.setItem("pendingDeposits", JSON.stringify(pendingDeposits));

toast("Deposit submitted ✔");

// 👉 HERE: move to period selection instead of home
choosePeriod();
}

function choosePeriod(){

screen.innerHTML = `
<h3 class="title">CHOOSE INVESTMENT PERIOD</h3>

<div class="card">Amount Deposited: ${amount} RWF</div>

<select id="period">
<option value="1">1 Day</option>
<option value="7">1 Week</option>
<option value="45">45 Days</option>
<option value="90">3 Months</option>
<option value="120">4 Months</option>
</select>

<button onclick="confirmPeriod()">CONFIRM</button>
`;
}

function confirmPeriod(){

selectedPeriod = parseInt(val("period"));

if(!selectedPeriod){
toast("Select period");
return;
}

/* SIMPLE PROFIT RULE (example) */
let rate = 0;

if(selectedPeriod == 1) rate = 0.02;
if(selectedPeriod == 7) rate = 0.05;
if(selectedPeriod == 45) rate = 0.15;
if(selectedPeriod == 90) rate = 0.30;
if(selectedPeriod == 120) rate = 0.50;

/* SAVE INVESTMENT */
currentUser.investment = {
amount: amount,
period: selectedPeriod,
rate: rate,
start: Date.now()
};

localStorage.setItem("users", JSON.stringify(users));

toast("Investment activated ✔");

home();
}

setInterval(()=>{
if(currentUser.investment){

let inc = currentUser.investment.amount * currentUser.investment.rate / 100;

currentUser.balance += inc;

localStorage.setItem("users", JSON.stringify(users));
}
}, 60000);

/* EARN */
function earn(){

if(!depositDone){
toast("You must deposit first");
return;
}

screen.innerHTML=`
<h3 class="title">LIVE EARNING</h3>
<div class="card" id="live">0 RWF</div>
`;

let i = 0;

setInterval(()=>{

i += Math.floor(Math.random()*1000);

document.getElementById("live").innerText =
i.toLocaleString() + " RWF";

},1000);

}

/* WITHDRAW */
function withdraw(){
if(!currentUser || currentUser.balance <= 0){
toast("No balance available for withdrawal");
return;
}

screen.innerHTML=`
<h3 class="title">PAYOUT YOUR EARNS</h3>

<input id="wamt" placeholder="Enter Amount You Want to Withdraw">
<br></br>
<br></br>

<input id="phone" placeholder="Enter YOUR Phone Number">

<button onclick="doWithdraw()">PAYOUT NOW</button>
`;
home();
}

function doWithdraw(){

if(!val("wamt") || !val("phone")){
toast("Fill all fields");
return;
}
let wamt = parseInt(val("wamt"));

if(wamt > currentUser.balance){
toast("Insufficient balance");
return;
}

/* CREATE WITHDRAW REQUEST */
let pendingWithdrawals =
JSON.parse(localStorage.getItem("pendingWithdrawals")) || [];

pendingWithdrawals.push({
user: currentUser.email,
amount: wamt,
phone: val("phone"),
date: new Date().toLocaleString(),
status: "pending"
});

localStorage.setItem("pendingWithdrawals", JSON.stringify(pendingWithdrawals));

toast("Withdrawal request sent ✔");

home();
}

/* START */
start();

</script>
