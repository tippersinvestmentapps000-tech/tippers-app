let t=document.getElementById("toast");

t.style.display="block";

/* REF LINK */
function getLink(){
return window.location.origin + window.location.pathname + "?ref=" + currentUser.refCode;

function register(){
let ref = new URLSearchParams(window.location.search).get("ref");

screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<div class="row">

</select>

<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister('${ref||""}')">REGISTER</button>
`;
}

/* DO REGISTER */
function doRegister(ref){

if(!val("f")||!val("l")||!val("phone")||!val("email")||!val("pass")||!val("cpass")){
toast("Fill all fields"); return;
}

if(val("pass")!==val("cpass")){
toast("Passwords mismatch"); return;
}

let user={
email:val("email"),
pass:val("pass"),
refCode:"REF"+Date.now(),
balance:0,
invitedBy:ref||null,
referrals:[]
};

/* SAVE */
users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){

<h3 class="title">SIGN IN BY GOOGLE ACOUNT</h3>

<input id="lp" placeholder="Password">

function doLogin(){

let user = users.find(u=>u.email===val("le") && u.pass===val("lp"));

if(!user){
toast("Invalid Email or incorrect  password, try again!"); return;
}

currentUser = user;

function deposit(){

function pay(){

}
