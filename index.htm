<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment UI Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:390px;
background:#000;
border-radius:18px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

.content{
padding:15px;
height:540px;
overflow-y:auto;
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;color:#cbd5e1;font-size:13px;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#111827;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:12px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
display:none;
}

.nav div{
text-align:center;
font-size:12px;
cursor:pointer;
opacity:0.4;
}

.nav i{display:block;font-size:18px;}

.locked{opacity:0.3;pointer-events:none;}

.tableWrap{overflow-x:auto;margin-top:10px;}
table{width:1000px;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid #1f2937;padding:8px;text-align:center;}
th{background:#111827;color:#f59e0b;}
td{background:#0f172a;}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ef4444;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav">
<div onclick="home()" id="h" class="locked"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()" id="d" class="locked"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()" id="e" class="locked"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()" id="w" class="locked"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>

</div>

<div id="toast"></div>

<script>

let step=0;
let user=null;
let depositDone=false;
let amount=0;

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

/* TOAST */
function toast(m){
let t=document.getElementById("toast");
t.innerText=m;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* WELCOME */
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME</h2>
<p class="desc">Fintech UI Simulation</p>
<button onclick="register()">NEXT</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER WITH GOOGLE ACCOUNT</h3>

<input id="n" placeholder="Full name">
<input id="e" placeholder="Email">
<input id="p" placeholder="6 digit password">
<input id="c" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

/* REGISTER CHECK */
function doRegister(){
if(!n.value||!e.value||!p.value||!c.value) return toast("Fill all fields");
if(!e.value.includes("@")) return toast("Invalid email");
if(!/^[0-9]{6}$/.test(p.value)) return toast("6 digit password only");
if(p.value!==c.value) return toast("Password mismatch");

user={email:e.value,pass:p.value};
toast("Registered");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

/* LOGIN */
function doLogin(){
if(le.value!==user.email || lp.value!==user.pass)
return toast("Invalid login");

nav.style.display="flex";
unlockNav();
home();
}

/* UNLOCK */
function unlockNav(){
document.querySelectorAll(".locked").forEach(x=>{
x.classList.remove("locked");
});
}

/* HOME TABLE */
function home(){
screen.innerHTML=`
<h3 class="title">TIPPERS INVESTMENT PLAN</h3>

<div class="tableWrap">
<table>
<tr>
<th>INVEST</th><th>1D</th><th>1W</th><th>1M</th><th>45D</th><th>3M</th><th>4M</th>
</tr>

<tr><td>5,000</td><td>110</td><td>1050</td><td>5400</td><td>9225</td><td>22500</td><td>42000</td></tr>
<tr><td>50,000</td><td>1100</td><td>10500</td><td>54000</td><td>92250</td><td>225000</td><td>420000</td></tr>
<tr><td>100,000</td><td>2200</td><td>21000</td><td>108000</td><td>184500</td><td>450000</td><td>840000</td></tr>

</table>
</div>

<button onclick="goDeposit()">NEXT</button>
`;
}

/* DEPOSIT */
function goDeposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>
<p class="desc">Adds funds using MTN mobile money</p>

<input id="amt" placeholder="Enter amount (min 5000)">
<input id="sender" placeholder="Sender name">

<button onclick="confirmDeposit()">CONTINUE</button>
`;
}

/* CONFIRM */
function confirmDeposit(){
if(!amt.value||!sender.value) return toast("Fill all");

if(parseInt(amt.value)<5000) return toast("Min 5000");

amount=parseInt(amt.value);
depositDone=true;

home();
}

/* WITHDRAW */
function withdraw(){
if(!depositDone) return toast("Deposit required");

screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>

<input placeholder="Amount">
<input placeholder="Phone number">

<button onclick="toast('Demo request sent')">PAYOUT</button>
`;
}

/* EARN */
function earn(){
screen.innerHTML=`
<h3 class="title">LIVE EARNINGS</h3>
<h1 id="l">0</h1>
`;

let x=0;
setInterval(()=>{
x+=Math.floor(Math.random()*3000);
document.getElementById("l").innerText=x+" RWF 💸";
},800);
}

/* START */
start();

</script>

</body>
</html>
