<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* APP */
.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
}

/* SCREEN */
.content{
padding:20px;
height:520px;
overflow-y:auto;
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.title{color:#f59e0b;text-align:center;font-weight:bold;}
.desc{text-align:center;margin-top:10px;color:#ddd}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

.row{display:flex;gap:5px;}

/* NAV */
.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

/* TABLE */
.tableWrap{
margin-top:15px;
background:#0f172a;
border-radius:12px;
overflow:hidden;
}

.tableTitle{
text-align:center;
padding:10px;
font-weight:bold;
color:#f59e0b;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
padding:8px;
text-align:center;
border:1px solid #1f2937;
}

th{
background:#111827;
color:#f59e0b;
}

/* LIVE ANIMATION */
.money{
position:relative;
overflow:hidden;
height:40px;
background:#111;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
}

.floating{
position:absolute;
color:#f59e0b;
animation:rise 1.5s linear infinite;
font-weight:bold;
}

@keyframes rise{
0%{transform:translateY(20px);opacity:0}
50%{opacity:1}
100%{transform:translateY(-40px);opacity:0}
}

</style>
</head>

<body>

<div class="app">

<div class="content" id="screen"></div>

<div class="nav" id="nav" style="display:none">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="earn()"><i class="fa fa-chart-line"></i>EARN</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>

</div>

<div id="toast"></div>

<script>

let users=[];
let currentUser=null;

let depositDone=false;
let amount=0;
let selectedPeriod=0;

const screen=document.getElementById("screen");
const nav=document.getElementById("nav");

/* TOAST */
function toast(m){
let t=document.getElementById("toast");
t.innerText=m;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* START */
function start(){
nav.style.display="none";
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP !</h2>
<p class="desc">Start smart investment and grow income step by step.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`
<h3 class="title">REGISTER</h3>

<p class="desc">Fill all fields correctly before continuing.</p>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<select id="g">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<div class="row">
<select id="code">
<option value="+250">RWA +250</option>
<option value="+254">KEN +254</option>
</select>
<input id="phone" placeholder="Phone number">
</div>

<input id="email" placeholder="Email @gmail.com">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

function doRegister(){
if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌");return;
}
if(!email.value.endsWith("@gmail.com")){
toast("Invalid email ❌");return;
}
if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌");return;
}
if(pass.value!==cpass.value){
toast("Password mismatch ❌");return;
}

users.push({email:email.value,pass:pass.value});
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<p class="desc">Enter credentials to continue.</p>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<div style="display:flex;justify-content:space-between">
<span onclick="forgot()" style="color:#f59e0b;cursor:pointer">Forgot password</span>
<span onclick="register()" style="color:#f59e0b;cursor:pointer">Create account</span>
</div>

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){
let u=users.find(x=>x.email===le.value);
if(!u){toast("User not found ❌");return;}
if(u.pass!==lp.value){toast("Wrong password ❌");return;}

currentUser=u;
nav.style.display="flex";

/* SHOW TABLE FIRST */
home();
}

/* TABLE HOME */
function home(){

if(!depositDone){
screen.innerHTML=investmentTable();
}else{
screen.innerHTML=`
<h3 class="title">YOUR BALANCE</h3>
<p class="desc">Access unlocked features</p>
<div class="tableWrap">${investmentTable()}</div>
`;
}
}

/* INVESTMENT TABLE */
function investmentTable(){
return `
<div class="tableWrap">
<div class="tableTitle">TIPPERS INVESTMENT PLAN</div>

<table>
<tr>
<th>AMOUNT</th>
<th>DAILY 2.2%</th>
<th>WEEK</th>
<th>MONTH</th>
<th>45D</th>
<th>3M</th>
<th>4M</th>
</tr>

<tr><td>5,000</td><td>110</td><td>1,050</td><td>5,400</td><td>9,225</td><td>22,500</td><td>42,000</td></tr>
<tr><td>50,000</td><td>1,100</td><td>10,500</td><td>54,000</td><td>92,250</td><td>225,000</td><td>420,000</td></tr>
<tr><td>100,000</td><td>2,200</td><td>21,000</td><td>108,000</td><td>184,500</td><td>450,000</td><td>840,000</td></tr>
<tr><td>150,000</td><td>3,300</td><td>31,500</td><td>162,000</td><td>276,750</td><td>675,000</td><td>1,260,000</td></tr>
<tr><td>300,000</td><td>6,600</td><td>63,000</td><td>324,000</td><td>553,500</td><td>1,350,000</td><td>2,520,000</td></tr>
<tr><td>500,000</td><td>11,000</td><td>105,000</td><td>540,000</td><td>922,500</td><td>2,250,000</td><td>4,200,000</td></tr>
<tr><td>700,000</td><td>15,400</td><td>147,000</td><td>756,000</td><td>1,291,500</td><td>3,150,000</td><td>5,880,000</td></tr>
<tr><td>1,000,000</td><td>22,000</td><td>210,000</td><td>1,080,000</td><td>1,845,000</td><td>4,500,000</td><td>8,400,000</td></tr>
<tr><td>1,300,000</td><td>28,600</td><td>273,000</td><td>1,404,000</td><td>2,398,500</td><td>5,850,000</td><td>10,920,000</td></tr>
<tr><td>1,500,000</td><td>33,000</td><td>315,000</td><td>1,620,000</td><td>2,767,500</td><td>6,250,000</td><td>12,600,000</td></tr>
</table>
</div>

<button onclick="goDeposit()">NEXT</button>
`;
}

/* NEXT -> DEPOSIT */
function goDeposit(){
deposit();
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<p class="desc">Add funds using MTN Mobile Money</p>

<input id="amt" placeholder="Amount">
<p class="desc">Minimum 5000 RWF</p>

<input id="sender" placeholder="Sender name">

<button onclick="payment()">CONTINUE</button>
`;
}

/* PAYMENT */
function payment(){
screen.innerHTML=`
<h3 class="title">PAYMENT INFO</h3>

<p class="desc">Follow instructions carefully</p>

<div class="card">
0795410739<br><br>BARAKA BOLINGO
</div>

<button onclick="dial()">DIAL & PAY</button>
`;
}

/* DIAL */
function dial(){
screen.innerHTML=`
<p class="desc">*182*1*1*0795410739#</p>

<input type="file" id="file">

<button onclick="submitProof()">UPLOAD</button>
`;
}

/* PROOF */
function submitProof(){
if(!file.value){toast("Upload proof ❌");return;}
withdrawPeriod();
}

/* WITHDRAW PERIOD */
function withdrawPeriod(){
screen.innerHTML=`
<h3 class="title">WITHDRAW PERIOD</h3>

<p class="desc">Select investment duration</p>

<select id="period">
<option value="1">1 Day</option>
<option value="7">1 Week</option>
<option value="14">2 Weeks</option>
<option value="45">45 Days</option>
<option value="90">3 Months</option>
<option value="120">4 Months</option>
</select>

<button onclick="finish()">CONFIRM</button>
`;
}

/* FINISH */
function finish(){
selectedPeriod=period.value;
depositDone=true;
home();
}

/* LIVE EARN */
function earn(){
screen.innerHTML=`
<h3 class="title">LIVE EARNINGS</h3>

<div class="money" id="moneyBox">
<div class="floating">+RWF</div>
</div>
`;

setInterval(()=>{
let el=document.createElement("div");
el.className="floating";
el.innerText="+"+Math.floor(Math.random()*5000)+" RWF";
document.getElementById("moneyBox").appendChild(el);

setTimeout(()=>el.remove(),1500);
},800);
}

/* WITHDRAW */
function withdraw(){

if(!depositDone){
toast("Complete deposit first ❌");return;
}

screen.innerHTML=`
<h3 class="title">WITHDRAW</h3>

<p class="desc">Only available after activation</p>

<input id="wamt" placeholder="Amount">

<button onclick="doWithdraw()">WITHDRAW</button>
`;
}

function doWithdraw(){
if(!wamt.value){toast("Enter amount ❌");return;}
if(parseInt(wamt.value)<7500){
toast("INVALID INPUT ❌");return;
}
toast("Withdraw locked until maturity ❌");
}

start();

</script>

</body>
</html>
