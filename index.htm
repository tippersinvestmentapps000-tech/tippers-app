<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tippers Investment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* SPLIT BACKGROUND */
body{
margin:0;
font-family:Segoe UI;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to right,#93c5fd 50%, #ffffff 50%);
}

/* APP */
.app{
width:380px;
background:#000;
border-radius:20px;
overflow:hidden;
color:white;
}

/* CONTENT */
.content{
padding:20px;
height:520px;
overflow-y:auto;
}

/* TITLES */
.title{
text-align:center;
font-weight:bold;
background:linear-gradient(135deg,#ff0000,#f59e0b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.desc{text-align:center;margin-top:10px;color:white;}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:white;
color:black;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-weight:bold;
cursor:pointer;
}

/* NAV */
.nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{text-align:center;cursor:pointer;}
.nav i{display:block;font-size:20px;margin-bottom:3px;}

/* CARD */
.card{
background:#111;
padding:15px;
border-radius:12px;
margin-top:10px;
}

/* TABLE */
.plan{
margin-top:10px;
}

.rowPlan{
display:grid;
grid-template-columns:repeat(7,1fr);
padding:6px;
font-size:11px;
}

.headerRow{
background:black;
color:white;
font-weight:bold;
}

.rowPlan:nth-child(even){background:#111;}
.rowPlan:nth-child(odd){background:#0f172a;}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="app">

<div class="content" id="screen"></div>

<div class="nav">
<div onclick="home()"><i class="fa fa-home"></i>HOME</div>
<div onclick="deposit()"><i class="fa fa-wallet"></i>DEPOSIT</div>
<div onclick="withdraw()"><i class="fa fa-money-bill"></i>WITHDRAW</div>
</div>

</div>

<div id="toast"></div>

<script>

/* STATE */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser=null;
let depositDone=false;
let amount=0;

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* START */
function start(){
screen.innerHTML=`
<h2 class="title">WELCOME TO TIPPERS INVESTMENT APP</h2>
<p class="desc">Start now and grow your income smartly.</p>
<button onclick="register()">START</button>
`;
}

/* REGISTER */
function register(){
screen.innerHTML=`

<h3 class="title">REGISTER</h3>

<input id="f" placeholder="First name">
<input id="l" placeholder="Last name">

<select id="g">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="phone" placeholder="Phone number">

<input id="email" placeholder="Email (@gmail.com)">
<input id="pass" placeholder="6 digit password">
<input id="cpass" placeholder="Confirm password">

<button onclick="doRegister()">REGISTER</button>
`;
}

function doRegister(){
if(!f.value||!l.value||!g.value||!phone.value||!email.value||!pass.value||!cpass.value){
toast("Fill all fields ❌"); return;
}
if(!email.value.includes("@gmail.com")){
toast("Invalid email ❌"); return;
}
if(!/^[0-9]{6}$/.test(pass.value)){
toast("Password must be 6 digits ❌"); return;
}
if(pass.value!==cpass.value){
toast("Passwords not match ❌"); return;
}

users.push({email:email.value,pass:pass.value});
localStorage.setItem("users",JSON.stringify(users));

toast("Registered ✔");
login();
}

/* LOGIN */
function login(){
screen.innerHTML=`
<h3 class="title">LOGIN</h3>

<input id="le" placeholder="Email">
<input id="lp" placeholder="Password">

<button onclick="doLogin()">LOGIN</button>
`;
}

function doLogin(){
let u=users.find(x=>x.email===le.value);

if(!u){
toast("Account not found ❌"); return;
}
if(lp.value!==u.pass){
toast("Invalid password ❌"); return;
}

currentUser=u;
home();
}

/* HOME (FULL TABLE) */
function home(){

screen.innerHTML=`
<h3 class="title">INVESTMENT PLAN</h3>

<div class="plan">

<div class="rowPlan headerRow">
<div>INVEST</div>
<div>2.2%</div>
<div>3%</div>
<div>3.6%</div>
<div>4.1%</div>
<div>5%</div>
<div>7%</div>
</div>

<div class="rowPlan"><div>5,000</div><div>110</div><div>1050</div><div>5400</div><div>9225</div><div>22500</div><div>42000</div></div>
<div class="rowPlan"><div>50,000</div><div>1100</div><div>10500</div><div>54000</div><div>92250</div><div>225000</div><div>420000</div></div>
<div class="rowPlan"><div>100,000</div><div>2200</div><div>21000</div><div>108000</div><div>184500</div><div>450000</div><div>840000</div></div>
<div class="rowPlan"><div>150,000</div><div>3300</div><div>31500</div><div>162000</div><div>276750</div><div>675000</div><div>1260000</div></div>
<div class="rowPlan"><div>300,000</div><div>6600</div><div>63000</div><div>324000</div><div>553500</div><div>1350000</div><div>2520000</div></div>
<div class="rowPlan"><div>500,000</div><div>11000</div><div>105000</div><div>540000</div><div>922500</div><div>2250000</div><div>4200000</div></div>
<div class="rowPlan"><div>700,000</div><div>15400</div><div>147000</div><div>756000</div><div>1291500</div><div>3150000</div><div>5880000</div></div>
<div class="rowPlan"><div>1,000,000</div><div>22000</div><div>210000</div><div>1080000</div><div>1845000</div><div>4500000</div><div>8400000</div></div>
<div class="rowPlan"><div>1,300,000</div><div>28600</div><div>273000</div><div>1404000</div><div>2398500</div><div>5850000</div><div>10920000</div></div>
<div class="rowPlan"><div>1,500,000</div><div>33000</div><div>315000</div><div>1620000</div><div>2767500</div><div>6250000</div><div>12600000</div></div>

</div>

<button onclick="deposit()">NEXT</button>
`;
}

/* DEPOSIT */
function deposit(){
screen.innerHTML=`
<h3 class="title">DEPOSIT</h3>

<input id="amt" placeholder="Amount (RWF)">
<p>Minimum 5000</p>

<input id="sender" placeholder="Sender name">

<button onclick="pay()">CONTINUE</button>
`;
}

function pay(){
if(!amt.value||!sender.value){
toast("Fill all fields ❌"); return;
}
if(amt.value<5000){
toast("Minimum 5000 ❌"); return;
}
amount=amt.value;
proof();
}

/* PROOF */
function proof(){
screen.innerHTML=`
<p>Upload proof</p>
<input type="file" id="file">
<button onclick="finish()">SUBMIT</button>
`;
}

function finish(){
if(!file.value){
toast("Upload proof ❌"); return;
}
depositDone=true;

screen.innerHTML=`
<div class="card">
<h2>Your Balance: ${amount} RWF</h2>
</div>
`;
}

/* WITHDRAW */
function withdraw(){
if(!depositDone){
toast("Finish deposit first ❌"); return;
}

let num=prompt("Enter MTN number");

if(!num.startsWith("078")&&!num.startsWith("079")){
toast("Use MTN only ❌"); return;
}

toast("Not allowed before schedule");
}

/* START */
start();

</script>

</body>
</html>
